<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800" font-family="SimSun, 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="rCu" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/></marker>
    <marker id="dCu" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
    <marker id="bCu" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/></marker>
  </defs>

  <rect width="960" height="800" fill="#FAFAFA" rx="8"/>
  <rect x="0" y="0" width="960" height="56" fill="#BF360C" rx="8"/>
  <rect x="0" y="28" width="960" height="28" fill="#BF360C"/>
  <text x="480" y="37" text-anchor="middle" fill="white" font-size="21" font-weight="bold">Cu 铜元素及其化合物转化图</text>

  <!-- Legend -->
  <rect x="735" y="70" width="210" height="95" fill="white" stroke="#CCC" rx="4"/>
  <text x="745" y="90" font-size="12" font-weight="bold" fill="#333">图例</text>
  <rect x="745" y="100" width="18" height="18" rx="3" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="770" y="114" font-size="11" fill="#333">普通节点</text>
  <rect x="745" y="123" width="18" height="18" rx="3" fill="#FFEBEE" stroke="#D32F2F"/>
  <text x="770" y="137" font-size="11" fill="#D32F2F">🔴 高频考点</text>
  <rect x="745" y="145" width="18" height="18" rx="3" fill="#FFF9C4" stroke="#F9A825"/>
  <text x="770" y="159" font-size="11" fill="#F9A825">单质</text>

  <!-- ==================== NODES ==================== -->
  <!-- Cu (center top) -->
  <rect x="380" y="80" width="90" height="44" rx="8" fill="#FFF9C4" stroke="#F9A825" stroke-width="2.5"/>
  <text x="425" y="99" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Cu</text>
  <text x="425" y="116" text-anchor="middle" font-size="9" fill="#666">铜（紫红）</text>

  <!-- CuO -->
  <rect x="120" y="220" width="90" height="42" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="165" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">CuO</text>
  <text x="165" y="254" text-anchor="middle" font-size="9" fill="#666">氧化铜（黑）</text>

  <!-- Cu(OH)2 🔴 -->
  <rect x="100" y="430" width="130" height="44" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="165" y="449" text-anchor="middle" font-size="16" font-weight="bold" fill="#D32F2F">Cu(OH)₂</text>
  <text x="165" y="466" text-anchor="middle" font-size="10" fill="#C62828">氢氧化铜 🔴</text>

  <!-- CuSO4 🔴 -->
  <rect x="380" y="260" width="130" height="44" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="445" y="279" text-anchor="middle" font-size="16" font-weight="bold" fill="#D32F2F">CuSO₄</text>
  <text x="445" y="296" text-anchor="middle" font-size="10" fill="#C62828">硫酸铜 🔴</text>

  <!-- Cu(NO3)2 🔴 -->
  <rect x="640" y="220" width="130" height="44" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="705" y="239" text-anchor="middle" font-size="16" font-weight="bold" fill="#D32F2F">Cu(NO₃)₂</text>
  <text x="705" y="256" text-anchor="middle" font-size="10" fill="#C62828">硝酸铜 🔴</text>

  <!-- CuCl2 -->
  <rect x="640" y="430" width="100" height="42" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="690" y="448" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">CuCl₂</text>
  <text x="690" y="464" text-anchor="middle" font-size="9" fill="#666">氯化铜</text>

  <!-- CuSO4·5H2O -->
  <rect x="380" y="430" width="140" height="44" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="450" y="449" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">CuSO₄·5H₂O</text>
  <text x="450" y="466" text-anchor="middle" font-size="9" fill="#666">胆矾（蓝）</text>

  <!-- Cu2O -->
  <rect x="120" y="580" width="90" height="42" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="165" y="598" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Cu₂O</text>
  <text x="165" y="614" text-anchor="middle" font-size="9" fill="#666">氧化亚铜（红）</text>

  <!-- [Cu(NH3)4]2+ -->
  <rect x="360" y="600" width="160" height="44" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="440" y="619" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">[Cu(NH₃)₄]²⁺</text>
  <text x="440" y="636" text-anchor="middle" font-size="9" fill="#666">四氨合铜离子(深蓝)</text>

  <!-- ==================== ARROWS ==================== -->
  <!-- Cu → CuO -->
  <line x1="380" y1="100" x2="165" y2="235" stroke="#333" stroke-width="2" marker-end="url(#dCu)"/>
  <text x="250" y="160" font-size="10" fill="#333">+O₂ △（黑）</text>

  <!-- Cu → CuSO4 🔴 -->
  <line x1="425" y1="128" x2="445" y2="255" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#rCu)"/>
  <text x="455" y="195" font-size="10" fill="#D32F2F" font-weight="bold">+浓H₂SO₄ △ 🔴</text>

  <!-- Cu → Cu(NO3)2 🔴 -->
  <line x1="475" y1="100" x2="700" y2="215" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#rCu)"/>
  <text x="620" y="155" font-size="10" fill="#D32F2F" font-weight="bold">+HNO₃(浓/稀) 🔴</text>

  <!-- Cu → CuCl2 -->
  <line x1="470" y1="115" x2="635" y2="435" stroke="#333" stroke-width="2" marker-end="url(#dCu)"/>
  <text x="580" y="275" font-size="10" fill="#333">+Cl₂(点燃)</text>

  <!-- CuO → CuSO4 -->
  <line x1="215" y1="245" x2="375" y2="275" stroke="#333" stroke-width="2" marker-end="url(#dCu)"/>
  <text x="295" y="252" font-size="10" fill="#333">+稀H₂SO₄ △</text>

  <!-- CuO → Cu -->
  <line x1="165" y1="230" x2="420" y2="105" stroke="#666" stroke-width="1.5" marker-end="url(#dCu)" stroke-dasharray="6,3"/>
  <text x="305" y="162" font-size="10" fill="#666">+H₂/C/CO 高温</text>

  <!-- CuSO4 → Cu(OH)2 🔴 -->
  <line x1="380" y1="290" x2="175" y2="440" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#rCu)"/>
  <text x="230" y="365" font-size="10" fill="#D32F2F" font-weight="bold">+NaOH 🔴</text>

  <!-- Cu(NO3)2 → Cu(OH)2 -->
  <line x1="635" y1="250" x2="230" y2="435" stroke="#666" stroke-width="1.5" marker-end="url(#dCu)"/>
  <text x="440" y="345" font-size="10" fill="#666">+NaOH</text>

  <!-- Cu(OH)2 → CuO -->
  <line x1="165" y1="435" x2="165" y2="272" stroke="#333" stroke-width="2" marker-end="url(#dCu)"/>
  <text x="175" y="355" font-size="10" fill="#333">△</text>

  <!-- CuSO4 ⇄ CuSO4·5H2O -->
  <line x1="445" y1="308" x2="445" y2="425" stroke="#333" stroke-width="2" marker-end="url(#dCu)"/>
  <text x="455" y="370" font-size="10" fill="#333">+5H₂O</text>
  <line x1="435" y1="430" x2="435" y2="312" stroke="#666" stroke-width="1.5" marker-end="url(#dCu)" stroke-dasharray="6,3"/>
  <text x="418" y="375" font-size="10" fill="#666">△(白→蓝)</text>

  <!-- Cu(OH)2 → Cu2O -->
  <line x1="150" y1="478" x2="150" y2="575" stroke="#333" stroke-width="2" marker-end="url(#dCu)"/>
  <text x="120" y="530" font-size="10" fill="#333">+还原糖(醛基) △→砖红↓</text>

  <!-- Cu(OH)2 → [Cu(NH3)4]2+ -->
  <line x1="230" y1="455" x2="410" y2="612" stroke="#666" stroke-width="1.5" marker-end="url(#dCu)"/>
  <text x="340" y="535" font-size="10" fill="#666">+NH₃·H₂O(过量)</text>

  <!-- CuSO4 → [Cu(NH3)4]2+ -->
  <line x1="470" y1="308" x2="455" y2="595" stroke="#666" stroke-width="1.5" marker-end="url(#dCu)"/>
  <text x="480" y="455" font-size="10" fill="#666">+NH₃·H₂O(过量)</text>

  <!-- CuO → CuCl2 -->
  <line x1="215" y1="230" x2="635" y2="440" stroke="#666" stroke-width="1.5" marker-end="url(#dCu)"/>
  <text x="440" y="335" font-size="10" fill="#666">+HCl</text>

  <!-- ==================== SPECIAL BOX ==================== -->
  <rect x="620" y="520" width="320" height="95" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5" rx="6"/>
  <text x="780" y="542" text-anchor="middle" font-size="13" font-weight="bold" fill="#D32F2F">🔴 Cu与HNO₃/H₂SO₄反应细节</text>
  <text x="630" y="564" font-size="10" fill="#333">Cu+4HNO₃(浓)=Cu(NO₃)₂+2NO₂↑+2H₂O</text>
  <text x="630" y="580" font-size="10" fill="#333">3Cu+8HNO₃(稀)=3Cu(NO₃)₂+2NO↑+4H₂O</text>
  <text x="630" y="596" font-size="10" fill="#333">Cu+2H₂SO₄(浓) △ CuSO₄+SO₂↑+2H₂O</text>
  <text x="630" y="612" font-size="10" fill="#D32F2F">⚠️ Cu与稀H₂SO₄不反应（Cu在H之后）</text>

  <!-- ==================== EXAM TIPS ==================== -->
  <rect x="15" y="670" width="930" height="115" fill="white" stroke="#D32F2F" stroke-width="1.5" rx="6"/>
  <text x="35" y="695" font-size="14" font-weight="bold" fill="#D32F2F">🔴 近十年高考高频考点</text>
  <text x="35" y="718" font-size="11" fill="#333">① Cu(OH)₂+醛基→Cu₂O↓(砖红色)：用于检验醛基（斐林试剂/新制Cu(OH)₂）——必须新制、碱性环境、加热</text>
  <text x="35" y="736" font-size="11" fill="#333">② CuSO₄·5H₂O(蓝) ⇌ CuSO₄(白)+5H₂O：用于检验水的存在（无水CuSO₄遇水变蓝）</text>
  <text x="35" y="754" font-size="11" fill="#333">③ Cu+2Fe³⁺=Cu²⁺+2Fe²⁺（印刷电路板腐蚀原理）——Fe³⁺氧化Cu</text>
  <text x="35" y="772" font-size="11" fill="#333">④ 铜的精炼：粗铜(阳极)→纯铜(阴极)，电解液CuSO₄；阳极泥含Ag/Au等贵金属</text>
  <text x="35" y="790" font-size="11" fill="#333">⑤ 铜合金：青铜(Cu-Sn)、黄铜(Cu-Zn)、白铜(Cu-Ni)</text>

</svg>