<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" font-family="SimSun, 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/></marker>
    <marker id="arD" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
    <marker id="arB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/></marker>
  </defs>

  <rect width="960" height="820" fill="#FAFAFA" rx="8"/>
  <rect x="0" y="0" width="960" height="58" fill="#E65100" rx="8"/>
  <rect x="0" y="30" width="960" height="28" fill="#E65100"/>
  <text x="480" y="38" text-anchor="middle" fill="white" font-size="21" font-weight="bold">Fe 铁元素及其化合物转化图</text>

  <!-- Legend -->
  <rect x="720" y="72" width="220" height="95" fill="white" stroke="#CCC" rx="4"/>
  <text x="730" y="92" font-size="12" font-weight="bold" fill="#333">图例</text>
  <rect x="730" y="102" width="18" height="18" rx="3" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="755" y="116" font-size="11" fill="#333">普通节点</text>
  <rect x="730" y="125" width="18" height="18" rx="3" fill="#FFEBEE" stroke="#D32F2F"/>
  <text x="755" y="139" font-size="11" fill="#D32F2F">🔴 高频考点</text>

  <!-- ==================== MAIN TRIANGLE ==================== -->
  <!-- Fe (top) -->
  <rect x="380" y="100" width="100" height="44" rx="8" fill="#FFF9C4" stroke="#F9A825" stroke-width="2.5"/>
  <text x="430" y="119" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Fe</text>
  <text x="430" y="136" text-anchor="middle" font-size="10" fill="#666">铁单质</text>

  <!-- Fe2+ (bottom left) 🔴 -->
  <rect x="150" y="430" width="110" height="44" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="205" y="449" text-anchor="middle" font-size="16" font-weight="bold" fill="#D32F2F">Fe²⁺</text>
  <text x="205" y="466" text-anchor="middle" font-size="10" fill="#C62828">亚铁离子 🔴</text>

  <!-- Fe3+ (bottom right) 🔴 -->
  <rect x="620" y="430" width="110" height="44" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="675" y="449" text-anchor="middle" font-size="16" font-weight="bold" fill="#D32F2F">Fe³⁺</text>
  <text x="675" y="466" text-anchor="middle" font-size="10" fill="#C62828">铁离子 🔴</text>

  <!-- Fe → Fe2+ -->
  <line x1="380" y1="122" x2="210" y2="420" stroke="#333" stroke-width="2" marker-end="url(#arD)"/>
  <text x="240" y="270" font-size="12" fill="#333">+H⁺/Cu²⁺/S</text>

  <!-- Fe → Fe3+ -->
  <line x1="480" y1="122" x2="660" y2="420" stroke="#333" stroke-width="2" marker-end="url(#arD)"/>
  <text x="600" y="270" font-size="12" fill="#333">+Cl₂/Br₂/浓HNO₃</text>

  <!-- Fe2+ → Fe3+ 🔴 HIGH FREQ -->
  <line x1="265" y1="450" x2="615" y2="450" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#arR)"/>
  <text x="440" y="440" font-size="12" fill="#D32F2F" font-weight="bold">+Cl₂/H₂O₂/HNO₃/O₂ 🔴</text>

  <!-- Fe3+ → Fe2+ 🔴 HIGH FREQ -->
  <line x1="615" y1="465" x2="265" y2="465" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#arR)"/>
  <text x="440" y="478" font-size="12" fill="#D32F2F" font-weight="bold">+Fe/Cu/I⁻/S²⁻ 🔴</text>

  <!-- ==================== SIDE COMPOUNDS ==================== -->
  <!-- Fe3O4 -->
  <rect x="560" y="170" width="100" height="44" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="610" y="189" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Fe₃O₄</text>
  <text x="610" y="206" text-anchor="middle" font-size="10" fill="#666">四氧化三铁</text>

  <!-- Fe2O3 -->
  <rect x="720" y="260" width="100" height="44" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="770" y="279" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Fe₂O₃</text>
  <text x="770" y="296" text-anchor="middle" font-size="10" fill="#666">氧化铁（铁锈）</text>

  <!-- Fe(OH)2 -->
  <rect x="50" y="260" width="110" height="44" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="105" y="279" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Fe(OH)₂</text>
  <text x="105" y="296" text-anchor="middle" font-size="10" fill="#666">氢氧化亚铁</text>

  <!-- Fe(OH)3 🔴 -->
  <rect x="50" y="170" width="110" height="44" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="105" y="189" text-anchor="middle" font-size="16" font-weight="bold" fill="#D32F2F">Fe(OH)₃</text>
  <text x="105" y="206" text-anchor="middle" font-size="10" fill="#C62828">氢氧化铁 🔴</text>

  <!-- FeCl2/FeCl3 -->
  <rect x="240" y="560" width="100" height="44" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="290" y="579" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">FeCl₂</text>
  <text x="290" y="596" text-anchor="middle" font-size="10" fill="#666">氯化亚铁</text>

  <rect x="540" y="560" width="100" height="44" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="590" y="579" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">FeCl₃</text>
  <text x="590" y="596" text-anchor="middle" font-size="10" fill="#666">氯化铁</text>

  <!-- Arrows to side compounds -->
  <!-- Fe → Fe3O4 -->
  <line x1="480" y1="115" x2="555" y2="185" stroke="#333" stroke-width="2" marker-end="url(#arD)"/>
  <text x="530" y="145" font-size="11" fill="#333">+O₂(点燃)</text>

  <!-- Fe3O4 ← Fe (water vapor) 🔴 -->
  <line x1="380" y1="130" x2="560" y2="185" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#arR)"/>
  <text x="425" y="155" font-size="11" fill="#D32F2F" font-weight="bold">+H₂O(g)高温 🔴</text>

  <!-- Fe3+ → Fe2O3 -->
  <line x1="680" y1="390" x2="740" y2="305" stroke="#666" stroke-width="1.5" marker-end="url(#arD)" stroke-dasharray="6,3"/>
  <text x="730" y="350" font-size="10" fill="#666">pH↑</text>

  <!-- Fe2+ → Fe(OH)2 -->
  <line x1="155" y1="430" x2="105" y2="310" stroke="#333" stroke-width="2" marker-end="url(#arD)"/>
  <text x="70" y="375" font-size="11" fill="#333">+OH⁻</text>

  <!-- Fe3+ → Fe(OH)3 -->
  <line x1="620" y1="440" x2="170" y2="195" stroke="#333" stroke-width="2" marker-end="url(#arD)"/>
  <text x="370" y="310" font-size="11" fill="#333">+OH⁻</text>

  <!-- Fe(OH)2 → Fe(OH)3 🔴 HIGH FREQ (white→green→brown) -->
  <line x1="110" y1="225" x2="110" y2="215" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#arR)"/>
  <text x="130" y="215" font-size="11" fill="#D32F2F" font-weight="bold">白色→灰绿→红褐 🔴</text>

  <!-- Fe2+ → FeCl2 -->
  <line x1="205" y1="478" x2="270" y2="555" stroke="#666" stroke-width="1.5" marker-end="url(#arD)"/>
  <text x="200" y="525" font-size="10" fill="#666">+HCl</text>

  <!-- Fe3+ → FeCl3 -->
  <line x1="650" y1="478" x2="610" y2="555" stroke="#666" stroke-width="1.5" marker-end="url(#arD)"/>
  <text x="660" y="525" font-size="10" fill="#666">+HCl</text>

  <!-- Fe2+ + FeCl2 arrow label -->
  <line x1="310" y1="560" x2="215" y2="478" stroke="#333" stroke-width="1.5" marker-end="url(#arD)"/>
  <text x="310" y="518" font-size="10" fill="#333">还原性</text>

  <!-- ==================== EXAM TIPS ==================== -->
  <rect x="15" y="640" width="930" height="165" fill="white" stroke="#D32F2F" stroke-width="1.5" rx="6"/>
  <text x="35" y="665" font-size="14" font-weight="bold" fill="#D32F2F">🔴 近十年高考高频考点</text>

  <text x="35" y="690" font-size="11" fill="#333">① Fe²⁺检验：先加KSCN溶液→无现象；再加氯水/双氧水→溶液变血红色（排除Fe³⁺干扰）</text>
  <text x="35" y="708" font-size="11" fill="#333">② Fe³⁺检验：加KSCN溶液→血红色；加NaOH溶液→红褐色沉淀</text>
  <text x="35" y="726" font-size="11" fill="#333">③ 除杂：FeCl₃(FeCl₂)→通Cl₂；FeCl₂(FeCl₃)→加过量Fe粉过滤；Fe³⁺腐蚀Cu电路板：2Fe³⁺+Cu=2Fe²⁺+Cu²⁺</text>
  <text x="35" y="744" font-size="11" fill="#333">④ 铁与水蒸气：3Fe+4H₂O(g) 高温 Fe₃O₄+4H₂↑（非置换反应，四氧化三铁含Fe²⁺和Fe³⁺）</text>
  <text x="35" y="762" font-size="11" fill="#333">⑤ Fe(OH)₂制备：液封法、煮沸除氧、胶头滴管伸入液面下；现象：白色絮状→灰绿色→红褐色</text>
  <text x="35" y="780" font-size="11" fill="#333">⑥ 常温下Fe/Al遇浓HNO₃/浓H₂SO₄钝化（生成致密氧化膜），加热后继续反应</text>

</svg>