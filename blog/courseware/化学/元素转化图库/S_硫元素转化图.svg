<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" font-family="SimSun, 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="rr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/></marker>
    <marker id="dd" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker>
    <marker id="bb" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/></marker>
  </defs>

  <rect width="960" height="820" fill="#FAFAFA" rx="8"/>
  <rect x="0" y="0" width="960" height="56" fill="#FF8F00" rx="8"/>
  <rect x="0" y="28" width="960" height="28" fill="#FF8F00"/>
  <text x="480" y="37" text-anchor="middle" fill="white" font-size="21" font-weight="bold">S 硫元素及其化合物转化图</text>

  <!-- Legend -->
  <rect x="730" y="70" width="215" height="95" fill="white" stroke="#CCC" rx="4"/>
  <text x="740" y="90" font-size="12" font-weight="bold" fill="#333">图例</text>
  <rect x="740" y="100" width="18" height="18" rx="3" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="765" y="114" font-size="11" fill="#333">普通节点</text>
  <rect x="740" y="123" width="18" height="18" rx="3" fill="#FFEBEE" stroke="#D32F2F"/>
  <text x="765" y="137" font-size="11" fill="#D32F2F">🔴 高频考点</text>
  <rect x="740" y="145" width="18" height="18" rx="3" fill="#FFF9C4" stroke="#F9A825"/>
  <text x="765" y="159" font-size="11" fill="#F9A825">单质</text>

  <!-- ==================== NODES ==================== -->
  <!-- S (center) -->
  <rect x="390" y="90" width="90" height="42" rx="8" fill="#FFF9C4" stroke="#F9A825" stroke-width="2.5"/>
  <text x="435" y="108" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">S</text>
  <text x="435" y="124" text-anchor="middle" font-size="9" fill="#666">硫</text>

  <!-- H2S (left) -->
  <rect x="80" y="170" width="100" height="42" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="130" y="188" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">H₂S</text>
  <text x="130" y="204" text-anchor="middle" font-size="9" fill="#666">硫化氢</text>

  <!-- FeS (left bottom) -->
  <rect x="80" y="340" width="90" height="42" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="125" y="358" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">FeS</text>
  <text x="125" y="374" text-anchor="middle" font-size="9" fill="#666">硫化亚铁</text>

  <!-- SO2 (center) 🔴 -->
  <rect x="370" y="230" width="120" height="44" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="430" y="249" text-anchor="middle" font-size="16" font-weight="bold" fill="#D32F2F">SO₂</text>
  <text x="430" y="266" text-anchor="middle" font-size="10" fill="#C62828">二氧化硫 🔴</text>

  <!-- SO3 (right) -->
  <rect x="640" y="240" width="90" height="42" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="685" y="258" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">SO₃</text>
  <text x="685" y="274" text-anchor="middle" font-size="9" fill="#666">三氧化硫</text>

  <!-- H2SO3 (bottom) -->
  <rect x="350" y="400" width="100" height="42" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="400" y="418" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">H₂SO₃</text>
  <text x="400" y="434" text-anchor="middle" font-size="9" fill="#666">亚硫酸</text>

  <!-- H2SO4 (bottom right) 🔴 -->
  <rect x="600" y="420" width="130" height="44" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="665" y="439" text-anchor="middle" font-size="16" font-weight="bold" fill="#D32F2F">H₂SO₄</text>
  <text x="665" y="456" text-anchor="middle" font-size="10" fill="#C62828">硫酸(浓/稀) 🔴</text>

  <!-- Sulfates -->
  <rect x="600" y="560" width="90" height="42" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="645" y="578" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">BaSO₄</text>
  <text x="645" y="594" text-anchor="middle" font-size="9" fill="#666">硫酸钡↓</text>

  <rect x="740" y="560" width="90" height="42" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="785" y="578" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">CuSO₄</text>
  <text x="785" y="594" text-anchor="middle" font-size="9" fill="#666">硫酸铜</text>

  <!-- CaSO4 etc -->
  <rect x="460" y="570" width="100" height="42" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="510" y="588" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Na₂SO₃</text>
  <text x="510" y="604" text-anchor="middle" font-size="9" fill="#666">亚硫酸钠</text>

  <!-- ==================== ARROWS ==================== -->
  <!-- S → SO2 -->
  <line x1="435" y1="136" x2="435" y2="225" stroke="#333" stroke-width="2" marker-end="url(#dd)"/>
  <text x="445" y="183" font-size="11" fill="#333">+O₂(点燃)</text>

  <!-- S → H2S -->
  <line x1="385" y1="105" x2="185" y2="180" stroke="#333" stroke-width="2" marker-end="url(#dd)"/>
  <text x="250" y="135" font-size="11" fill="#333">+H₂(高温)</text>

  <!-- S → FeS -->
  <line x1="385" y1="115" x2="175" y2="350" stroke="#333" stroke-width="2" marker-end="url(#dd)"/>
  <text x="240" y="235" font-size="11" fill="#333">+Fe(高温)</text>

  <!-- H2S → S -->
  <line x1="180" y1="185" x2="370" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#dd)" stroke-dasharray="6,3"/>
  <text x="240" y="140" font-size="10" fill="#666">+O₂(不足)/+SO₂</text>

  <!-- H2S → SO2 -->
  <line x1="185" y1="195" x2="365" y2="245" stroke="#333" stroke-width="2" marker-end="url(#dd)"/>
  <text x="240" y="230" font-size="11" fill="#333">+O₂(充足，点燃)</text>

  <!-- SO2 → SO3 🔴 -->
  <line x1="495" y1="252" x2="635" y2="260" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#rr)"/>
  <text x="565" y="248" font-size="11" fill="#D32F2F" font-weight="bold">+O₂ V₂O₅ △ 🔴</text>

  <!-- SO3 → H2SO4 -->
  <line x1="685" y1="286" x2="665" y2="415" stroke="#333" stroke-width="2" marker-end="url(#dd)"/>
  <text x="695" y="355" font-size="11" fill="#333">+H₂O</text>

  <!-- SO2 → H2SO3 -->
  <line x1="410" y1="278" x2="395" y2="395" stroke="#333" stroke-width="2" marker-end="url(#dd)"/>
  <text x="380" y="340" font-size="11" fill="#333">+H₂O</text>

  <!-- H2SO3 → SO2 -->
  <line x1="430" y1="400" x2="440" y2="285" stroke="#666" stroke-width="1.5" marker-end="url(#dd)" stroke-dasharray="6,3"/>
  <text x="450" y="345" font-size="10" fill="#666">△ 分解</text>

  <!-- H2SO3 → H2SO4 -->
  <line x1="450" y1="415" x2="595" y2="435" stroke="#333" stroke-width="2" marker-end="url(#dd)"/>
  <text x="525" y="432" font-size="11" fill="#333">+O₂(久置/氧化)</text>

  <!-- H2SO4 → SO2 🔴 (concentrated) -->
  <line x1="600" y1="445" x2="455" y2="265" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#rr)"/>
  <text x="465" y="360" font-size="11" fill="#D32F2F" font-weight="bold">+Cu △ → CuSO₄+SO₂↑ 🔴</text>

  <!-- H2SO4 → BaSO4 -->
  <line x1="635" y1="468" x2="640" y2="555" stroke="#333" stroke-width="2" marker-end="url(#dd)"/>
  <text x="655" y="515" font-size="10" fill="#333">+Ba²⁺</text>

  <!-- H2SO4 → CuSO4 -->
  <line x1="680" y1="468" x2="770" y2="555" stroke="#333" stroke-width="2" marker-end="url(#dd)"/>
  <text x="740" y="515" font-size="10" fill="#333">+CuO/Cu(OH)₂</text>

  <!-- SO2 → Na2SO3 -->
  <line x1="430" y1="278" x2="500" y2="565" stroke="#666" stroke-width="1.5" marker-end="url(#dd)"/>
  <text x="480" y="425" font-size="10" fill="#666">+NaOH</text>

  <!-- ==================== SPECIAL BOX: concentrated H2SO4 ==================== -->
  <rect x="30" y="460" width="220" height="95" fill="#FFF8E1" stroke="#FF8F00" stroke-width="1.5" rx="6"/>
  <text x="140" y="480" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">浓H₂SO₄三大特性</text>
  <text x="40" y="498" font-size="10" fill="#333">吸水性：作干燥剂</text>
  <text x="40" y="514" font-size="10" fill="#333">脱水性：使有机物碳化（化学）</text>
  <text x="40" y="530" font-size="10" fill="#333">强氧化性：+Cu→SO₂（非H₂）</text>
  <text x="40" y="546" font-size="10" fill="#D32F2F">⚠️浓H₂SO₄与金属反应不生成H₂</text>

  <!-- ==================== EXAM TIPS ==================== -->
  <rect x="15" y="640" width="930" height="165" fill="white" stroke="#D32F2F" stroke-width="1.5" rx="6"/>
  <text x="35" y="665" font-size="14" font-weight="bold" fill="#D32F2F">🔴 近十年高考高频考点</text>

  <text x="35" y="690" font-size="11" fill="#333">① SO₂特性四合一：漂白性(化合/可逆)→品红褪色△恢复；还原性→使KMnO₄/Br₂水褪色；氧化性→+H₂S=S↓+H₂O；酸性→+NaOH</text>
  <text x="35" y="708" font-size="11" fill="#333">② SO₂与CO₂鉴别：(1)闻气味(SO₂刺激性)；(2)品红溶液(SO₂褪色)；(3)KMnO₄/H⁺(SO₂褪色)；(4)FeCl₃溶液(SO₂使变绿)</text>
  <text x="35" y="726" font-size="11" fill="#333">③ 浓H₂SO₄+Cu：Cu+2H₂SO₄(浓) △ CuSO₄+SO₂↑+2H₂O（硫酸部分被还原、部分显酸性）</text>
  <text x="35" y="744" font-size="11" fill="#333">④ SO₄²⁻检验：加HCl酸化(排除Ag⁺/CO₃²⁻干扰)→再加BaCl₂溶液→白色沉淀</text>
  <text x="35" y="762" font-size="11" fill="#333">⑤ 接触法制硫酸：S/FeS₂→SO₂→SO₃(V₂O₅,△)→H₂SO₄(98.3%浓H₂SO₄吸收，不用水——防酸雾）</text>
  <text x="35" y="780" font-size="11" fill="#333">⑥ SO₂尾气处理：NaOH溶液吸收；酸雨形成：SO₂→H₂SO₃→H₂SO₄（O₂氧化）</text>

</svg>