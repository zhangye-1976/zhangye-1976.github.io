<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%" role="img">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font-family: var(--font-sans, sans-serif); font-size: 14px; fill: var(--color-text-primary, #18191C); }
      .ts { font-family: var(--font-sans, sans-serif); font-size: 12px; fill: var(--color-text-secondary, #5F5E5A); }
      .th { font-family: var(--font-sans, sans-serif); font-size: 14px; font-weight: 500; fill: var(--color-text-primary, #18191C); }
      .tc { font-family: var(--font-sans, sans-serif); font-size: 11px; fill: var(--color-text-secondary, #5F5E5A); }
      .node { cursor: pointer; }
      .node:hover rect { stroke-width: 1.5px; }
    </style>
  </defs>

  <title>高中化学必修第一册 - 知识体系总览</title>
  <desc>人教版高中化学必修第一册四章知识框架，包含绪言、物质及其变化、钠和氯、铁和金属材料、物质结构与元素周期律</desc>

  <!-- 中心节点 -->
  <rect x="240" y="20" width="200" height="52" rx="12" fill="var(--color-background-primary, #fff)" stroke="#534AB7" stroke-width="1.5"/>
  <text class="th" x="340" y="38" text-anchor="middle" dominant-baseline="central" fill="#534AB7">化学必修 第一册</text>
  <text class="ts" x="340" y="56" text-anchor="middle" dominant-baseline="central">人教版 · 知识体系</text>

  <!-- 连接线：中心到绪言 -->
  <line x1="260" y1="72" x2="116" y2="104" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- 绪言 -->
  <g class="node c-gray" onclick="sendPrompt('绪言讲了什么')">
    <rect x="36" y="110" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text class="th" x="116" y="132" text-anchor="middle" dominant-baseline="central">绪 言</text>
    <text class="ts" x="116" y="150" text-anchor="middle" dominant-baseline="central" display="none"/>
  </g>
  <text class="tc" x="116" y="154" text-anchor="middle" dominant-baseline="hanging">化学定义 · 发展史</text>

  <!-- 第一章连接 -->
  <line x1="260" y1="72" x2="90" y2="214" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- 第一章 -->
  <g class="node c-purple" onclick="sendPrompt('第一章详细内容')">
    <rect x="36" y="220" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="136" y="240" text-anchor="middle" dominant-baseline="central" fill="#534AB7">第一章 物质及其变化</text>
    <text class="ts" x="136" y="260" text-anchor="middle" dominant-baseline="central">分类 · 离子反应 · 氧化还原</text>
  </g>
  <text class="tc" x="136" y="280" text-anchor="middle" dominant-baseline="hanging">三大核心概念奠基</text>

  <!-- 第二章连接 -->
  <line x1="340" y1="72" x2="340" y2="214" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- 第二章 -->
  <g class="node c-teal" onclick="sendPrompt('第二章详细内容')">
    <rect x="240" y="220" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="340" y="240" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">第二章 钠和氯</text>
    <text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central">钠 · 氯 · 物质的量</text>
  </g>
  <text class="tc" x="340" y="280" text-anchor="middle" dominant-baseline="hanging">海水中的核心元素</text>

  <!-- 第三章连接 -->
  <line x1="440" y1="72" x2="550" y2="214" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- 第三章 -->
  <g class="node c-coral" onclick="sendPrompt('第三章详细内容')">
    <rect x="444" y="220" width="200" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
    <text class="th" x="544" y="240" text-anchor="middle" dominant-baseline="central" fill="#D85A30">第三章 铁 金属材料</text>
    <text class="ts" x="544" y="260" text-anchor="middle" dominant-baseline="central">铁 · 合金 · 金属材料</text>
  </g>
  <text class="tc" x="544" y="280" text-anchor="middle" dominant-baseline="hanging">金属元素及其应用</text>

  <!-- 第四章连接 -->
  <line x1="340" y1="292" x2="340" y2="370" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- 第四章 -->
  <g class="node c-blue" onclick="sendPrompt('第四章详细内容')">
    <rect x="200" y="376" width="280" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text class="th" x="340" y="396" text-anchor="middle" dominant-baseline="central" fill="#185FA5">第四章 物质结构 元素周期律</text>
    <text class="ts" x="340" y="416" text-anchor="middle" dominant-baseline="central">原子结构 · 周期表 · 周期律 · 化学键</text>
  </g>
  <text class="tc" x="340" y="436" text-anchor="middle" dominant-baseline="hanging">微观世界的秩序</text>

  <!-- 附录标签 -->
  <rect x="220" y="462" width="240" height="32" rx="6" fill="var(--color-background-secondary, #F1F0EB)" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="ts" x="340" y="478" text-anchor="middle" dominant-baseline="central">附录：相对原子质量表 · 部分酸/碱/盐溶解性表</text>

  <!-- 底部连线 -->
  <line x1="340" y1="432" x2="340" y2="462" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4,3"/>
</svg>