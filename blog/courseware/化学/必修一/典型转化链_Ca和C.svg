<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" width="100%" role="img">
<title>Ca与C的典型物质转化链</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t { font: 14px var(--font-sans, sans-serif); fill: var(--color-text-primary, #222); }
    .ts { font: 12px var(--font-sans, sans-serif); fill: var(--color-text-secondary, #555); }
    .th { font: 500 14px var(--font-sans, sans-serif); fill: var(--color-text-primary, #222); }
  </style>
</defs>

<text x="340" y="26" class="th" text-anchor="middle" font-size="15">典型物质转化链举例（教材第16页）</text>

<!-- 分隔线 -->
<line x1="40" y1="160" x2="640" y2="160" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="6 3"/>
<text x="340" y="157" class="ts" text-anchor="middle">—— 分隔线：上为金属 Ca 路线 / 下为非金属 C 路线 ——</text>

<!-- === Ca 路线 === -->
<text x="40" y="58" class="ts" fill="#185FA5">金属路线（Ca）</text>

<!-- Ca -->
<rect x="48" y="68" width="80" height="40" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="88" y="92" class="th" text-anchor="middle" dominant-baseline="central">Ca</text>
<text x="88" y="116" class="ts" text-anchor="middle">金属单质</text>

<!-- → CaO -->
<polyline points="130,88 186,88" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="150" y="82" class="ts">点燃 O₂</text>

<rect x="188" y="68" width="80" height="40" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="228" y="92" class="th" text-anchor="middle" dominant-baseline="central">CaO</text>
<text x="228" y="116" class="ts" text-anchor="middle">碱性氧化物</text>

<!-- → Ca(OH)₂ -->
<polyline points="270,88 326,88" fill="none" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="282" y="82" class="ts">+ H₂O</text>

<rect x="328" y="68" width="90" height="40" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="373" y="92" class="th" text-anchor="middle" dominant-baseline="central">Ca(OH)₂</text>
<text x="373" y="116" class="ts" text-anchor="middle">碱</text>

<!-- → CaSO₄ -->
<polyline points="420,88 478,88" fill="none" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="432" y="82" class="ts">+ H₂SO₄</text>

<rect x="480" y="68" width="92" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="526" y="92" class="th" text-anchor="middle" dominant-baseline="central">CaSO₄</text>
<text x="526" y="116" class="ts" text-anchor="middle">盐</text>

<!-- === C 路线 === -->
<text x="40" y="186" class="ts" fill="#534AB7">非金属路线（C）</text>

<!-- C -->
<rect x="48" y="196" width="80" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="88" y="220" class="th" text-anchor="middle" dominant-baseline="central">C</text>
<text x="88" y="244" class="ts" text-anchor="middle">非金属单质</text>

<!-- → CO₂ -->
<polyline points="130,216 186,216" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="145" y="210" class="ts">点燃 O₂</text>

<rect x="188" y="196" width="80" height="40" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="228" y="220" class="th" text-anchor="middle" dominant-baseline="central">CO₂</text>
<text x="228" y="244" class="ts" text-anchor="middle">酸性氧化物</text>

<!-- → H₂CO₃ -->
<polyline points="270,216 326,216" fill="none" stroke="#993556" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="282" y="210" class="ts">+ H₂O</text>

<rect x="328" y="196" width="90" height="40" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="373" y="220" class="th" text-anchor="middle" dominant-baseline="central">H₂CO₃</text>
<text x="373" y="244" class="ts" text-anchor="middle">酸</text>

<!-- → CaCO₃ -->
<polyline points="420,216 478,216" fill="none" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="430" y="210" class="ts">+ Ca(OH)₂</text>

<rect x="480" y="196" width="92" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="526" y="220" class="th" text-anchor="middle" dominant-baseline="central">CaCO₃</text>
<text x="526" y="244" class="ts" text-anchor="middle">盐</text>

<!-- 类别标签 -->
<text x="88" y="262" class="ts" text-anchor="middle" fill="#185FA5">单质</text>
<text x="228" y="262" class="ts" text-anchor="middle" fill="#3B6D11">氧化物</text>
<text x="373" y="262" class="ts" text-anchor="middle" fill="#854F0B">碱/酸</text>
<text x="526" y="262" class="ts" text-anchor="middle" fill="#5F5E5A">盐</text>

<!-- 规律提示 -->
<rect x="48" y="280" width="584" height="40" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="340" y="298" class="ts" text-anchor="middle">规律：对于同一元素，转化路径为</text>
<text x="340" y="312" class="th" text-anchor="middle">单质 → 氧化物 → 酸或碱 → 盐</text>
</svg>