  <path d="M600 124 L787 170" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>

  <line x1="20" y1="280" x2="980" y2="280" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="30" y="305" width="280" height="60" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="360" y="305" width="280" height="60" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="690" y="305" width="220" height="60" rx="8" fill="#FDEBD0" stroke="#B9770E" stroke-width="2"/>

  <path d="M300 222 L170 305" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>
  <path d="M500 222 L500 305" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>
  <path d="M700 222 L800 305" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>

  <line x1="20" y1="420" x2="980" y2="420" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="50" y="445" width="260" height="60" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="370" y="445" width="260" height="60" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="690" y="445" width="220" height="60" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>

  <line x1="180" y1="365" x2="180" y2="445" stroke="#C0392B" stroke-width="2" marker-end="url(#aR)"/>
  <line x1="500" y1="365" x2="500" y2="445" stroke="#C0392B" stroke-width="2" marker-end="url(#aR)"/>
  <line x1="800" y1="365" x2="800" y2="445" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <line x1="20" y1="565" x2="980" y2="565" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="50" y="590" width="310" height="80" rx="10" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="420" y="590" width="310" height="80" rx="10" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="780" y="600" width="160" height="60" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>

  <path d="M180 505 L205 590" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>
  <path d="M500 505 L575 590" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>
  <path d="M800 505 L860 600" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <line x1="20" y1="730" x2="980" y2="730" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="50" y="755" width="240" height="56" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="340" y="755" width="320" height="56" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="710" y="755" width="220" height="56" rx="8" fill="#FDEBD0" stroke="#B9770E" stroke-width="2"/>

  <path d="M205 670 L170 755" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M575 670 L500 755" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>
  <path d="M830 660 L820 755" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <line x1="20" y1="870" x2="980" y2="870" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="50" y="895" width="900" height="30" rx="6" fill="#D5F5E3" stroke="#A9DFBF" stroke-width="1"/>

  <rect x="50" y="950" width="900" height="26" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1"/>

  <rect x="30" y="1000" width="940" height="670" rx="14" fill="#F8F9FA" stroke="#D5D8DC" stroke-width="1"/>

  <text x="500" y="34" text-anchor="middle" fill="white" font-size="17" font-weight="bold" font-family="Microsoft YaHei, SimHei, sans-serif">氯单质（Cl₂）转化关系图</text>

  <text x="500" y="107" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A5276" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ 黄绿色气体</text>

  <text x="127" y="193" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">NaCl</text>
  <text x="127" y="212" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">白色固体</text>
  <text x="347" y="193" text-anchor="middle" font-size="13" font-weight="bold" fill="#B9770E" font-family="Microsoft YaHei, SimHei, sans-serif">MgCl₂ / FeCl₃</text>
  <text x="347" y="212" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">金属氯化物</text>
  <text x="567" y="193" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">CuCl₂</text>
  <text x="567" y="212" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">棕黄色溶液</text>
  <text x="787" y="193" text-anchor="middle" font-size="13" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">FeCl₃ ★</text>
  <text x="787" y="212" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">2Fe + 3Cl₂ 点燃</text>

  <text x="300" y="145" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">2Na + Cl₂ 点燃</text>
  <text x="450" y="145" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Mg/Fe + Cl₂ 点燃 ★</text>
  <text x="640" y="145" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cu + Cl₂ 点燃 ★</text>
  <text x="700" y="145" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">2Fe + 3Cl₂</text>

  <text x="170" y="326" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">HCl + HClO</text>
  <text x="170" y="349" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">氯水 · 浅黄绿色</text>
  <text x="170" y="364" text-anchor="middle" font-size="9" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">HClO 光照 → HCl + O₂↑ ★</text>

  <text x="500" y="326" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">NaCl + NaClO</text>
  <text x="500" y="349" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">漂白液（有效成分 NaClO）</text>
  <text x="500" y="364" text-anchor="middle" font-size="9" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">2NaOH + Cl₂ → NaCl+NaClO+H₂O ★</text>

  <text x="800" y="326" text-anchor="middle" font-size="14" font-weight="bold" fill="#B9770E" font-family="Microsoft YaHei, SimHei, sans-serif">Ca(ClO)₂</text>
  <text x="800" y="349" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">漂白粉有效成分</text>

  <text x="270" y="300" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + H₂O ⇌ HCl + HClO ★</text>
  <text x="460" y="300" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + 2NaOH 常温 ★</text>
  <text x="770" y="300" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">2Cl₂+2Ca(OH)₂→</text>

  <text x="180" y="468" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">HCl 盐酸</text>
  <text x="180" y="488" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">无色液体 · 挥发性酸</text>

  <text x="500" y="466" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">NaClO（次氯酸钠）</text>
  <text x="500" y="488" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">漂白液 · 消毒</text>

  <text x="800" y="466" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">KClO₃（氯酸钾）</text>
  <text x="800" y="488" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">炸药·火柴</text>

  <text x="150" y="438" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + H₂ 点燃 ★</text>
  <text x="480" y="438" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + NaOH 歧化 ★</text>
  <text x="780" y="438" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">3Cl₂+6KOH △→5KCl+KClO₃+3H₂O</text>

  <text x="205" y="618" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ 实验室制法</text>
  <text x="205" y="640" text-anchor="middle" font-size="11" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">MnO₂ + 4HCl(浓) △</text>
  <text x="205" y="658" text-anchor="middle" font-size="10" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">→ MnCl₂ + Cl₂↑ + 2H₂O ★</text>

  <text x="575" y="618" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ 工业制法</text>
  <text x="575" y="640" text-anchor="middle" font-size="11" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">电解饱和食盐水</text>
  <text x="575" y="658" text-anchor="middle" font-size="10" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">2NaCl+2H₂O 电解→2NaOH+H₂↑+Cl₂↑ ★</text>

  <text x="860" y="622" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ → NaCl</text>
  <text x="860" y="645" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">尾气吸收 NaOH</text>

  <text x="180" y="595" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">MnO₂ + HCl(浓) △ ★</text>
  <text x="560" y="585" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">电解 NaCl 溶液 ★</text>
  <text x="850" y="595" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">2NaOH吸收</text>

  <text x="170" y="778" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂（溴）</text>
  <text x="170" y="800" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">深红棕色液体</text>

  <text x="500" y="778" text-anchor="middle" font-size="13" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">I₂（碘）★</text>
  <text x="500" y="800" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">紫黑色固体</text>

  <text x="820" y="778" text-anchor="middle" font-size="13" font-weight="bold" fill="#B9770E" font-family="Microsoft YaHei, SimHei, sans-serif">卤素置换规律</text>
  <text x="820" y="800" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ → Br⁻ → I⁻</text>

  <text x="240" y="750" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + 2NaBr → 2NaCl + Br₂</text>
  <text x="480" y="750" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + 2KI → 2KCl + I₂ ★</text>
  <text x="800" y="750" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">颜色加深 →</text>

  <text x="500" y="913" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A5276" font-family="Microsoft YaHei, SimHei, sans-serif">氧化性：F₂ → Cl₂ → Br₂ → I₂（递减弱）   还原性：F⁻ ← Cl⁻ ← Br⁻ ← I⁻（递增强）</text>

  <text x="500" y="968" text-anchor="middle" font-size="12" font-weight="bold" fill="#B9770E" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ 是联系金属/非金属/酸/碱/盐的核心枢纽</text>

  <text x="50" y="1028" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">全部化学方程式汇总</text>

  <text x="60" y="1056" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">2Na + Cl₂ →点燃→ 2NaCl</text>
  <text x="60" y="1076" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cu + Cl₂ →点燃→ CuCl₂（棕黄色烟）★高考</text>
  <text x="60" y="1096" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">2Fe + 3Cl₂ →点燃→ 2FeCl₃（褐色烟）★必考：生成+3价而非+2价</text>

  <text x="60" y="1122" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + H₂O ⇌ HCl + HClO（歧化反应）★高考  → HClO 有漂白性 + 杀菌作用</text>
  <text x="60" y="1142" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + 2NaOH → NaCl + NaClO + H₂O（制漂白液）★高考</text>
  <text x="60" y="1162" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">2Cl₂ + 2Ca(OH)₂ → CaCl₂ + Ca(ClO)₂ + 2H₂O（制漂白粉）</text>
  <text x="60" y="1182" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">Ca(ClO)₂ + CO₂ + H₂O → CaCO₃↓ + 2HClO（漂白原理）</text>

  <text x="60" y="1208" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + H₂ →点燃→ 2HCl（苍白色火焰）★  HCl极易溶于水 → 盐酸</text>
  <text x="60" y="1228" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">MnO₂ + 4HCl(浓) →△→ MnCl₂ + Cl₂↑ + 2H₂O（实验室制Cl₂）★必考</text>
  <text x="60" y="1248" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">2KMnO₄ + 16HCl(浓) → 2KCl + 2MnCl₂ + 5Cl₂↑ + 8H₂O（快速制Cl₂）</text>

  <text x="60" y="1274" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + 2NaBr → 2NaCl + Br₂（置换出溴）★   Cl₂ + 2KI → 2KCl + I₂（置换出碘）★</text>
  <text x="60" y="1294" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">2NaCl + 2H₂O →电解→ 2NaOH + H₂↑ + Cl₂↑（氯碱工业）</text>
  <text x="60" y="1314" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">3Cl₂ + 6KOH →△→ 5KCl + KClO₃ + 3H₂O（热碱 → 氯酸盐）</text>

  <text x="60" y="1342" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">漂白原理：HClO 的强氧化性漂白，不可逆 ★</text>
  <text x="60" y="1364" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl⁻ 检验：AgNO₃ + HNO₃ → AgCl↓（白色，不溶于HNO₃）★必考</text>
  <text x="60" y="1386" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">氯水成分：三分子(Cl₂,HClO,H₂O) + 四离子(H⁺,Cl⁻,ClO⁻,OH⁻) ★</text>

  <text x="60" y="1414" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">易错：Fe + Cl₂ → FeCl₃（+3价） 但 Fe + S → FeS（+2价单质S氧化性弱）</text>
  <text x="60" y="1436" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">干燥Cl₂无漂白性（须有水生成HClO）</text>
  <text x="60" y="1458" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">新制氯水 ≠ 久置氯水（久置即稀盐酸）；液氯 ≠ 氯水</text>

  <text x="500" y="1490" text-anchor="middle" font-size="11" fill="#999" font-family="Microsoft YaHei, SimHei, sans-serif">● 深蓝边框 = Cl₂节点  ● 红色边框/文字 = 高考高频考点  ● 橙色边框 = 重要副线</text>
  <text x="500" y="1510" text-anchor="middle" font-size="10" fill="#BBB" font-family="Microsoft YaHei, SimHei, sans-serif">高中化学 · 氯单质转化关系图 · 必修一</text>
</svg>