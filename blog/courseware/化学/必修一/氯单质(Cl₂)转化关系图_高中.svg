    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#C0392B"/></marker>
  </defs>

  <rect x="0" y="0" width="1000" height="54" fill="#1A5276" rx="0"/>
  <rect x="330" y="78" width="340" height="46" rx="12" fill="#D6EAF8" stroke="#1A5276" stroke-width="2.5"/>

  <rect x="30" y="170" width="195" height="52" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="250" y="170" width="195" height="52" rx="8" fill="#FDEBD0" stroke="#B9770E" stroke-width="2"/>
  <rect x="470" y="170" width="195" height="52" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="690" y="170" width="195" height="52" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>

  <path d="M400 124 L127 170" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
