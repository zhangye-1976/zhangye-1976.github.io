<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 1200" width="100%" height="100%">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#C0392B"/></marker>
  </defs>

  <rect x="0" y="0" width="950" height="52" fill="#7D3C98" rx="0"/>
  <rect x="330" y="74" width="290" height="44" rx="12" fill="#E8DAEF" stroke="#7D3C98" stroke-width="2.5"/>

  <rect x="30" y="160" width="220" height="52" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="290" y="160" width="220" height="52" rx="8" fill="#FDEBD0" stroke="#B9770E" stroke-width="2"/>
  <rect x="550" y="160" width="220" height="52" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>

  <path d="M400 118 L140 160" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M475 118 L400 160" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M530 118 L660 160" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>

  <line x1="20" y1="265" x2="930" y2="265" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="40" y="288" width="240" height="60" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="340" y="288" width="270" height="60" rx="8" fill="#FDEBD0" stroke="#B9770E" stroke-width="2"/>
  <rect x="670" y="288" width="220" height="60" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>

  <path d="M160 212 L160 288" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>
  <path d="M475 212 L475 288" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M660 212 L780 288" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <line x1="20" y1="400" x2="930" y2="400" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="100" y="425" width="220" height="60" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="380" y="425" width="260" height="60" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="700" y="425" width="180" height="60" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>

  <path d="M160 348 L210 425" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M475 348 L510 425" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>
  <path d="M760 348 L790 425" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <line x1="20" y1="535" x2="930" y2="535" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="30" y="560" width="890" height="28" rx="6" fill="#D5F5E3" stroke="#A9DFBF" stroke-width="1"/>

  <rect x="30" y="615" width="890" height="26" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1"/>

  <rect x="20" y="665" width="910" height="510" rx="14" fill="#F8F9FA" stroke="#D5D8DC" stroke-width="1"/>

  <text x="475" y="34" text-anchor="middle" fill="white" font-size="17" font-weight="bold" font-family="Microsoft YaHei, SimHei, sans-serif">溴单质（Br₂）转化关系图</text>

  <text x="475" y="102" text-anchor="middle" font-size="16" font-weight="bold" fill="#7D3C98" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ 深红棕色液体</text>

  <text x="140" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">NaBr</text>
  <text x="140" y="202" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">白色固体 · 感光材料</text>
  <text x="400" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#B9770E" font-family="Microsoft YaHei, SimHei, sans-serif">HBr（溴化氢）</text>
  <text x="400" y="202" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">无色气体</text>
  <text x="660" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">FeBr₃ ★</text>
  <text x="660" y="202" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">催化剂</text>

  <text x="330" y="140" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ + 2Na</text>
  <text x="430" y="140" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ + H₂ △</text>
  <text x="600" y="140" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">2Fe + 3Br₂ ★</text>

  <text x="160" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ + H₂O ⇌ HBr + HBrO ★</text>
  <text x="160" y="335" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">溴水 · 橙色</text>

  <text x="475" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#B9770E" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ + 2NaOH → NaBr + NaBrO + H₂O</text>
  <text x="475" y="335" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">与Cl₂反应相似</text>

  <text x="780" y="312" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">AgBr</text>
  <text x="780" y="335" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">淡黄色↓ · 感光</text>

  <text x="140" y="282" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">歧化反应 ★</text>
  <text x="450" y="282" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ + 2NaOH</text>
  <text x="720" y="282" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">Br⁻ + Ag⁺</text>

  <text x="210" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">CCl₄ 萃取</text>
  <text x="210" y="473" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">下层橙红色</text>
  <text x="510" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">Br⁻ 检验 ★</text>
  <text x="510" y="473" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">AgNO₃ → 淡黄色↓ 不溶于HNO₃</text>
  <text x="790" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">氯水氧化</text>
  <text x="790" y="473" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">→ 检验 Br⁻</text>

  <text x="160" y="420" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂(aq) + CCl₄</text>
  <text x="490" y="420" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Ag⁺ + Br⁻ 必考 ★</text>
  <text x="750" y="420" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + 2Br⁻ → Br₂ + 2Cl⁻</text>

  <text x="475" y="578" text-anchor="middle" font-size="14" font-weight="bold" fill="#7D3C98" font-family="Microsoft YaHei, SimHei, sans-serif">卤族氧化性：F₂ → Cl₂ → Br₂ → I₂（递减弱）   Br₂ 处于中间位置</text>

  <text x="475" y="634" text-anchor="middle" font-size="12" font-weight="bold" fill="#B9770E" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ 特性：唯一常温液态非金属单质  挥发性强（液溴保存：水封）</text>

  <text x="40" y="692" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">化学方程式汇总</text>

  <text x="50" y="718" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ + H₂O ⇌ HBr + HBrO（歧化反应，程度比Cl₂弱）★</text>
  <text x="50" y="740" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ + 2NaOH → NaBr + NaBrO + H₂O</text>
  <text x="50" y="762" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ + H₂ →△→ 2HBr（可逆，比Cl₂难）</text>
  <text x="50" y="784" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + 2NaBr → 2NaCl + Br₂（Br₂的制备方法）★</text>
  <text x="50" y="806" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ + 2NaI → 2NaBr + I₂（溴置换碘）</text>
  <text x="50" y="828" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">2Fe + 3Br₂ →△→ 2FeBr₃</text>
  <text x="50" y="850" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Ag⁺ + Br⁻ → AgBr↓（淡黄色，不溶于HNO₃）★检验Br⁻</text>

  <text x="50" y="878" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">易错：溴水 vs 液溴（溴水含HBrO有漂白性）；Br₂溶于CCl₄→下层橙红色</text>
  <text x="50" y="900" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">保存：液溴用水封（减少挥发） 不能用橡胶塞（Br₂腐蚀橡胶）</text>

  <text x="475" y="940" text-anchor="middle" font-size="11" fill="#999" font-family="Microsoft YaHei, SimHei, sans-serif">● 红色边框/文字 = 高考高频考点  ● 箭头旁标注反应条件和反应物</text>
  <text x="475" y="960" text-anchor="middle" font-size="10" fill="#BBB" font-family="Microsoft YaHei, SimHei, sans-serif">高中化学 · 溴单质转化关系图 · 必修一</text>
</svg>