<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" width="100%" role="img">
<title>物质转化关系总图</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t { font: 14px var(--font-sans, sans-serif); fill: var(--color-text-primary, #222); }
    .ts { font: 12px var(--font-sans, sans-serif); fill: var(--color-text-secondary, #555); }
    .th { font: 500 14px var(--font-sans, sans-serif); fill: var(--color-text-primary, #222); }
  </style>
</defs>

<text x="340" y="28" class="th" text-anchor="middle" font-size="15">物质类别间的转化关系总图</text>
<text x="340" y="46" class="ts" text-anchor="middle">依据：教材第一章第一节 + 整理与提升</text>

<!-- 左列: 金属单质 → 碱性氧化物 → 碱 → 盐 -->
<g class="node">
  <rect x="40" y="80" width="120" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="100" y="106" class="th" text-anchor="middle" dominant-baseline="central">金属单质</text>
</g>
<g class="node">
  <rect x="40" y="190" width="120" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="100" y="216" class="th" text-anchor="middle" dominant-baseline="central">碱性氧化物</text>
</g>
<g class="node">
  <rect x="40" y="300" width="120" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="100" y="326" class="th" text-anchor="middle" dominant-baseline="central">碱</text>
</g>

<!-- 右列: 非金属单质 → 酸性氧化物 → 酸 → 盐 -->
<g class="node">
  <rect x="520" y="80" width="120" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="580" y="106" class="th" text-anchor="middle" dominant-baseline="central">非金属单质</text>
</g>
<g class="node">
  <rect x="520" y="190" width="120" height="44" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="580" y="216" class="th" text-anchor="middle" dominant-baseline="central">酸性氧化物</text>
</g>
<g class="node">
  <rect x="520" y="300" width="120" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="580" y="326" class="th" text-anchor="middle" dominant-baseline="central">酸</text>
</g>

<!-- 中间: 盐 -->
<g class="node">
  <rect x="280" y="390" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="416" class="th" text-anchor="middle" dominant-baseline="central">盐</text>
</g>

<!-- 竖向箭头 金属侧 -->
<polyline points="100,124 100,188" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="66" y="162" class="ts">+ O₂</text>

<polyline points="100,234 100,298" fill="none" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="66" y="272" class="ts">+ H₂O</text>

<!-- 竖向箭头 非金属侧 -->
<polyline points="580,124 580,188" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="592" y="162" class="ts">+ O₂</text>

<polyline points="580,234 580,298" fill="none" stroke="#993556" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="592" y="272" class="ts">+ H₂O</text>

<!-- 碱 → 盐 -->
<polyline points="120,344 200,414 280,414" fill="none" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="162" y="398" class="ts">+ 酸</text>

<!-- 酸 → 盐 -->
<polyline points="560,344 480,414 400,414" fill="none" stroke="#A32D2D" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="496" y="398" class="ts">+ 碱</text>

<!-- 碱性氧化物 → 盐 -->
<polyline points="100,344 100,434 280,434" fill="none" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="4 2"/>
<text x="52" y="434" class="ts" font-size="11">+ 酸</text>

<!-- 酸性氧化物 → 盐 -->
<polyline points="580,344 580,452 400,452" fill="none" stroke="#993556" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="4 2"/>
<text x="586" y="452" class="ts" font-size="11">+ 碱</text>

<!-- 横向连线：碱性氧化物 ← → 酸性氧化物（盐生成） -->
<polyline points="162,212 340,212 518,212" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="5 2"/>
<text x="290" y="208" class="ts">+ 对方 → 盐 + H₂O</text>

<!-- 横向连线：碱 ← → 酸 -->
<polyline points="162,322 340,322 518,322" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="5 2"/>
<text x="290" y="318" class="ts">中和反应 → 盐 + H₂O</text>

<!-- 底部图例 -->
<rect x="40" y="460" width="12" height="6" fill="none" stroke="#5F5E5A" stroke-width="1"/>
<text x="56" y="467" class="ts">实线：主要转化路径</text>
<rect x="240" y="460" width="18" height="6" fill="none" stroke="#5F5E5A" stroke-dasharray="4 2" stroke-width="1"/>
<text x="262" y="467" class="ts">虚线：辅助转化路径</text>
</svg>