<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 1150" width="100%" height="100%">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="aR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#C0392B"/></marker>
  </defs>

  <rect x="0" y="0" width="950" height="52" fill="#6C3483" rx="0"/>
  <rect x="330" y="74" width="290" height="44" rx="12" fill="#E8DAEF" stroke="#6C3483" stroke-width="2.5"/>

  <rect x="30" y="160" width="210" height="52" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="280" y="160" width="210" height="52" rx="8" fill="#FDEBD0" stroke="#B9770E" stroke-width="2"/>
  <rect x="530" y="160" width="210" height="52" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>

  <path d="M400 118 L135 160" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M475 118 L385 160" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M530 118 L635 160" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>

  <line x1="20" y1="265" x2="930" y2="265" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="100" y="288" width="180" height="60" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="340" y="288" width="270" height="60" rx="8" fill="#FDEBD0" stroke="#B9770E" stroke-width="2"/>
  <rect x="670" y="288" width="200" height="60" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>

  <path d="M190 212 L190 288" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>
  <path d="M475 212 L475 288" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M635 212 L770 288" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <line x1="20" y1="400" x2="930" y2="400" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="100" y="425" width="220" height="60" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>
  <rect x="380" y="425" width="190" height="60" rx="8" fill="#F8F9FA" stroke="#7F8C8D" stroke-width="1"/>
  <rect x="630" y="425" width="220" height="60" rx="8" fill="#FDEDEC" stroke="#C0392B" stroke-width="2.5"/>

  <path d="M190 348 L210 425" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>
  <path d="M475 348 L475 425" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M770 348 L740 425" stroke="#C0392B" stroke-width="2" fill="none" marker-end="url(#aR)"/>

  <line x1="20" y1="535" x2="930" y2="535" stroke="#E5E7E9" stroke-width="0.5"/>

  <rect x="30" y="560" width="890" height="28" rx="6" fill="#D5F5E3" stroke="#A9DFBF" stroke-width="1"/>

  <rect x="30" y="615" width="890" height="26" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1"/>

  <rect x="20" y="665" width="910" height="460" rx="14" fill="#F8F9FA" stroke="#D5D8DC" stroke-width="1"/>

  <text x="475" y="34" text-anchor="middle" fill="white" font-size="17" font-weight="bold" font-family="Microsoft YaHei, SimHei, sans-serif">碘单质（I₂）转化关系图</text>

  <text x="475" y="102" text-anchor="middle" font-size="16" font-weight="bold" fill="#6C3483" font-family="Microsoft YaHei, SimHei, sans-serif">I₂ 紫黑色固体（易升华）</text>

  <text x="135" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">NaI / KI</text>
  <text x="135" y="202" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">白色固体</text>
  <text x="385" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#B9770E" font-family="Microsoft YaHei, SimHei, sans-serif">HI（碘化氢）</text>
  <text x="385" y="202" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">不稳定 · 易分解</text>
  <text x="635" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">I₂ + 淀粉 ★</text>
  <text x="635" y="202" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">变蓝（特征反应）</text>

  <text x="310" y="140" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">I₂ + 2Na</text>
  <text x="440" y="140" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">I₂ + H₂ ⇌ 2HI</text>
  <text x="590" y="140" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">特征反应 ★</text>

  <text x="190" y="312" text-anchor="middle" font-size="13" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">I⁻ 检验 ★</text>
  <text x="190" y="335" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">Ag⁺ → AgI↓ 黄色 不溶于HNO₃</text>

  <text x="475" y="312" text-anchor="middle" font-size="13" font-weight="bold" fill="#B9770E" font-family="Microsoft YaHei, SimHei, sans-serif">I₂ 的溶解性</text>
  <text x="475" y="335" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">水：微溶（棕黄） CCl₄：易溶（紫）</text>

  <text x="770" y="312" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">人工降雨</text>
  <text x="770" y="335" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">AgI 晶核</text>

  <text x="160" y="282" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">必考 ★</text>
  <text x="455" y="282" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">萃取 分层</text>
  <text x="720" y="282" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">AgI 感光</text>

  <text x="210" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">碘量法 ★</text>
  <text x="210" y="473" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">2S₂O₃²⁻ + I₂ → S₄O₆²⁻ + 2I⁻</text>
  <text x="475" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">碘盐（KIO₃）</text>
  <text x="475" y="473" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">IO₃⁻ + 5I⁻ + 6H⁺ → 3I₂ + 3H₂O</text>
  <text x="740" y="450" text-anchor="middle" font-size="14" font-weight="bold" fill="#922B21" font-family="Microsoft YaHei, SimHei, sans-serif">置换反应 ★</text>
  <text x="740" y="473" text-anchor="middle" font-size="10" fill="#7F8C8D" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + 2I⁻ → I₂ + 2Cl⁻</text>

  <text x="190" y="420" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">高考选考 ★</text>
  <text x="450" y="420" text-anchor="middle" font-size="9" fill="#555" font-family="Microsoft YaHei, SimHei, sans-serif">IO₃⁻ + I⁻ → I₂</text>
  <text x="700" y="420" text-anchor="middle" font-size="9" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂/Br₂ 均可置换I₂ ★</text>

  <text x="475" y="578" text-anchor="middle" font-size="13" font-weight="bold" fill="#6C3483" font-family="Microsoft YaHei, SimHei, sans-serif">卤族氧化性：F₂ → Cl₂ → Br₂ → I₂   I₂ 最弱   I⁻ 还原性最强</text>

  <text x="475" y="634" text-anchor="middle" font-size="12" font-weight="bold" fill="#B9770E" font-family="Microsoft YaHei, SimHei, sans-serif">I₂ 特性：易升华（固→气）· 遇淀粉变蓝 · I⁻ 是强还原剂</text>

  <text x="40" y="692" font-size="13" font-weight="bold" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">化学方程式汇总</text>

  <text x="50" y="718" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">I₂ + 淀粉 → 蓝色（特征检验，灵敏度极高）★必考</text>
  <text x="50" y="740" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Cl₂ + 2KI → 2KCl + I₂（置换出I₂，湿润淀粉-KI试纸变蓝）★高考</text>
  <text x="50" y="762" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Br₂ + 2KI → 2KBr + I₂ ★</text>
  <text x="50" y="784" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">I₂ + H₂ ⇌ 2HI（可逆，HI热稳定性差，易分解）</text>
  <text x="50" y="806" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">Ag⁺ + I⁻ → AgI↓（黄色，不溶于HNO₃）★检验I⁻（比AgBr颜色更深）</text>
  <text x="50" y="828" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">I₂ + 2Na₂S₂O₃ → Na₂S₄O₆ + 2NaI（碘量法原理）</text>
  <text x="50" y="850" font-size="12" fill="#2C3E50" font-family="Microsoft YaHei, SimHei, sans-serif">IO₃⁻ + 5I⁻ + 6H⁺ → 3I₂ + 3H₂O（碘盐中碘的检验原理）</text>
  <text x="50" y="872" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">2Fe³⁺ + 2I⁻ → 2Fe²⁺ + I₂（I⁻还原性＞Fe²⁺）★</text>

  <text x="50" y="900" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">易错：I⁻检验用Ag⁺或氯水+CCl₄；I₂溶于CCl₄→下层紫色（非橙红！区别于Br₂）</text>
  <text x="50" y="922" font-size="12" fill="#C0392B" font-family="Microsoft YaHei, SimHei, sans-serif">升华是物理变化；卤化银颜色：AgCl白/AgBr淡黄/AgI黄（从上到下加深）</text>

  <text x="475" y="960" text-anchor="middle" font-size="11" fill="#999" font-family="Microsoft YaHei, SimHei, sans-serif">● 红色边框/文字 = 高考高频考点  ● 箭头旁标注反应条件和反应物</text>
  <text x="475" y="980" text-anchor="middle" font-size="10" fill="#BBB" font-family="Microsoft YaHei, SimHei, sans-serif">高中化学 · 碘单质转化关系图 · 必修一</text>
</svg>