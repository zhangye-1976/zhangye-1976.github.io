<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 820" font-family="'Microsoft YaHei','SimHei',sans-serif">
  <defs>
    <marker id="iaRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
    <linearGradient id="iaHdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>

  <rect width="920" height="820" fill="#FFF8E1" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="920" height="48" fill="url(#iaHdr)" rx="12"/>
  <rect x="0" y="36" width="920" height="12" fill="url(#iaHdr)"/>
  <text x="460" y="31" text-anchor="middle" fill="white" font-size="20" font-weight="bold">IA族 碱金属元素比较图 — 通性与个性（Li / Na / K）</text>

  <!-- Section: Properties Table -->
  <rect x="20" y="65" width="880" height="340" rx="8" fill="white" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="460" y="88" text-anchor="middle" fill="#E65100" font-size="16" font-weight="bold">📋 碱金属元素性质递变规律</text>

  <!-- Table headers -->
  <rect x="35" y="100" width="95" height="28" rx="3" fill="#FFE0B2"/>
  <text x="82" y="119" text-anchor="middle" fill="#E65100" font-size="12" font-weight="bold">性质</text>

  <rect x="135" y="100" width="120" height="28" rx="3" fill="#FFF9C4"/>
  <text x="195" y="119" text-anchor="middle" fill="#F57F17" font-size="12" font-weight="bold">Li（锂）</text>

  <rect x="260" y="100" width="140" height="28" rx="3" fill="#FFD54F"/>
  <text x="330" y="119" text-anchor="middle" fill="#E65100" font-size="12" font-weight="bold">Na（钠）</text>

  <rect x="405" y="100" width="140" height="28" rx="3" fill="#FFCC80"/>
  <text x="475" y="119" text-anchor="middle" fill="#BF360C" font-size="12" font-weight="bold">K（钾）</text>

  <rect x="550" y="100" width="345" height="28" rx="3" fill="#FFF3E0"/>
  <text x="722" y="119" text-anchor="middle" fill="#BF360C" font-size="12" font-weight="bold">递变方向（上→下）</text>

  <!-- Rows -->
  <rect x="35" y="132" width="860" height="1" fill="#EEE"/>

  <text x="82" y="155" text-anchor="middle" fill="#333" font-size="11">原子半径</text>
  <text x="195" y="155" text-anchor="middle" fill="#333" font-size="11">152pm</text>
  <text x="330" y="155" text-anchor="middle" fill="#333" font-size="11">186pm</text>
  <text x="475" y="155" text-anchor="middle" fill="#333" font-size="11">227pm</text>
  <text x="722" y="155" text-anchor="middle" fill="#D32F2F" font-size="12" font-weight="bold">递增 ↑（核外电子层增多）</text>

  <rect x="35" y="167" width="860" height="1" fill="#EEE"/>

  <text x="82" y="190" text-anchor="middle" fill="#333" font-size="11">最外层电子</text>
  <text x="195" y="190" text-anchor="middle" fill="#1565C0" font-size="12" font-weight="bold">1</text>
  <text x="330" y="190" text-anchor="middle" fill="#1565C0" font-size="12" font-weight="bold">1</text>
  <text x="475" y="190" text-anchor="middle" fill="#1565C0" font-size="12" font-weight="bold">1</text>
  <text x="722" y="190" text-anchor="middle" fill="#1565C0" font-size="12" font-weight="bold">通性：均为1 → +1价</text>

  <rect x="35" y="202" width="860" height="1" fill="#EEE"/>

  <text x="82" y="225" text-anchor="middle" fill="#333" font-size="11">金属性</text>
  <text x="195" y="225" text-anchor="middle" fill="#333" font-size="11">较弱</text>
  <text x="330" y="225" text-anchor="middle" fill="#333" font-size="11">强</text>
  <text x="475" y="225" text-anchor="middle" fill="#333" font-size="11">很强</text>
  <text x="722" y="225" text-anchor="middle" fill="#D32F2F" font-size="12" font-weight="bold">递增 ↑</text>

  <rect x="35" y="237" width="860" height="1" fill="#EEE"/>

  <text x="82" y="260" text-anchor="middle" fill="#333" font-size="11">熔点</text>
  <text x="195" y="260" text-anchor="middle" fill="#333" font-size="11">180.5°C</text>
  <text x="330" y="260" text-anchor="middle" fill="#333" font-size="11">97.8°C</text>
  <text x="475" y="260" text-anchor="middle" fill="#333" font-size="11">63.6°C</text>
  <text x="722" y="260" text-anchor="middle" fill="#D32F2F" font-size="12" font-weight="bold">递减 ↓</text>

  <rect x="35" y="272" width="860" height="1" fill="#EEE"/>

  <text x="82" y="295" text-anchor="middle" fill="#333" font-size="11">保存方式</text>
  <text x="195" y="295" text-anchor="middle" fill="#333" font-size="11">石蜡油</text>
  <text x="330" y="295" text-anchor="middle" fill="#333" font-size="11">煤油</text>
  <text x="475" y="295" text-anchor="middle" fill="#333" font-size="11">煤油</text>
  <text x="722" y="295" text-anchor="middle" fill="#795548" font-size="11">越往下越活泼</text>

  <rect x="35" y="307" width="860" height="1" fill="#EEE"/>

  <text x="82" y="330" text-anchor="middle" fill="#333" font-size="11">与O₂反应</text>
  <text x="195" y="330" text-anchor="middle" fill="#333" font-size="11">Li₂O</text>
  <text x="330" y="330" text-anchor="middle" fill="#333" font-size="11">Na₂O/Na₂O₂</text>
  <text x="475" y="330" text-anchor="middle" fill="#333" font-size="11">K₂O/KO₂</text>
  <text x="722" y="330" text-anchor="middle" fill="#D32F2F" font-size="12" font-weight="bold">越往下越复杂!</text>

  <rect x="35" y="342" width="860" height="1" fill="#EEE"/>

  <text x="82" y="365" text-anchor="middle" fill="#333" font-size="11">与水反应</text>
  <text x="195" y="365" text-anchor="middle" fill="#333" font-size="11">缓慢</text>
  <text x="330" y="365" text-anchor="middle" fill="#333" font-size="11">剧烈（熔成闪亮小球）</text>
  <text x="475" y="365" text-anchor="middle" fill="#333" font-size="11">极剧烈（燃烧）</text>
  <text x="722" y="365" text-anchor="middle" fill="#D32F2F" font-size="12" font-weight="bold">越往下越剧烈</text>

  <rect x="35" y="377" width="860" height="1" fill="#EEE"/>

  <text x="82" y="395" text-anchor="middle" fill="#333" font-size="11">焰色</text>
  <text x="195" y="395" text-anchor="middle" fill="#D50000" font-size="11" font-weight="bold">■ 紫红</text>
  <text x="330" y="395" text-anchor="middle" fill="#FFD600" font-size="11" font-weight="bold">■ 黄</text>
  <text x="475" y="395" text-anchor="middle" fill="#7B1FA2" font-size="11" font-weight="bold">■ 紫（透过蓝色钴玻璃）</text>
  <text x="722" y="395" text-anchor="middle" fill="#795548" font-size="11">各自不同</text>

  <!-- Key reactions -->
  <rect x="20" y="420" width="880" height="180" rx="8" fill="white" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="460" y="443" text-anchor="middle" fill="#E65100" font-size="15" font-weight="bold">🔬 核心反应对比</text>
  <line x1="40" y1="453" x2="900" y2="453" stroke="#EEE" stroke-width="1"/>

  <text x="40" y="475" fill="#333" font-size="12">
    <tspan x="40" dy="0" font-weight="bold">与水反应通式：2M + 2H₂O → 2MOH + H₂↑</tspan>
    <tspan x="40" dy="20" fill="#D32F2F">Li + H₂O 缓慢（LiOH微溶）</tspan>
    <tspan x="460" dy="-20" fill="#D32F2F">Na + H₂O 剧烈，钠熔成闪亮小球四处游动</tspan>
  </text>

  <text x="40" y="520" fill="#333" font-size="12">
    <tspan x="40" dy="0" fill="#D32F2F">K + H₂O 极剧烈，伴随燃烧和微弱爆炸</tspan>
    <tspan x="40" dy="20" fill="#1565C0">通性：① 最外层1e⁻ → 易失 → 强金属性 → 强还原性</tspan>
    <tspan x="40" dy="20" fill="#1565C0">      ② 氢氧化物 NaOH/KOH 均为强碱，碱性递增 Li→Cs</tspan>
  </text>

  <!-- Distinctions -->
  <rect x="20" y="615" width="430" height="190" rx="8" fill="white" stroke="#1565C0" stroke-width="2"/>
  <text x="235" y="638" text-anchor="middle" fill="#1565C0" font-size="14" font-weight="bold">🔵 通性（相似原因）</text>
  <line x1="35" y1="648" x2="435" y2="648" stroke="#EEE" stroke-width="1"/>

  <text x="35" y="670" fill="#333" font-size="12">
    <tspan x="35" dy="0">· 最外层均为 1e⁻ → 易失去 → +1价</tspan>
    <tspan x="35" dy="20">· 均为活泼金属 → 强还原剂</tspan>
    <tspan x="35" dy="20">· 氧化物 M₂O / 过氧化物 M₂O₂</tspan>
    <tspan x="35" dy="20">· 氢氧化物 MOH 为强碱</tspan>
    <tspan x="35" dy="20">· 与H₂O反应：2M + 2H₂O → 2MOH + H₂↑</tspan>
  </text>

  <rect x="470" y="615" width="430" height="190" rx="8" fill="white" stroke="#D32F2F" stroke-width="2"/>
  <text x="685" y="638" text-anchor="middle" fill="#D32F2F" font-size="14" font-weight="bold">🔴 个性（差异原因：电子层数不同）</text>
  <line x1="485" y1="648" x2="885" y2="648" stroke="#EEE" stroke-width="1"/>

  <text x="485" y="670" fill="#333" font-size="12">
    <tspan x="485" dy="0" fill="#D32F2F">· 从上到下：半径↑ 金属性↑ 还原性↑</tspan>
    <tspan x="485" dy="20" fill="#D32F2F">· 熔点递减（金属键减弱）</tspan>
    <tspan x="485" dy="20" fill="#D32F2F">· 与水反应剧烈程度递增</tspan>
    <tspan x="485" dy="20" fill="#D32F2F">· 氧化物类型：Li→Li₂O  Na→Na₂O₂  K→KO₂</tspan>
    <tspan x="485" dy="20">· Li 的个性（对角线规则）：与 Mg 更相似</tspan>
    <tspan x="485" dy="20">   Li₂CO₃热分解、LiOH溶解度小</tspan>
  </text>

</svg>