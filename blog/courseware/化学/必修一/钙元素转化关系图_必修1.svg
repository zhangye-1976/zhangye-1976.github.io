<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="'Microsoft YaHei','SimHei',sans-serif">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F57C00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="url(#bgGrad)" rx="12"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="52" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="40" width="900" height="12" fill="url(#headerGrad)"/>
  <text x="450" y="34" text-anchor="middle" fill="white" font-size="22" font-weight="bold">钙(Ca) 元素转化关系图 — 必修1</text>

  <!-- Ca (center, yellow) -->
  <rect x="375" y="80" width="150" height="48" rx="24" fill="#FFD54F" stroke="#F57C00" stroke-width="2.5"/>
  <text x="450" y="110" text-anchor="middle" fill="#E65100" font-size="20" font-weight="bold">Ca（单质）</text>

  <!-- CaO (top right) -->
  <rect x="590" y="80" width="130" height="48" rx="10" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2"/>
  <text x="655" y="110" text-anchor="middle" fill="#1A237E" font-size="17" font-weight="bold">CaO（生石灰）</text>

  <!-- Ca(OH)₂ (right) -->
  <rect x="640" y="200" width="160" height="48" rx="10" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2"/>
  <text x="720" y="230" text-anchor="middle" fill="#1A237E" font-size="16" font-weight="bold">Ca(OH)₂（熟石灰）</text>

  <!-- CaCO₃ (bottom right) -->
  <rect x="600" y="340" width="150" height="48" rx="10" fill="#FFCDD2" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="675" y="370" text-anchor="middle" fill="#B71C1C" font-size="17" font-weight="bold">CaCO₃（石灰石）</text>

  <!-- Ca(HCO₃)₂ (bottom center) -->
  <rect x="370" y="420" width="180" height="48" rx="10" fill="#FFCDD2" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="460" y="450" text-anchor="middle" fill="#B71C1C" font-size="15" font-weight="bold">Ca(HCO₃)₂（可溶）</text>

  <!-- CaCl₂ (bottom left) -->
  <rect x="100" y="280" width="140" height="48" rx="10" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2"/>
  <text x="170" y="310" text-anchor="middle" fill="#1A237E" font-size="17" font-weight="bold">CaCl₂（盐）</text>

  <!-- CaSO₄ (left) -->
  <rect x="60" y="180" width="140" height="48" rx="10" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2"/>
  <text x="130" y="210" text-anchor="middle" fill="#1A237E" font-size="16" font-weight="bold">CaSO₄（石膏）</text>

  <!-- Ca₃(PO₄)₂ (top left) -->
  <rect x="80" y="80" width="160" height="48" rx="10" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2"/>
  <text x="160" y="110" text-anchor="middle" fill="#1A237E" font-size="15" font-weight="bold">Ca₃(PO₄)₂（磷矿）</text>

  <!-- Arrows -->
  <!-- Ca → CaO -->
  <line x1="480" y1="104" x2="585" y2="104" stroke="#1565C0" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <text x="533" y="96" text-anchor="middle" fill="#1565C0" font-size="11">+O₂点燃</text>

  <!-- Ca → Ca₃(PO₄)₂ -->
  <line x1="375" y1="95" x2="245" y2="95" stroke="#1565C0" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <text x="310" y="88" text-anchor="middle" fill="#1565C0" font-size="11">+H₃PO₄</text>

  <!-- Ca → Ca(OH)₂ -->
  <line x1="450" y1="128" x2="450" y2="160" stroke="#1565C0" stroke-width="2.2"/>
  <line x1="450" y1="160" x2="680" y2="196" stroke="#1565C0" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <text x="565" y="170" text-anchor="middle" fill="#1565C0" font-size="11">+H₂O(冷水)</text>

  <!-- Ca → CaCl₂ -->
  <line x1="375" y1="120" x2="245" y2="295" stroke="#1565C0" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <text x="260" y="215" text-anchor="middle" fill="#1565C0" font-size="11" transform="rotate(-55,260,215)">+HCl</text>

  <!-- Ca → CaSO₄ -->
  <line x1="375" y1="105" x2="205" y2="200" stroke="#1565C0" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <text x="250" y="145" text-anchor="middle" fill="#1565C0" font-size="11">+浓H₂SO₄</text>

  <!-- CaO → Ca(OH)₂ -->
  <line x1="655" y1="128" x2="695" y2="196" stroke="#2E7D32" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <text x="700" y="168" text-anchor="middle" fill="#2E7D32" font-size="11">+H₂O</text>

  <!-- CaO → CaCl₂ -->
  <line x1="630" y1="128" x2="200" y2="276" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="380" y="210" text-anchor="middle" fill="#2E7D32" font-size="11">+HCl</text>

  <!-- Ca(OH)₂ → CaCO₃ -->
  <line x1="700" y1="248" x2="670" y2="336" stroke="#D32F2F" stroke-width="2.8" marker-end="url(#arrowRed)"/>
  <text x="710" y="298" text-anchor="middle" fill="#D32F2F" font-size="12" font-weight="bold">+CO₂ ↓白</text>

  <!-- CaCO₃ → Ca(HCO₃)₂ -->
  <line x1="600" y1="375" x2="545" y2="435" stroke="#D32F2F" stroke-width="2.8" marker-end="url(#arrowRed)"/>
  <text x="530" y="412" text-anchor="middle" fill="#D32F2F" font-size="12" font-weight="bold">+CO₂+H₂O</text>

  <!-- Ca(HCO₃)₂ → CaCO₃ -->
  <line x1="460" y1="420" x2="640" y2="392" stroke="#D32F2F" stroke-width="2.8" marker-end="url(#arrowRed)"/>
  <text x="560" y="392" text-anchor="middle" fill="#D32F2F" font-size="12" font-weight="bold">△ 加热分解</text>

  <!-- CaCO₃ → CaO -->
  <line x1="660" y1="340" x2="660" y2="133" stroke="#D32F2F" stroke-width="2.8" marker-end="url(#arrowRed)"/>
  <text x="680" y="230" text-anchor="middle" fill="#D32F2F" font-size="12" font-weight="bold">高温△</text>

  <!-- Ca(OH)₂ → CaCl₂ -->
  <line x1="640" y1="220" x2="245" y2="290" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="420" y="280" text-anchor="middle" fill="#2E7D32" font-size="11">+HCl</text>

  <!-- CaCO₃ → CaCl₂ -->
  <line x1="600" y1="360" x2="245" y2="310" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="370" y="355" text-anchor="middle" fill="#2E7D32" font-size="11">+HCl</text>

  <!-- CaSO₄ related -->
  <line x1="200" y1="195" x2="100" y2="295" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="110" y="252" text-anchor="middle" fill="#2E7D32" font-size="11">+BaCl₂</text>

  <!-- Legend -->
  <rect x="20" y="510" width="860" height="185" rx="8" fill="white" stroke="#DDD" stroke-width="1"/>
  <text x="450" y="535" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">📋 核心化学方程式</text>

  <line x1="40" y1="545" x2="860" y2="545" stroke="#EEE" stroke-width="1"/>

  <text x="40" y="565" fill="#333" font-size="12">
    <tspan x="40" dy="0">① 2Ca + O₂ → 2CaO（点燃）</tspan>
    <tspan x="40" dy="18">② CaO + H₂O → Ca(OH)₂</tspan>
    <tspan x="40" dy="18">③ Ca(OH)₂ + CO₂ → CaCO₃↓ + H₂O</tspan>
    <tspan x="460" dy="-36">⑥ CaCO₃ → CaO + CO₂↑（高温△）</tspan>
    <tspan x="460" dy="18">⑦ Ca + 2HCl → CaCl₂ + H₂↑</tspan>
    <tspan x="460" dy="18">⑧ CaO + 2HCl → CaCl₂ + H₂O</tspan>
  </text>

  <text x="40" y="635" fill="#333" font-size="12">
    <tspan x="40" dy="0" font-weight="bold" fill="#D32F2F">★ 高频考点：</tspan>
    <tspan x="40" dy="18" fill="#D32F2F">④ CaCO₃ + CO₂ + H₂O → Ca(HCO₃)₂（溶洞形成）</tspan>
    <tspan x="40" dy="18" fill="#D32F2F">⑤ Ca(HCO₃)₂ → CaCO₃↓ + CO₂↑ + H₂O（△，水垢形成）</tspan>
    <tspan x="40" dy="18" fill="#D32F2F">→ 溶洞/钟乳石/水垢/暂时硬水 四大考点本质相同！CaCO₃ ⇄ Ca(HCO₃)₂ 互变</tspan>
  </text>

  <!-- CaCO₃ decomposition label - red highlight -->
  <rect x="720" y="215" width="155" height="90" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="798" y="235" text-anchor="middle" fill="#B71C1C" font-size="11" font-weight="bold">⚠ 工业制生石灰</text>
  <text x="798" y="252" text-anchor="middle" fill="#B71C1C" font-size="10">CaCO₃ → CaO + CO₂↑</text>
  <text x="798" y="270" text-anchor="middle" fill="#B71C1C" font-size="10">高温分解！</text>
  <text x="798" y="290" text-anchor="middle" fill="#B71C1C" font-size="10">石灰石→生石灰</text>

  <!-- Solubility note -->
  <rect x="20" y="80" width="50" height="40" rx="4" fill="#FFF3E0" stroke="#FFA726" stroke-width="1"/>
  <text x="45" y="100" text-anchor="middle" fill="#E65100" font-size="10">Ca(OH)₂</text>
  <text x="45" y="114" text-anchor="middle" fill="#E65100" font-size="9">微溶!</text>

  <!-- Flame test note -->
  <rect x="380" y="500" width="140" height="28" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
  <text x="450" y="519" text-anchor="middle" fill="#E65100" font-size="12" font-weight="bold">焰色反应：砖红色</text>
</svg>