<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" width="100%" role="img">
<title>钠元素转化关系图 - 必修1</title>
<desc>展示钠单质及其化合物之间的转化关系，箭头标注反应条件和参与物质，红色标注高考高频考点</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- 标题 -->
<rect x="40" y="20" width="600" height="36" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text class="th" x="340" y="43" text-anchor="middle" dominant-baseline="central" style="font-size:14px;fill:#0C447C;">钠(Na)元素转化关系图</text>

<!-- 说明 -->
<text class="ts" x="340" y="66" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#5F5E5A;">箭头标注反应条件 · 红色=高考高频考点 · 虚线=可逆/副反应</text>

<!-- ===== 第一层：Na单质 ===== -->
<g class="node c-blue">
  <rect x="260" y="82" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text class="th" x="340" y="104" text-anchor="middle" dominant-baseline="central" style="font-size:14px;fill:#0C447C;">Na  钠单质</text>
  <text class="ts" x="340" y="124" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#5F5E5A;">银白色 · 质软 · 密度&lt;水</text>
</g>

<!-- Na → Na₂O (常温/久置空气) -->
<line x1="300" y1="138" x2="160" y2="198" stroke="#378ADD" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="4,3"/>
<text class="ts" x="220" y="163" text-anchor="middle" style="font-size:10px;fill:#5F5E5A;">常温/久置空气</text>
<text class="ts" x="220" y="176" text-anchor="middle" style="font-size:10px;fill:#5F5E5A;">4Na+O₂=2Na₂O</text>

<!-- Na → Na₂O₂ (点燃/加热) 【高考高频考点】-->
<line x1="380" y1="138" x2="520" y2="198" stroke="#E24B4A" stroke-width="2" marker-end="url(#arr-red)"/>
<text style="font-size:10px;fill:#A32D2D;font-weight:500;" x="460" y="160" text-anchor="middle">点燃/加热 ★高考</text>
<text style="font-size:10px;fill:#A32D2D;" x="460" y="173" text-anchor="middle">2Na+O₂=Na₂O₂</text>

<!-- ===== 第二层：Na₂O 和 Na₂O₂ ===== -->
<!-- Na₂O -->
<g class="node c-blue">
  <rect x="60" y="198" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text class="th" x="140" y="220" text-anchor="middle" dominant-baseline="central" style="font-size:14px;fill:#0C447C;">Na₂O  氧化钠</text>
  <text class="ts" x="140" y="240" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#5F5E5A;">白色固体 · 碱性氧化物</text>
</g>

<!-- Na₂O₂ -->
<g class="node c-red">
  <rect x="440" y="198" width="160" height="56" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
  <text class="th" x="520" y="220" text-anchor="middle" dominant-baseline="central" style="font-size:14px;fill:#791F1F;">Na₂O₂  过氧化钠 ★</text>
  <text class="ts" x="520" y="240" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#A32D2D;">淡黄色 · 强氧化性 · 高考必考</text>
</g>

<!-- Na₂O + H₂O → NaOH -->
<line x1="140" y1="254" x2="140" y2="314" stroke="#378ADD" stroke-width="1" marker-end="url(#arr)"/>
<text class="ts" x="175" y="280" style="font-size:10px;fill:#5F5E5A;">+H₂O 常温</text>
<text class="ts" x="175" y="293" style="font-size:10px;fill:#5F5E5A;">Na₂O+H₂O=2NaOH</text>

<!-- Na₂O + CO₂ → Na₂CO₃ -->
<line x1="60" y1="254" x2="60" y2="290" stroke="#378ADD" stroke-width="1" marker-end="url(#arr)"/>
<text class="ts" x="20" y="268" style="font-size:10px;fill:#5F5E5A;">+CO₂</text>

<!-- ===== Na₂O₂ 的核心反应（高考高频）===== -->
<!-- Na₂O₂ + H₂O → NaOH + O₂ 【高考高频】-->
<line x1="440" y1="254" x2="200" y2="330" stroke="#E24B4A" stroke-width="2" marker-end="url(#arr-red)"/>
<text style="font-size:10px;fill:#A32D2D;font-weight:500;" x="300" y="280" text-anchor="middle">+H₂O ★高考必考</text>
<text style="font-size:9px;fill:#A32D2D;" x="300" y="292" text-anchor="middle">2Na₂O₂+2H₂O=4NaOH+O₂↑</text>

<!-- Na₂O₂ + CO₂ → Na₂CO₃ + O₂ 【高考高频】-->
<line x1="600" y1="254" x2="500" y2="330" stroke="#E24B4A" stroke-width="2" marker-end="url(#arr-red)"/>
<text style="font-size:10px;fill:#A32D2D;font-weight:500;" x="570" y="280" text-anchor="middle">+CO₂ ★高考</text>
<text style="font-size:9px;fill:#A32D2D;" x="570" y="292" text-anchor="middle">2Na₂O₂+2CO₂=2Na₂CO₃+O₂</text>

<!-- ===== 第三层：NaOH ===== -->
<g class="node c-blue">
  <rect x="140" y="330" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text class="th" x="220" y="352" text-anchor="middle" dominant-baseline="central" style="font-size:14px;fill:#0C447C;">NaOH  氢氧化钠</text>
  <text class="ts" x="220" y="372" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#5F5E5A;">强碱 · 易潮解 · 腐蚀品</text>
</g>

<!-- ===== NaOH 的反应 ===== -->
<!-- NaOH + CO₂ → Na₂CO₃ / NaHCO₃ 【高考高频：互滴现象不同】-->
<line x1="220" y1="386" x2="160" y2="452" stroke="#E24B4A" stroke-width="2" marker-end="url(#arr-red)"/>
<text style="font-size:10px;fill:#A32D2D;font-weight:500;" x="160" y="415" text-anchor="middle">+CO₂(少量) ★互滴</text>
<text style="font-size:9px;fill:#A32D2D;" x="160" y="427" text-anchor="middle">2NaOH+CO₂=Na₂CO₃+H₂O</text>

<line x1="290" y1="386" x2="380" y2="452" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arr-red)" stroke-dasharray="4,3"/>
<text style="font-size:10px;fill:#A32D2D;font-weight:500;" x="360" y="415" text-anchor="middle">+CO₂(过量)</text>
<text style="font-size:9px;fill:#A32D2D;" x="360" y="427" text-anchor="middle">NaOH+CO₂=NaHCO₃</text>

<!-- NaOH + HCl → NaCl + H₂O -->
<line x1="340" y1="386" x2="560" y2="430" stroke="#378ADD" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="4,3"/>
<text class="ts" x="470" y="400" text-anchor="middle" style="font-size:10px;fill:#5F5E5A;">+HCl(中和)</text>

<!-- ===== 第四层：Na₂CO₃ 和 NaHCO₃ ===== -->
<!-- Na₂CO₃ -->
<g class="node c-coral">
  <rect x="60" y="452" width="170" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text class="th" x="145" y="474" text-anchor="middle" dominant-baseline="central" style="font-size:14px;fill:#712B13;">Na₂CO₃  碳酸钠</text>
  <text class="ts" x="145" y="494" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#5F5E5A;">纯碱 · 溶于水呈碱性</text>
</g>

<!-- NaHCO₃ -->
<g class="node c-coral">
  <rect x="350" y="452" width="170" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
  <text class="th" x="435" y="474" text-anchor="middle" dominant-baseline="central" style="font-size:14px;fill:#712B13;">NaHCO₃  碳酸氢钠</text>
  <text class="ts" x="435" y="494" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#5F5E5A;">小苏打 · 受热分解</text>
</g>

<!-- Na₂CO₃ + H₂O + CO₂ → NaHCO₃ 【高考高频】-->
<line x1="145" y1="508" x2="435" y2="508" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arr-red)"/>
<text style="font-size:10px;fill:#A32D2D;font-weight:500;" x="290" y="498" text-anchor="middle">+H₂O+CO₂ ★转化</text>

<!-- NaHCO₃ → Na₂CO₃ + CO₂ + H₂O (加热) 【高考高频：鉴别】-->
<line x1="435" y1="508" x2="435" y2="544" stroke="#E24B4A" stroke-width="2" marker-end="url(#arr-red)"/>
<text style="font-size:10px;fill:#A32D2D;font-weight:500;" x="500" y="530" text-anchor="middle">加热 ★鉴别Na₂CO₃/NaHCO₃</text>
<text style="font-size:9px;fill:#A32D2D;" x="500" y="542" text-anchor="middle">2NaHCO₃=Na₂CO₃+CO₂↑+H₂O</text>

<!-- Na₂CO₃ + 2HCl → 2NaCl + CO₂ + H₂O 【高考高频：反应速率】-->
<line x1="60" y1="508" x2="60" y2="544" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arr-red)"/>
<text style="font-size:10px;fill:#A32D2D;font-weight:500;" x="30" y="522" text-anchor="end">+2HCl ★速率</text>

<!-- NaHCO₃ + HCl → NaCl + CO₂ + H₂O 【更快】-->
<line x1="520" y1="508" x2="600" y2="544" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arr-red)"/>
<text style="font-size:10px;fill:#A32D2D;font-weight:500;" x="620" y="522" text-anchor="start">+HCl 更快★</text>

<!-- ===== 底部说明 ===== -->
<rect x="40" y="548" width="600" height="20" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="ts" x="340" y="561" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#5F5E5A;">★ = 近十年高考/模拟卷高频考点  |  实线=主要反应  虚线=副反应/条件反应</text>

</svg>