<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" width="100%" role="img">
<title>钠和氯的物质转化链</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t { font: 14px var(--font-sans, sans-serif); fill: var(--color-text-primary, #222); }
    .ts { font: 12px var(--font-sans, sans-serif); fill: var(--color-text-secondary, #555); }
    .th { font: 500 14px var(--font-sans, sans-serif); fill: var(--color-text-primary, #222); }
  </style>
</defs>

<text x="340" y="26" class="th" text-anchor="middle" font-size="15">钠和氯的物质转化（教材第二章整理与提升）</text>

<!-- 分隔线 -->
<line x1="40" y1="190" x2="640" y2="190" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="340" y="187" class="ts" text-anchor="middle">—— 上：以物质类别为线索认识钠  /  下：以价态为线索认识氯 ——</text>

<!-- === 钠 转化链 === -->
<text x="48" y="58" class="ts" fill="#185FA5">钠 — 以物质类别为线索</text>

<!-- Na -->
<rect x="48" y="68" width="72" height="40" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="84" y="92" class="th" text-anchor="middle" dominant-baseline="central">Na</text>
<text x="84" y="114" class="ts" text-anchor="middle">单质</text>

<!-- → Na₂O₂ -->
<polyline points="122,88 172,88" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="136" y="82" class="ts">O₂点燃</text>
<rect x="174" y="68" width="82" height="40" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="215" y="92" class="th" text-anchor="middle" dominant-baseline="central">Na₂O₂</text>
<text x="215" y="114" class="ts" text-anchor="middle">氧化物</text>

<!-- → NaOH -->
<polyline points="258,88 308,88" fill="none" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="267" y="82" class="ts">+ H₂O</text>
<rect x="310" y="68" width="80" height="40" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="350" y="92" class="th" text-anchor="middle" dominant-baseline="central">NaOH</text>
<text x="350" y="114" class="ts" text-anchor="middle">碱</text>

<!-- → Na₂CO₃ -->
<polyline points="392,88 442,88" fill="none" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="400" y="82" class="ts">+ CO₂</text>
<rect x="444" y="68" width="90" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="489" y="92" class="th" text-anchor="middle" dominant-baseline="central">Na₂CO₃</text>
<text x="489" y="114" class="ts" text-anchor="middle">盐</text>

<!-- → NaHCO₃ -->
<polyline points="536,88 586,88" fill="none" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="546" y="82" class="ts">+ CO₂</text>
<rect x="588" y="68" width="84" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="630" y="92" class="th" text-anchor="middle" dominant-baseline="central">NaHCO₃</text>
<text x="630" y="114" class="ts" text-anchor="middle">盐</text>

<!-- 还可：Na → NaOH 直接 -->
<polyline points="84,108 84,150 310,150 310,108" fill="none" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text x="192" y="148" class="ts" fill="#185FA5">+ H₂O 直接</text>

<!-- === 氯 价态转化链 === -->
<text x="48" y="208" class="ts" fill="#534AB7">氯 — 以价态为线索（-1, 0, +1）</text>

<!-- HCl  -1价 -->
<rect x="48" y="218" width="90" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="93" y="238" class="th" text-anchor="middle" dominant-baseline="central">HCl / Cl⁻</text>
<text x="93" y="256" class="ts" text-anchor="middle">−1价</text>

<!-- Cl₂  0价 -->
<polyline points="140,240 196,240" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="155" y="234" class="ts">氧化</text>
<rect x="198" y="218" width="84" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="240" y="238" class="th" text-anchor="middle" dominant-baseline="central">Cl₂</text>
<text x="240" y="256" class="ts" text-anchor="middle">0价  黄绿色</text>

<!-- 反向 -->
<polyline points="196,252 140,252" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text x="155" y="265" class="ts">还原</text>

<!-- HClO  +1价 -->
<polyline points="284,240 336,240" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="295" y="234" class="ts">+ H₂O</text>
<rect x="338" y="218" width="84" height="44" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="380" y="238" class="th" text-anchor="middle" dominant-baseline="central">HClO</text>
<text x="380" y="256" class="ts" text-anchor="middle">+1价  漂白性</text>

<!-- Ca(ClO)₂  -->
<polyline points="424,240 476,240" fill="none" stroke="#993556" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="434" y="234" class="ts">+ Ca(OH)₂</text>
<rect x="478" y="218" width="96" height="44" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="526" y="238" class="th" text-anchor="middle" dominant-baseline="central">Ca(ClO)₂</text>
<text x="526" y="256" class="ts" text-anchor="middle">漂白粉有效成分</text>

<!-- 制法：Cl₂ 制备 -->
<rect x="48" y="290" width="584" height="74" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="310" class="th" text-anchor="middle">实验室制 Cl₂</text>
<text x="64" y="328" class="ts">MnO₂ + 4HCl(浓) —加热→ MnCl₂ + Cl₂↑ + 2H₂O</text>
<text x="64" y="346" class="ts">（MnO₂ 是氧化剂，浓 HCl 既是还原剂又提供 H⁺，Cl₂ 由 HCl 中 −1 价 Cl 被氧化为 0 价）</text>
<text x="64" y="362" class="ts">尾气处理：多余 Cl₂ 用 NaOH 溶液吸收</text>
</svg>