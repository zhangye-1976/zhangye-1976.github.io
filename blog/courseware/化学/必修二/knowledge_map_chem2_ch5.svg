<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" width="100%" role="img">
  <title>第五章 硫及其化合物 氮及其化合物 无机非金属材料</title>
  <desc>硫的价态转化、氮的价态转化、无机非金属材料</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="180" y="10" width="320" height="36" rx="8" fill="#1a237e" stroke="#1a237e" stroke-width="0.5"/>
  <text x="340" y="28" text-anchor="middle" fill="#fff" font-size="14" font-weight="500" dominant-baseline="central">第五章 化工生产中的重要非金属元素</text>

  <rect x="40" y="60" width="280" height="32" rx="6" fill="#1a73e8" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="180" y="76" text-anchor="middle" fill="#fff" font-size="12" font-weight="500" dominant-baseline="central">第一节 硫及其化合物（价态转化）</text>
  <rect x="360" y="60" width="280" height="32" rx="6" fill="#1a73e8" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="500" y="76" text-anchor="middle" fill="#fff" font-size="12" font-weight="500" dominant-baseline="central">第二节 氮及其化合物（★合成氨·硝酸）</text>

  <rect x="60" y="105" width="100" height="28" rx="5" fill="#e8f0fe" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="110" y="119" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="500" dominant-baseline="central">S (-2) H₂S</text>
  <rect x="175" y="105" width="100" height="28" rx="5" fill="#e8f0fe" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="225" y="119" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="500" dominant-baseline="central">S (0) 硫磺</text>
  <rect x="290" y="105" width="100" height="28" rx="5" fill="#ffe0b2" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="340" y="119" text-anchor="middle" fill="#854F0B" font-size="11" font-weight="500" dominant-baseline="central">★ S (+4) SO₂</text>
  <rect x="405" y="105" width="100" height="28" rx="5" fill="#e8f0fe" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="455" y="119" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="500" dominant-baseline="central">S (+6) H₂SO₄</text>

  <text x="110" y="155" text-anchor="middle" fill="#5F5E5A" font-size="10" font-weight="400">可燃性·还原性</text>
  <text x="225" y="155" text-anchor="middle" fill="#5F5E5A" font-size="10" font-weight="400">CS₂溶解·黄色</text>
  <text x="340" y="155" text-anchor="middle" fill="#854F0B" font-size="10" font-weight="400">漂白可逆·酸性氧化物</text>
  <text x="455" y="155" text-anchor="middle" fill="#5F5E5A" font-size="10" font-weight="400">吸水性·脱水性·强氧化性</text>

  <rect x="60" y="168" width="540" height="18" rx="4" fill="#fce4ec" stroke="#e24b4a" stroke-width="0.3"/>
  <text x="330" y="178" text-anchor="middle" fill="#A32D2D" font-size="10" font-weight="500">★ SO₂漂白与HClO不同（可逆）；浓H₂SO₄与Fe/Al常温钝化；BaSO₄检验先加HCl酸化</text>

  <rect x="60" y="200" width="100" height="28" rx="5" fill="#e8f0fe" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="110" y="214" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="500" dominant-baseline="central">N (-3) NH₃</text>
  <rect x="175" y="200" width="100" height="28" rx="5" fill="#e8f0fe" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="225" y="214" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="500" dominant-baseline="central">N (0) N₂</text>
  <rect x="290" y="200" width="100" height="28" rx="5" fill="#e8f0fe" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="340" y="214" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="500" dominant-baseline="central">N (+2) NO</text>
  <rect x="405" y="200" width="100" height="28" rx="5" fill="#ffe0b2" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="455" y="214" text-anchor="middle" fill="#854F0B" font-size="11" font-weight="500" dominant-baseline="central">★ N (+4) NO₂</text>
  <rect x="520" y="200" width="100" height="28" rx="5" fill="#e8f0fe" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="570" y="214" text-anchor="middle" fill="#185FA5" font-size="11" font-weight="500" dominant-baseline="central">N (+5) HNO₃</text>

  <text x="110" y="248" text-anchor="middle" fill="#5F5E5A" font-size="10" font-weight="400">弱碱性·白烟检验</text>
  <text x="225" y="248" text-anchor="middle" fill="#5F5E5A" font-size="10" font-weight="400">N≡N稳定·合成氨</text>
  <text x="340" y="248" text-anchor="middle" fill="#5F5E5A" font-size="10" font-weight="400">无色→红棕色</text>
  <text x="455" y="248" text-anchor="middle" fill="#854F0B" font-size="10" font-weight="400">3NO₂+H₂O歧化</text>
  <text x="570" y="248" text-anchor="middle" fill="#5F5E5A" font-size="10" font-weight="400">强氧化性·见光分解</text>

  <rect x="60" y="262" width="560" height="18" rx="4" fill="#fce4ec" stroke="#e24b4a" stroke-width="0.3"/>
  <text x="340" y="272" text-anchor="middle" fill="#A32D2D" font-size="10" font-weight="500">浓HNO₃→NO₂，稀HNO₃→NO；铵态氮肥不与碱性物质混用</text>

  <rect x="40" y="305" width="600" height="32" rx="6" fill="#1a73e8" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="340" y="321" text-anchor="middle" fill="#fff" font-size="12" font-weight="500" dominant-baseline="central">第三节 无机非金属材料</text>

  <rect x="60" y="350" width="170" height="40" rx="6" fill="#d2e3fc" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="145" y="364" text-anchor="middle" fill="#1a237e" font-size="11" font-weight="500" dominant-baseline="central">传统材料</text>
  <text x="145" y="380" text-anchor="middle" fill="#5F5E5A" font-size="9" font-weight="400">玻璃·水泥·陶瓷</text>
  <rect x="250" y="350" width="170" height="40" rx="6" fill="#d2e3fc" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="335" y="364" text-anchor="middle" fill="#1a237e" font-size="11" font-weight="500" dominant-baseline="central">硅(Si)单质</text>
  <text x="335" y="380" text-anchor="middle" fill="#5F5E5A" font-size="9" font-weight="400">半导体·芯片·太阳能电池</text>
  <rect x="440" y="350" width="170" height="40" rx="6" fill="#d2e3fc" stroke="#1a73e8" stroke-width="0.5"/>
  <text x="525" y="364" text-anchor="middle" fill="#1a237e" font-size="11" font-weight="500" dominant-baseline="central">SiO₂</text>
  <text x="525" y="380" text-anchor="middle" fill="#5F5E5A" font-size="9" font-weight="400">光导纤维·不与水反应</text>

  <rect x="150" y="405" width="360" height="18" rx="4" fill="#fce4ec" stroke="#e24b4a" stroke-width="0.3"/>
  <text x="330" y="415" text-anchor="middle" fill="#A32D2D" font-size="10" font-weight="500">★ SiO₂+4HF=SiF₄↑（HF腐蚀玻璃，塑料瓶保存）</text>

  <text x="340" y="460" text-anchor="middle" fill="#5F5E5A" font-size="11" font-weight="500">核心方法：物质类别视角 + 元素价态视角 → 设计转化途径</text>
</svg>