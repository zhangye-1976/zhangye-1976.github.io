<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%" style="font-family: var(--font-sans);">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="500" fill="var(--color-text-primary)">化学必修二 · 物质转化总图</text>
<text x="340" y="48" text-anchor="middle" font-size="12" fill="var(--color-text-secondary)">三大转化板块：硫/氮无机转化 + 有机化合物转化</text>

<!-- 硫转化模块 -->
<rect x="40" y="65" width="280" height="160" rx="12" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text x="180" y="88" text-anchor="middle" font-size="14" font-weight="500" fill="var(--color-text-primary)">一、硫的价态转化</text>
<text x="180" y="106" text-anchor="middle" font-size="12" fill="var(--color-text-secondary)">−2  ←→  0  ←→  +4  ←→  +6</text>

<rect x="56" y="115" width="100" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="106" y="137" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">-2价：H₂S / S²⁻</text>

<rect x="200" y="115" width="100" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="250" y="137" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">0价：S单质</text>

<rect x="56" y="168" width="100" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="106" y="190" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">+4价：SO₂/H₂SO₃</text>

<rect x="200" y="168" width="100" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="250" y="190" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">+6价：H₂SO₄/SO₄²⁻</text>

<path d="M156 137 L194 137" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M156 159 L56 168" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M300 137 L256 137" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M156 159 L300 168" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 氮转化模块 -->
<rect x="360" y="65" width="280" height="190" rx="12" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text x="500" y="88" text-anchor="middle" font-size="14" font-weight="500" fill="var(--color-text-primary)">二、氮的循环与转化</text>
<text x="500" y="106" text-anchor="middle" font-size="12" fill="var(--color-text-secondary)">固氮 → 氨 → NO → NO₂ → 硝酸</text>

<rect x="376" y="115" width="110" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="431" y="137" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">N₂ (0价)</text>

<rect x="510" y="115" width="110" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="565" y="137" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">NH₃ (−3价)</text>

<rect x="376" y="168" width="110" height="44" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
<text x="431" y="190" text-anchor="middle" font-size="13" font-weight="500" fill="#791F1F">NO (+2价)</text>

<rect x="510" y="168" width="110" height="44" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
<text x="565" y="190" text-anchor="middle" font-size="13" font-weight="500" fill="#791F1F">NO₂ (+4价)</text>

<rect x="436" y="221" width="110" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="491" y="243" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">HNO₃ (+5价)</text>

<path d="M486 137 L504 137" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M431 159 L376 168" stroke="#D4537E" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M565 159 L604 168" stroke="#D4537E" stroke-width="1"/>
<path d="M431 190 L491 221" stroke="#D4537E" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M565 190 L546 221" stroke="#D4537E" stroke-width="1" marker-end="url(#arrow)"/>

<!-- 有机转化模块 -->
<rect x="40" y="240" width="600" height="260" rx="12" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
<text x="340" y="263" text-anchor="middle" font-size="14" font-weight="500" fill="var(--color-text-primary)">三、有机化合物的转化（必修二核心）</text>

<!-- 烃的转化 -->
<rect x="56" y="275" width="140" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="126" y="298" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">CH₄（甲烷）</text>
<text x="126" y="314" text-anchor="middle" font-size="11" fill="#534AB7">取代反应 → CH₃Cl等</text>

<rect x="216" y="275" width="140" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="286" y="298" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">CH₂=CH₂（乙烯）</text>
<text x="286" y="314" text-anchor="middle" font-size="11" fill="#534AB7">加成/加聚 → 聚乙烯</text>

<rect x="376" y="275" width="140" height="50" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="446" y="298" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">CH₃CH₂OH（乙醇）</text>
<text x="446" y="314" text-anchor="middle" font-size="11" fill="#0F6E56">氧化 → CH₃CHO</text>

<rect x="536" y="275" width="140" height="50" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="606" y="298" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">CH₃COOH（乙酸）</text>
<text x="606" y="314" text-anchor="middle" font-size="11" fill="#0F6E56">酯化 → CH₃COOC₂H₅</text>

<path d="M196 300 L214 300" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M356 300 L374 300" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M516 300 L534 300" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- 营养物质转化 -->
<rect x="56" y="335" width="160" height="50" rx="8" fill="#FAF5EE" stroke="#BA7517" stroke-width="0.5"/>
<text x="136" y="358" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">(C₆H₁₀O₅)ₙ（淀粉）</text>
<text x="136" y="374" text-anchor="middle" font-size="11" fill="#854F0B">水解 → 葡萄糖</text>

<rect x="226" y="335" width="160" height="50" rx="8" fill="#FAF5EE" stroke="#BA7517" stroke-width="0.5"/>
<text x="306" y="358" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">C₆H₁₂O₆（葡萄糖）</text>
<text x="306" y="374" text-anchor="middle" font-size="11" fill="#854F0B">氧化 → CO₂+H₂O+能量</text>

<rect x="396" y="335" width="160" height="50" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="476" y="358" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">油脂（甘油三酯）</text>
<text x="476" y="374" text-anchor="middle" font-size="11" fill="#993C1D">水解/皂化 → 甘油+肥皂</text>

<rect x="566" y="335" width="160" height="50" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="646" y="358" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">蛋白质</text>
<text x="646" y="374" text-anchor="middle" font-size="11" fill="#993C1D">水解 → 氨基酸</text>

<path d="M216 360 L224 360" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M386 360 L394 360" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M556 360 L564 360" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- 工业制硝酸流程 -->
<rect x="56" y="400" width="320" height="85" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
<text x="216" y="422" text-anchor="middle" font-size="13" font-weight="500" fill="#A32D2D">工业制硝酸流程</text>
<text x="70" y="440" font-size="11" fill="var(--color-text-secondary)">① N₂ + 3H₂ ⇌ 2NH₃  ② 4NH₃ + 5O₂ → 4NO + 6H₂O</text>
<text x="70" y="456" font-size="11" fill="var(--color-text-secondary)">③ 2NO + O₂ → 2NO₂  ④ 3NO₂ + H₂O → 2HNO₃ + NO</text>
<text x="70" y="472" font-size="11" fill="var(--color-text-secondary)">NO循环氧化，吸收率&gt;90%</text>

<!-- 高考高频方程式 -->
<rect x="396" y="400" width="240" height="85" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="516" y="422" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">高考高频方程式</text>
<text x="405" y="440" font-size="11" fill="var(--color-text-secondary)">Cu + 2H₂SO₄(浓) → CuSO₄ + SO₂↑ + 2H₂O</text>
<text x="405" y="456" font-size="11" fill="var(--color-text-secondary)">4NH₃ + 5O₂ → 4NO + 6H₂O（工业制硝酸）</text>
<text x="405" y="472" font-size="11" fill="var(--color-text-secondary)">CH₂=CH₂ + Br₂ → CH₂Br−CH₂Br</text>

<text x="340" y="510" text-anchor="middle" font-size="11" fill="var(--color-text-tertiary)">根据教材PDF全文提取整理 · 化学必修二物质转化专题</text>
</svg>