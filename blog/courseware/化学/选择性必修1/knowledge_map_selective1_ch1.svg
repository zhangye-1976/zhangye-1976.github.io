<svg viewBox="0 0 680 420" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第一章 化学反应的热效应</title>
  <desc>反应热与焓变、热化学方程式、燃烧热、盖斯定律、反应热计算</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .t { font-family: system-ui,sans-serif; font-size: 14px; fill: #0C447C; font-weight: 500; }
    .ts { font-family: system-ui,sans-serif; font-size: 12px; fill: #444441; font-weight: 400; }
    .tw { font-family: system-ui,sans-serif; font-size: 13px; fill: #FFFFFF; font-weight: 500; }
    .tm { font-family: system-ui,sans-serif; font-size: 13px; fill: #185FA5; font-weight: 500; }
  </style>

  <rect x="190" y="20" width="300" height="40" rx="20" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
  <text class="tw" x="340" y="40" text-anchor="middle" dominant-baseline="central">第一章 化学反应的热效应</text>

  <line x1="340" y1="60" x2="340" y2="90" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="80" y="95" width="520" height="36" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="tm" x="340" y="113" text-anchor="middle" dominant-baseline="central">核心主线：体系与环境 → 反应热 → 焓变 → 热化学方程式 → 盖斯定律计算</text>

  <line x1="340" y1="131" x2="340" y2="155" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="60" y="160" width="180" height="70" rx="9" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="t" x="150" y="185" text-anchor="middle" dominant-baseline="central">第一节 反应热</text>
  <text class="ts" x="150" y="205" text-anchor="middle" dominant-baseline="central">ΔH = Qp（等压条件）</text>
  <text class="ts" x="150" y="222" text-anchor="middle" dominant-baseline="central">放热ΔH＜0 吸热ΔH＞0</text>

  <rect x="260" y="160" width="180" height="70" rx="9" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="t" x="350" y="185" text-anchor="middle" dominant-baseline="central">热化学方程式</text>
  <text class="ts" x="350" y="205" text-anchor="middle" dominant-baseline="central">标注状态(s/l/g/aq)</text>
  <text class="ts" x="350" y="222" text-anchor="middle" dominant-baseline="central">ΔH与计量数对应</text>

  <rect x="460" y="160" width="160" height="70" rx="9" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="t" x="540" y="185" text-anchor="middle" dominant-baseline="central">燃烧热</text>
  <text class="ts" x="540" y="205" text-anchor="middle" dominant-baseline="central">1 mol完全燃烧</text>
  <text class="ts" x="540" y="222" text-anchor="middle" dominant-baseline="central">指定产物★</text>

  <line x1="340" y1="230" x2="340" y2="260" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="100" y="265" width="240" height="70" rx="9" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
  <text class="t" x="220" y="290" text-anchor="middle" dominant-baseline="central">第二节 反应热的计算</text>
  <text class="ts" x="220" y="310" text-anchor="middle" dominant-baseline="central">盖斯定律：只与始终态有关</text>
  <text class="ts" x="220" y="327" text-anchor="middle" dominant-baseline="central">ΔH = ΣE断 - ΣE成</text>

  <rect x="360" y="265" width="240" height="70" rx="9" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
  <text class="t" x="480" y="290" text-anchor="middle" dominant-baseline="central">计算方法</text>
  <text class="ts" x="480" y="310" text-anchor="middle" dominant-baseline="central">盖斯定律叠加 · 键能法</text>
  <text class="ts" x="480" y="327" text-anchor="middle" dominant-baseline="central">燃烧热法 · 生成焓法</text>

  <line x1="340" y1="335" x2="340" y2="365" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="140" y="370" width="400" height="36" rx="8" fill="#E6F1FB" stroke="#0C447C" stroke-width="0.5"/>
  <text class="ts" x="340" y="392" text-anchor="middle" dominant-baseline="central">★ 必考：盖斯定律叠加计算 · 热化学方程式正误判断 · ΔH与键能互算</text>
</svg>