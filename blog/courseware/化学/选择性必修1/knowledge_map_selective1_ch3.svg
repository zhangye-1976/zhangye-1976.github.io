<svg viewBox="0 0 680 440" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第三章 水溶液中的离子反应与平衡</title>
  <desc>电离平衡、水的电离与pH、盐类水解、沉淀溶解平衡</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .t { font-family: system-ui,sans-serif; font-size: 14px; fill: #633806; font-weight: 500; }
    .ts { font-family: system-ui,sans-serif; font-size: 12px; fill: #444441; font-weight: 400; }
    .tw { font-family: system-ui,sans-serif; font-size: 13px; fill: #FFFFFF; font-weight: 500; }
    .tm { font-family: system-ui,sans-serif; font-size: 13px; fill: #854F0B; font-weight: 500; }
  </style>

  <rect x="140" y="20" width="400" height="40" rx="20" fill="#854F0B" stroke="#633806" stroke-width="0.5"/>
  <text class="tw" x="340" y="40" text-anchor="middle" dominant-baseline="central">第三章 水溶液中的离子反应与平衡</text>

  <rect x="80" y="75" width="520" height="36" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text class="tm" x="340" y="93" text-anchor="middle" dominant-baseline="central">四大水溶液平衡：电离平衡 · 水解平衡 · 水的电离 · 沉淀溶解平衡</text>

  <line x1="170" y1="111" x2="130" y2="150" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="111" x2="340" y2="150" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="111" x2="550" y2="150" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="50" y="155" width="160" height="90" rx="9" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text class="t" x="130" y="178" text-anchor="middle" dominant-baseline="central">第一节 电离平衡</text>
  <text class="ts" x="130" y="198" text-anchor="middle" dominant-baseline="central">强电解质/弱电解质</text>
  <text class="ts" x="130" y="216" text-anchor="middle" dominant-baseline="central">Ka = c(H⁺)c(A⁻)/c(HA)</text>
  <text class="ts" x="130" y="234" text-anchor="middle" dominant-baseline="central">越稀越电离</text>

  <rect x="225" y="155" width="160" height="90" rx="9" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text class="t" x="305" y="178" text-anchor="middle" dominant-baseline="central">第二节 pH</text>
  <text class="ts" x="305" y="198" text-anchor="middle" dominant-baseline="central">Kw = 1.0×10⁻¹⁴</text>
  <text class="ts" x="305" y="216" text-anchor="middle" dominant-baseline="central">pH = -lg c(H⁺)</text>
  <text class="ts" x="305" y="234" text-anchor="middle" dominant-baseline="central">酸碱中和滴定</text>

  <rect x="400" y="155" width="160" height="90" rx="9" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text class="t" x="480" y="178" text-anchor="middle" dominant-baseline="central">第三节 水解</text>
  <text class="ts" x="480" y="198" text-anchor="middle" dominant-baseline="central">谁弱谁水解</text>
  <text class="ts" x="480" y="216" text-anchor="middle" dominant-baseline="central">谁强显谁性</text>
  <text class="ts" x="480" y="234" text-anchor="middle" dominant-baseline="central">双水解·应用</text>

  <rect x="575" y="155" width="80" height="90" rx="9" fill="#FAC775" stroke="#EF9F27" stroke-width="0.5"/>
  <text class="t" x="615" y="178" text-anchor="middle" dominant-baseline="central">第四节</text>
  <text class="ts" x="615" y="200" text-anchor="middle" dominant-baseline="central">Ksp</text>
  <text class="ts" x="615" y="218" text-anchor="middle" dominant-baseline="central">沉淀转化</text>

  <line x1="340" y1="245" x2="340" y2="280" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="140" y="285" width="400" height="60" rx="9" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text class="t" x="340" y="308" text-anchor="middle" dominant-baseline="central">三大守恒 · 离子浓度排序</text>
  <text class="ts" x="340" y="326" text-anchor="middle" dominant-baseline="central">电荷守恒 + 物料守恒 + 质子守恒</text>
  <text class="ts" x="340" y="342" text-anchor="middle" dominant-baseline="central">三大守恒联立是高考离子浓度比较题的万能钥匙</text>

  <line x1="340" y1="345" x2="340" y2="375" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="100" y="380" width="480" height="45" rx="8" fill="#FAEEDA" stroke="#633806" stroke-width="0.5"/>
  <text class="ts" x="340" y="398" text-anchor="middle" dominant-baseline="central">★ 升温Kw增大 · 中和滴定指示剂选择 · Ksp比较须同类型</text>
  <text class="ts" x="340" y="414" text-anchor="middle" dominant-baseline="central">★ 沉淀转化：Ksp(大)→Ksp(小) · Q＞Ksp生成沉淀</text>
</svg>