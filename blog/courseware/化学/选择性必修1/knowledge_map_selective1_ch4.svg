<svg viewBox="0 0 680 420" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第四章 化学反应与电能</title>
  <desc>原电池、化学电源、电解池、金属腐蚀与防护</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .t { font-family: system-ui,sans-serif; font-size: 14px; fill: #72243E; font-weight: 500; }
    .ts { font-family: system-ui,sans-serif; font-size: 12px; fill: #444441; font-weight: 400; }
    .tw { font-family: system-ui,sans-serif; font-size: 13px; fill: #FFFFFF; font-weight: 500; }
    .tm { font-family: system-ui,sans-serif; font-size: 13px; fill: #993556; font-weight: 500; }
  </style>

  <rect x="190" y="20" width="300" height="40" rx="20" fill="#993556" stroke="#72243E" stroke-width="0.5"/>
  <text class="tw" x="340" y="40" text-anchor="middle" dominant-baseline="central">第四章 化学反应与电能</text>

  <rect x="80" y="75" width="520" height="36" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
  <text class="tm" x="340" y="93" text-anchor="middle" dominant-baseline="central">氧化还原反应 + 能量转化 = 化学能 ⇌ 电能</text>

  <line x1="200" y1="111" x2="180" y2="155" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="111" x2="500" y2="155" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="50" y="160" width="260" height="140" rx="9" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
  <text class="t" x="180" y="182" text-anchor="middle" dominant-baseline="central">第一节 原电池</text>
  <text class="ts" x="180" y="202" text-anchor="middle" dominant-baseline="central">负极：活泼金属，氧化，失e⁻</text>
  <text class="ts" x="180" y="220" text-anchor="middle" dominant-baseline="central">正极：还原，得e⁻</text>
  <text class="ts" x="180" y="238" text-anchor="middle" dominant-baseline="central">盐桥：离子通道，保持电中性</text>
  <text class="ts" x="180" y="260" text-anchor="middle" dominant-baseline="central">一次电池 · 二次电池</text>
  <text class="ts" x="180" y="278" text-anchor="middle" dominant-baseline="central">燃料电池（H₂-O₂）</text>
  <text class="ts" x="180" y="295" text-anchor="middle" dominant-baseline="central">★ 电极式取决于电解质环境</text>

  <rect x="370" y="160" width="260" height="140" rx="9" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
  <text class="t" x="500" y="182" text-anchor="middle" dominant-baseline="central">第二节 电解池</text>
  <text class="ts" x="500" y="202" text-anchor="middle" dominant-baseline="central">阳极(正极)：氧化，失e⁻</text>
  <text class="ts" x="500" y="220" text-anchor="middle" dominant-baseline="central">阴极(负极)：还原，得e⁻</text>
  <text class="ts" x="500" y="238" text-anchor="middle" dominant-baseline="central">放电顺序：阳极·阴极</text>
  <text class="ts" x="500" y="260" text-anchor="middle" dominant-baseline="central">氯碱工业 · 电镀</text>
  <text class="ts" x="500" y="278" text-anchor="middle" dominant-baseline="central">电解精炼铜</text>
  <text class="ts" x="500" y="295" text-anchor="middle" dominant-baseline="central">★ 阴阳阳阴：阳极接正极</text>

  <line x1="180" y1="300" x2="180" y2="335" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="300" x2="500" y2="335" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="140" y="340" width="400" height="30" rx="8" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.5"/>
  <text class="t" x="340" y="359" text-anchor="middle" dominant-baseline="central">第三节 金属的腐蚀与防护</text>

  <line x1="340" y1="370" x2="340" y2="395" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="80" y="400" width="520" height="14" rx="4" fill="#FBEAF0" stroke="none" stroke-width="0"/>
  <text class="ts" x="340" y="410" text-anchor="middle" dominant-baseline="central">★ 吸氧腐蚀（中性/碱性）> 析氢腐蚀（酸性）· 牺牲阳极法 · 外加电流法</text>
</svg>