<svg viewBox="0 0 680 480" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>选择性必修1 化学反应原理 全书知识框架</title>
  <desc>四章结构：热效应→速率平衡→溶液离子平衡→化学反应与电能</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .t { font-family: system-ui,sans-serif; font-size: 14px; fill: #3C3489; font-weight: 500; }
    .ts { font-family: system-ui,sans-serif; font-size: 12px; fill: #444441; font-weight: 400; }
    .th { font-family: system-ui,sans-serif; font-size: 14px; fill: #26215C; font-weight: 500; }
    .tw { font-family: system-ui,sans-serif; font-size: 13px; fill: #FFFFFF; font-weight: 500; }
    .tm { font-family: system-ui,sans-serif; font-size: 13px; fill: #3C3489; font-weight: 500; }
  </style>

  <rect x="190" y="30" width="300" height="44" rx="22" fill="#3C3489" stroke="#26215C" stroke-width="0.5"/>
  <text class="tw" x="340" y="52" text-anchor="middle" dominant-baseline="central">选择性必修1 化学反应原理</text>

  <line x1="340" y1="74" x2="340" y2="105" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="120" y="110" width="440" height="54" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text class="tm" x="340" y="132" text-anchor="middle" dominant-baseline="central">能量 → 速率 → 方向 → 限度 → 应用</text>
  <text class="ts" x="340" y="150" text-anchor="middle" dominant-baseline="central">定性到定量，宏观到微观</text>

  <line x1="230" y1="164" x2="230" y2="195" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="164" x2="340" y2="195" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="164" x2="450" y2="195" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="164" x2="560" y2="330" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="100" y="200" width="260" height="80" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="t" x="230" y="228" text-anchor="middle" dominant-baseline="central">第一章 热效应</text>
  <text class="ts" x="230" y="248" text-anchor="middle" dominant-baseline="central">反应热 · 焓变 · 盖斯定律</text>
  <text class="ts" x="230" y="266" text-anchor="middle" dominant-baseline="central">键能计算 · 燃烧热 · ΔH叠加</text>

  <rect x="100" y="300" width="260" height="80" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text class="t" x="230" y="328" text-anchor="middle" dominant-baseline="central">第二章 速率与平衡</text>
  <text class="ts" x="230" y="348" text-anchor="middle" dominant-baseline="central">活化能 · 平衡常数K · 勒夏特列</text>
  <text class="ts" x="230" y="366" text-anchor="middle" dominant-baseline="central">ΔG判据 · 合成氨调控</text>

  <rect x="390" y="200" width="260" height="80" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text class="t" x="520" y="228" text-anchor="middle" dominant-baseline="central">第三章 溶液离子平衡</text>
  <text class="ts" x="520" y="248" text-anchor="middle" dominant-baseline="central">电离平衡 · Ka/Kb · Kw · pH</text>
  <text class="ts" x="520" y="266" text-anchor="middle" dominant-baseline="central">盐类水解 · Ksp · 沉淀转化</text>

  <rect x="390" y="300" width="260" height="80" rx="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
  <text class="t" x="520" y="328" text-anchor="middle" dominant-baseline="central">第四章 化学反应与电能</text>
  <text class="ts" x="520" y="348" text-anchor="middle" dominant-baseline="central">原电池 · 化学电源 · 燃料电池</text>
  <text class="ts" x="520" y="366" text-anchor="middle" dominant-baseline="central">电解池 · 电镀 · 金属防护</text>

  <line x1="230" y1="280" x2="230" y2="300" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="140" y="420" width="400" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="ts" x="340" y="444" text-anchor="middle" dominant-baseline="central">四大平衡：化学平衡 · 电离平衡 · 水解平衡 · 沉淀溶解平衡</text>
</svg>