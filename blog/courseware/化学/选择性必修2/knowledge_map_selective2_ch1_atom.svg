<svg viewBox="0 0 680 540" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第一章 原子结构与性质 思维导图</title>
  <desc>能层能级、构造原理、电子排布式、元素周期律、电离能、电负性</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="540" fill="white" rx="4"/>

  <text x="340" y="26" text-anchor="middle" font-family="sans-serif" font-size="14px" font-weight="500" fill="#2C2C2A">第一章 原子结构与性质 · 思维导图</text>
  <text x="340" y="44" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#5F5E5A">能层与能级 → 构造原理 → 电子排布 → 元素周期律 → 电离能/电负性</text>

  <rect x="260" y="60" width="160" height="38" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="83" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#3C3489" dominant-baseline="central">能层与能级</text>

  <line x1="340" y1="98" x2="340" y2="125" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="348" y="115" font-family="sans-serif" font-size="11px" fill="#7F77DD">构造原理</text>

  <rect x="260" y="130" width="160" height="38" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="153" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#0C447C" dominant-baseline="central">电子排布式</text>

  <line x1="340" y1="168" x2="340" y2="195" stroke="#85B7EB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="348" y="185" font-family="sans-serif" font-size="11px" fill="#378ADD">元素周期律</text>

  <rect x="200" y="200" width="280" height="38" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="223" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#085041" dominant-baseline="central">元素周期表（分区：s / p / d / ds / f）</text>

  <line x1="250" y1="238" x2="130" y2="280" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="150" y="260" font-family="sans-serif" font-size="11px" fill="#1D9E75">周期律(数值)</text>

  <line x1="430" y1="238" x2="550" y2="280" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="480" y="260" font-family="sans-serif" font-size="11px" fill="#1D9E75">分区(位置)</text>

  <rect x="30" y="285" width="200" height="72" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="130" y="306" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#633806">原子半径</text>
  <text x="130" y="324" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#BA7517">同周期→减小 同族→增大</text>
  <text x="130" y="342" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#BA7517">电子层↑ 核电荷↑</text>

  <rect x="240" y="285" width="200" height="72" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="340" y="306" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#791F1F">第一电离能 I₁</text>
  <text x="340" y="324" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#A32D2D">同周期→增大(有波动)</text>
  <text x="340" y="342" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#A32D2D">半满/全满结构稳定★</text>

  <rect x="450" y="285" width="200" height="72" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="550" y="306" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#72243E">电负性 x</text>
  <text x="550" y="324" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#D4537E">同周期→增大 同族→减小</text>
  <text x="550" y="342" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#D4537E">F 4.0 最大 O 3.5 第二</text>

  <rect x="30" y="380" width="620" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="405" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#2C2C2A" dominant-baseline="central">构造原理记忆口诀：1s → 2s 2p → 3s 3p → 4s 3d 4p → 5s 4d 5p → 6s 4f 5d 6p → 7s 5f 6d 7p</text>

  <rect x="30" y="440" width="300" height="44" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="180" y="458" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#791F1F">高考高频</text>
  <text x="180" y="474" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#A32D2D">Cu: [Ar]3d¹⁰4s¹ vs Cr: [Ar]3d⁵4s¹ 半满全满特例</text>

  <rect x="350" y="440" width="300" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="500" y="458" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#27500A">解题关键</text>
  <text x="500" y="474" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#639922">电子排布→价电子→周期位置→性质(电离能/电负性)</text>

  <rect x="180" y="500" width="320" height="28" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="340" y="519" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#5F5E5A" dominant-baseline="central">基态/激发态 → 原子光谱 | 电子云: s球 p哑铃 d花瓣</text>
</svg>
