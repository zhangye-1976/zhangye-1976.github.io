<svg viewBox="0 0 680 540" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第二章 分子结构与性质 思维导图</title>
  <desc>共价键σπ、VSEPR、杂化轨道、分子极性、氢键、范德华力</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="540" fill="white" rx="4"/>

  <text x="340" y="26" text-anchor="middle" font-family="sans-serif" font-size="14px" font-weight="500" fill="#2C2C2A">第二章 分子结构与性质 · 思维导图</text>
  <text x="340" y="44" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#5F5E5A">共价键(σ/π) → 空间构型(VSEPR+杂化) → 分子极性 → 分子间力(范德华/氢键)</text>

  <rect x="240" y="60" width="200" height="38" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="83" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#3C3489" dominant-baseline="central">共价键（σ键 / π键）</text>

  <line x1="340" y1="98" x2="340" y2="125" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="260" y="130" width="160" height="38" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="153" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#0C447C" dominant-baseline="central">空间构型</text>

  <line x1="220" y1="150" x2="100" y2="200" stroke="#85B7EB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="150" x2="580" y2="200" stroke="#85B7EB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="20" y="205" width="220" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="130" y="224" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#085041">VSEPR模型</text>
  <text x="130" y="242" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#1D9E75">n=2:直线 n=3:平面三角</text>
  <text x="130" y="254" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#1D9E75">n=4:正四面体 | 孤对电子参与★</text>

  <rect x="440" y="205" width="220" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="550" y="224" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#085041">杂化轨道</text>
  <text x="550" y="242" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#1D9E75">sp:直线 180°(BeCl2)</text>
  <text x="550" y="254" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#1D9E75">sp²:平面三角 120° sp³:正四面体</text>

  <line x1="130" y1="259" x2="130" y2="290" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="259" x2="550" y2="290" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="230" y="295" width="220" height="38" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="340" y="318" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#633806" dominant-baseline="central">分子极性（极性分子 / 非极性分子）</text>

  <line x1="340" y1="333" x2="340" y2="360" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="180" y="365" width="320" height="38" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="340" y="388" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#72243E" dominant-baseline="central">分子间作用力</text>

  <line x1="200" y1="403" x2="100" y2="445" stroke="#ED93B1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="403" x2="580" y2="445" stroke="#ED93B1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="20" y="450" width="200" height="54" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="120" y="469" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#791F1F">氢键 ★高考核心</text>
  <text x="120" y="487" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#A32D2D">强于范德华力 方向性+饱和性</text>
  <text x="120" y="499" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#A32D2D">HF/H₂O/NH₃ 沸点反常升高</text>

  <rect x="460" y="450" width="200" height="54" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="560" y="469" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#0C447C">范德华力</text>
  <text x="560" y="487" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#378ADD">分子量↑作用力↑沸点↑</text>
  <text x="560" y="499" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#378ADD">结构相似：相对分子质量为主的参考</text>

  <rect x="240" y="512" width="200" height="22" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="340" y="527" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#888780" dominant-baseline="central">键参数：键能 / 键长 / 键角</text>
</svg>
