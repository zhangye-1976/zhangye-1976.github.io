<svg viewBox="0 0 680 520" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第三章 烃的衍生物 思维导图</title>
  <desc>卤代烃、醇酚、醛酮、羧酸酯、酰胺 —— 六类衍生物反应全景</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="520" fill="white" rx="4"/>

  <text x="340" y="26" text-anchor="middle" font-family="sans-serif" font-size="14px" font-weight="500" fill="#2C2C2A">第三章 烃的衍生物 · 思维导图（全书核心）</text>
  <text x="340" y="44" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#5F5E5A">六类衍生物：卤代烃 / 醇酚 / 醛酮 / 羧酸 / 酯 / 酰胺 — 官能团转化全链</text>

  <rect x="20" y="64" width="200" height="38" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="120" y="87" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#0C447C" dominant-baseline="central">卤代烃 R-X</text>

  <line x1="220" y1="83" x2="260" y2="83" stroke="#85B7EB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="240" y="76" font-family="sans-serif" font-size="10px" fill="#378ADD">水解</text>
  <text x="240" y="93" font-family="sans-serif" font-size="10px" fill="#378ADD">NaOH水</text>

  <rect x="265" y="64" width="180" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="355" y="83" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#3C3489" dominant-baseline="central">醇 R-OH</text>
  <text x="355" y="103" text-anchor="middle" font-family="sans-serif" font-size="10px" fill="#7F77DD" dominant-baseline="central">酯化/消去/氧化/置换Na</text>

  <line x1="445" y1="88" x2="485" y2="88" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="465" y="81" font-family="sans-serif" font-size="10px" fill="#7F77DD">氧化</text>
  <text x="465" y="95" font-family="sans-serif" font-size="10px" fill="#7F77DD">Cu/O2</text>

  <rect x="490" y="64" width="170" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="575" y="83" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#085041" dominant-baseline="central">醛 R-CHO</text>
  <text x="575" y="103" text-anchor="middle" font-family="sans-serif" font-size="10px" fill="#1D9E75" dominant-baseline="central">银镜/斐林 还原</text>

  <path d="M 575 112 L 575 140 L 355 140 L 355 155" stroke="#5DCAA5" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="134" font-family="sans-serif" font-size="10px" fill="#1D9E75">还原H2</text>

  <rect x="265" y="160" width="180" height="48" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="355" y="179" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#633806" dominant-baseline="central">羧酸 R-COOH</text>
  <text x="355" y="199" text-anchor="middle" font-family="sans-serif" font-size="10px" fill="#BA7517" dominant-baseline="central">酸性 酯化 酰胺化</text>

  <line x1="355" y1="208" x2="355" y2="245" stroke="#EF9F27" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="363" y="230" font-family="sans-serif" font-size="10px" fill="#BA7517">酯化</text>
  <text x="363" y="242" font-family="sans-serif" font-size="10px" fill="#BA7517">浓H2SO4</text>

  <rect x="265" y="250" width="180" height="48" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="355" y="269" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#72243E" dominant-baseline="central">酯 R-COOR'</text>
  <text x="355" y="289" text-anchor="middle" font-family="sans-serif" font-size="10px" fill="#D4537E" dominant-baseline="central">水解(酸/碱) 皂化</text>

  <path d="M 265 274 L 220 274 L 220 240 L 100 240 L 100 155" stroke="#ED93B1" fill="none" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="20" y="160" width="200" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="120" y="179" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#3C3489" dominant-baseline="central">酚 C6H5-OH</text>
  <text x="120" y="199" text-anchor="middle" font-family="sans-serif" font-size="10px" fill="#7F77DD" dominant-baseline="central">弱酸性 FeCl3显色 苯环亲电</text>

  <rect x="460" y="160" width="200" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="560" y="179" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#085041" dominant-baseline="central">酮 R-CO-R'</text>
  <text x="560" y="199" text-anchor="middle" font-family="sans-serif" font-size="10px" fill="#1D9E75" dominant-baseline="central">无银镜无斐林★ 还原成醇</text>

  <rect x="20" y="250" width="200" height="48" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="120" y="269" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#0C447C" dominant-baseline="central">酰胺 R-CONH2</text>
  <text x="120" y="289" text-anchor="middle" font-family="sans-serif" font-size="10px" fill="#378ADD" dominant-baseline="central">羧酸+氨 水解得羧酸</text>

  <rect x="20" y="320" width="640" height="72" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="342" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#27500A">逆合成分析法 — 第五节核心</text>
  <text x="340" y="362" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#639922">目标分子 → 中间体 → 起始原料（逆向切断 C-C键 / 官能团引入）</text>
  <text x="340" y="380" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#639922">核心技巧：碳骨架增长（格氏试剂/羟醛缩合/酯缩合） 碳骨架不变（官能团转化）</text>

  <rect x="70" y="410" width="250" height="40" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="195" y="432" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#791F1F" dominant-baseline="central">高考有机推断题 核心出题章</text>

  <rect x="360" y="410" width="250" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="485" y="432" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#2C2C2A" dominant-baseline="central">官能团转化 = 有机化学灵魂</text>

  <rect x="120" y="468" width="440" height="38" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="340" y="491" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#5F5E5A" dominant-baseline="central">醇 ⇌ 醛 → 羧酸 ⇌ 酯 是最高频转化链 | 卤代烃→醇→烯烃 是消去/加成闭环</text>
</svg>
