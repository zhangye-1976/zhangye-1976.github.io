<svg viewBox="0 0 680 520" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>有机化学基础 全书总览</title>
  <desc>五章结构：研究方法 → 烃 → 烃的衍生物 → 生物大分子 → 合成高分子</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="520" fill="white" rx="4"/>

  <text x="340" y="26" text-anchor="middle" font-family="sans-serif" font-size="14px" font-weight="500" fill="#2C2C2A">化学选必3 有机化学基础 · 全书总览</text>
  <text x="340" y="44" text-anchor="middle" font-family="sans-serif" font-size="12px" fill="#5F5E5A">结构 → 性质 → 转化 → 合成：有机化学四大支柱</text>

  <rect x="260" y="62" width="160" height="38" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="85" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#3C3489" dominant-baseline="central">Ch1 研究方法</text>

  <line x1="340" y1="100" x2="340" y2="128" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="348" y="118" font-family="sans-serif" font-size="11px" fill="#7F77DD">碳骨架+官能团</text>

  <rect x="260" y="133" width="160" height="38" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="156" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#0C447C" dominant-baseline="central">Ch2 烃</text>

  <line x1="340" y1="171" x2="340" y2="199" stroke="#85B7EB" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="348" y="189" font-family="sans-serif" font-size="11px" fill="#378ADD">官能团转化核心</text>

  <rect x="240" y="204" width="200" height="42" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="340" y="225" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#791F1F" dominant-baseline="central">Ch3 烃的衍生物 ★核心★</text>
  <text x="340" y="241" text-anchor="middle" font-family="sans-serif" font-size="11px" fill="#A32D2D" dominant-baseline="central">卤代烃·醇·醛·羧酸·酯·酰胺</text>

  <line x1="340" y1="246" x2="340" y2="274" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="260" y="279" width="160" height="38" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="302" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#085041" dominant-baseline="central">Ch4 生物大分子</text>

  <line x1="340" y1="317" x2="340" y2="345" stroke="#5DCAA5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="260" y="350" width="160" height="38" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="340" y="373" text-anchor="middle" font-family="sans-serif" font-size="13px" font-weight="500" fill="#633806" dominant-baseline="central">Ch5 合成高分子</text>

  <rect x="30" y="410" width="620" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="435" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#2C2C2A" dominant-baseline="central">贯穿全书：官能团决定性质 → 反应类型决定转化 → 逆合成分析法设计路线</text>

  <rect x="150" y="468" width="180" height="38" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="240" y="491" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#791F1F" dominant-baseline="central">高考：有机选做题 10-15分</text>

  <rect x="360" y="468" width="170" height="38" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="445" y="491" text-anchor="middle" font-family="sans-serif" font-size="12px" font-weight="500" fill="#27500A" dominant-baseline="central">同分异构 常考难点</text>
</svg>
