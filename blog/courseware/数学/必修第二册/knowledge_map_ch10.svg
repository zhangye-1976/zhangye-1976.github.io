<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640">
  <defs>
    <style>
      .box { fill:#E1F5EE; stroke:#00796b; stroke-width:1.5; rx:8; }
      .box2 { fill:#E8F5E9; stroke:#388E3C; stroke-width:1.5; rx:6; }
      .box3 { fill:#FFF9C4; stroke:#F9A825; stroke-width:1.5; rx:6; }
      .boxt { fill:#B2DFDB; stroke:#00796b; stroke-width:2; rx:8; }
      .tit { font:bold 15px sans-serif; fill:#00796b; }
      .nm { font:13px sans-serif; fill:#1a1a1a; }
      .sm { font:11px sans-serif; fill:#333; }
      .red { font:11px sans-serif; fill:#c0392b; }
    </style>
  </defs>

  <!-- 标题 -->
  <rect x="200" y="8" width="280" height="34" class="boxt"/>
  <text x="340" y="31" text-anchor="middle" class="tit">第10章 概率</text>

  <!-- 随机事件与概率 -->
  <rect x="20" y="52" width="180" height="28" class="box"/>
  <text x="110" y="70" text-anchor="middle" class="nm">随机事件与概率</text>
  <rect x="20" y="88" width="180" height="100" class="box"/>
  <text x="30" y="112" class="sm">必然事件：P=1</text>
  <text x="30" y="130" class="sm">不可能事件：P=0</text>
  <text x="30" y="148" class="sm">随机事件：0≤P(A)≤1</text>
  <text x="30" y="166" class="sm">对立事件：P(Ā)=1−P(A)</text>
  <text x="30" y="184" class="sm">互斥：P(A∪B)=P(A)+P(B)</text>

  <!-- 事件独立性 -->
  <rect x="220" y="52" width="180" height="28" class="box"/>
  <text x="310" y="70" text-anchor="middle" class="nm">事件相互独立性</text>
  <rect x="220" y="88" width="180" height="100" class="box2"/>
  <text x="230" y="112" class="sm">定义：P(AB)=P(A)P(B)</text>
  <text x="230" y="130" class="sm">⇔ A与B相互独立</text>
  <text x="230" y="148" class="sm">推论：A与B̄也独立</text>
  <text x="230" y="166" class="sm">独立≠互斥！</text>
  <text x="230" y="184" class="sm">口诀：独立看乘积</text>
  <text x="230" y="202" class="red">⚠ 独立与互斥完全不同！</text>

  <!-- 古典概型 -->
  <rect x="420" y="52" width="240" height="28" class="box"/>
  <text x="540" y="70" text-anchor="middle" class="nm">古典概型（等可能有限）</text>
  <rect x="420" y="88" width="240" height="120" class="box3"/>
  <text x="430" y="112" class="sm">特征①：基本事件有限个</text>
  <text x="430" y="130" class="sm">特征②：每个基本事件等可能</text>
  <text x="430" y="148" class="sm">公式：P(A)=m/n</text>
  <text x="430" y="166" class="sm">  m=A包含的基本事件数</text>
  <text x="430" y="184" class="sm">  n=基本事件总数</text>
  <text x="430" y="202" class="sm">解题：先求n，再求m</text>
  <text x="430" y="220" class="red">⚠ 确保等可能性！</text>

  <!-- 几何概型 -->
  <rect x="20" y="220" width="240" height="28" class="box"/>
  <text x="140" y="238" text-anchor="middle" class="nm">几何概型（无限等可能）</text>
  <rect x="20" y="256" width="240" height="100" class="box2"/>
  <text x="30" y="280" class="sm">特征①：基本事件无限多个</text>
  <text x="30" y="298" class="sm">特征②：每个基本事件等可能</text>
  <text x="30" y="316" class="sm">公式：P(A)=A的测度/总测度</text>
  <text x="30" y="334" class="sm">测度：长度/面积/体积</text>
  <text x="30" y="352" class="sm">例：会面问题（时间区间）</text>

  <!-- 频率与概率 -->
  <rect x="280" y="220" width="180" height="28" class="box"/>
  <text x="370" y="238" text-anchor="middle" class="nm">频率与概率</text>
  <rect x="280" y="256" width="180" height="100" class="box3"/>
  <text x="290" y="280" class="sm">频率=m/n（n次试验中）</text>
  <text x="290" y="298" class="sm">大数定律：n很大时</text>
  <text x="290" y="316" class="sm">频率在概率附近摆动</text>
  <text x="290" y="334" class="sm">用频率估计概率</text>
  <text x="290" y="352" class="sm">n越大估计越准确</text>

  <!-- 概率计算规则 -->
  <rect x="480" y="220" width="180" height="28" class="box"/>
  <text x="570" y="238" text-anchor="middle" class="nm">概率计算规则</text>
  <rect x="480" y="256" width="180" height="120" class="box"/>
  <text x="490" y="280" class="sm">加法：A,B互斥时</text>
  <text x="490" y="298" class="sm">  P(A∪B)=P(A)+P(B)</text>
  <text x="490" y="316" class="sm">乘法：A,B独立时</text>
  <text x="490" y="334" class="sm">  P(AB)=P(A)P(B)</text>
  <text x="490" y="352" class="sm">条件概率：</text>
  <text x="490" y="370" class="sm">  P(A|B)=P(AB)/P(B)</text>

  <!-- 古典概型解题模板 -->
  <rect x="20" y="384" width="640" height="34" class="boxt"/>
  <text x="340" y="406" text-anchor="middle" class="tit">古典概型解题模板（必考！）</text>
  <rect x="20" y="426" width="640" height="100" class="box"/>
  <text x="30" y="450" class="sm">① 确定试验：明确随机试验是什么</text>
  <text x="30" y="468" class="sm">② 求n：计算基本事件总数（排列or组合？）</text>
  <text x="30" y="486" class="sm">③ 求m：计算事件A包含的基本事件数</text>
  <text x="30" y="504" class="sm">④ 计算：P(A)=m/n</text>
  <text x="30" y="522" class="sm">⑤ 检验：是否每个基本事件等可能？</text>
  <text x="30" y="540" class="red">⚠ 常与排列组合结合！先复习排列组合公式。</text>

  <!-- 概率知识关联 -->
  <rect x="20" y="536" width="640" height="90" class="box2"/>
  <text x="340" y="558" text-anchor="middle" class="nm">本章关联：概率为统计学基础</text>
  <text x="30" y="580" class="sm">第9章（统计）：用样本估计总体 → 需要概率论基础</text>
  <text x="30" y="598" class="sm">选必三第6~7章（随机变量）：将概率推广到随机变量</text>
  <text x="30" y="616" class="sm">排列组合是古典概型的基础工具 → 先掌握排列组合再学概率</text>
  <text x="30" y="634" class="sm">实际应用场景：游戏概率、风险评估、质量控制</text>
</svg>