<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620">
  <defs>
    <style>
      .box { fill:#E1F5EE; stroke:#00796b; stroke-width:1.5; }
      .box2 { fill:#E8F5E9; stroke:#388E3C; stroke-width:1.5; }
      .box3 { fill:#FFF9C4; stroke:#F9A825; stroke-width:1.5; }
      .boxt { fill:#B2DFDB; stroke:#00796b; stroke-width:2; }
      .tit { font-weight:bold; font-size:15px; fill:#00796b; font-family:sans-serif; }
      .nm { font-size:13px; fill:#1a1a1a; font-family:sans-serif; }
      .sm { font-size:11px; fill:#333; font-family:sans-serif; }
      .red { font-size:11px; fill:#c0392b; font-family:sans-serif; }
      rect { rx:8; }
    </style>
  </defs>

  <!-- 标题 -->
  <rect x="200" y="8" width="280" height="34" class="boxt"/>
  <text x="340" y="31" text-anchor="middle" class="tit">第9章 统计</text>

  <!-- 随机抽样 -->
  <rect x="20" y="52" width="190" height="28" class="box"/>
  <text x="115" y="70" text-anchor="middle" class="nm">随机抽样</text>
  <rect x="20" y="88" width="190" height="120" class="box2"/>
  <text x="30" y="112" class="sm">简单随机抽样：</text>
  <text x="40" y="130" class="sm">每个个体等概率</text>
  <text x="30" y="154" class="sm">分层抽样：</text>
  <text x="40" y="172" class="sm">先分层，层内随机</text>
  <text x="30" y="196" class="sm">系统抽样（等距）：</text>

  <!-- 频率分布直方图 -->
  <rect x="240" y="52" width="200" height="28" class="box"/>
  <text x="340" y="70" text-anchor="middle" class="nm">频率分布直方图</text>
  <rect x="240" y="88" width="200" height="120" class="box3"/>
  <text x="250" y="112" class="sm">纵轴 = 频率/组距</text>
  <text x="250" y="130" class="red">不是频率！</text>
  <text x="250" y="154" class="sm">所有矩形面积之和 = 1</text>
  <text x="250" y="172" class="sm">用样本频率估计总体分布</text>
  <text x="250" y="196" class="sm">平均数 ≈ Σ(组中值×频率)</text>

  <!-- 数字特征 -->
  <rect x="460" y="52" width="200" height="28" class="box"/>
  <text x="560" y="70" text-anchor="middle" class="nm">数字特征</text>
  <rect x="460" y="88" width="200" height="140" class="box2"/>
  <text x="470" y="112" class="sm">平均数 x̄ = Σxi/n</text>
  <text x="470" y="130" class="sm">中位数：排序后中间值</text>
  <text x="470" y="148" class="sm">方差 s² = Σ(xi-x̄)²/(n-1)</text>
  <text x="470" y="166" class="sm">标准差 s = √s²</text>
  <text x="470" y="184" class="sm">方差越大，数据越分散</text>
  <text x="470" y="202" class="sm">用样本估计总体参数</text>
  <text x="470" y="220" class="red">⚠ 方差分母 n-1！</text>

  <!-- 用样本估计总体 -->
  <rect x="20" y="226" width="320" height="28" class="boxt"/>
  <text x="180" y="244" text-anchor="middle" class="tit">用样本估计总体</text>
  <rect x="20" y="262" width="320" height="100" class="box"/>
  <text x="30" y="286" class="sm">频率分布直方图 → 估计总体分布形状</text>
  <text x="30" y="304" class="sm">样本均值 x̄ → 估计总体均值 μ</text>
  <text x="30" y="322" class="sm">样本方差 s² → 估计总体方差 σ²</text>
  <text x="30" y="340" class="sm">样本中位数 → 估计总体中位数</text>
  <text x="30" y="358" class="sm">关键：样本需具有代表性（随机抽样）</text>

  <!-- 两个变量的线性相关 -->
  <rect x="360" y="226" width="300" height="28" class="boxt"/>
  <text x="510" y="244" text-anchor="middle" class="tit">两个变量的线性相关</text>
  <rect x="360" y="262" width="300" height="120" class="box3"/>
  <text x="370" y="286" class="sm">散点图：直观判断线性相关</text>
  <text x="370" y="304" class="sm">样本相关系数 r：</text>
  <text x="380" y="322" class="sm">  |r|→1 线性相关越强</text>
  <text x="380" y="340" class="sm">  r＞0 正相关；r＜0 负相关</text>
  <text x="370" y="358" class="sm">回归直线 ŷ = b̂x + â</text>
  <text x="370" y="376" class="sm">最小二乘法估计（选必三深化）</text>

  <!-- 常见统计图对比 -->
  <rect x="20" y="382" width="640" height="28" class="box"/>
  <text x="340" y="400" text-anchor="middle" class="nm">常见统计图及其用途</text>
  <rect x="20" y="418" width="640" height="170" class="box2"/>
  <text x="30" y="442" class="sm">【频率分布直方图】展示分布形状；纵轴=频率/组距；面积和=1</text>
  <text x="30" y="460" class="sm">【折线图】展示数据变化趋势（如时间序列）</text>
  <text x="30" y="478" class="sm">【扇形图/饼图】展示各部分占比（适用于分类数据）</text>
  <text x="30" y="496" class="sm">【箱线图】展示中位数、四分位数、异常值（比较多个数据集）</text>
  <text x="30" y="514" class="sm">【散点图】展示两个变量的相关关系（判断线性相关）</text>
  <text x="30" y="532" class="sm">【茎叶图】保留原始数据，展示分布（适用于小数据集）</text>
  <text x="30" y="550" class="sm">【条形图】比较各类别数量（适用于分类数据）</text>
  <text x="30" y="578" class="red">⚠ 频率分布直方图纵轴易错！不是"频率"是"频率/组距"</text>

  <!-- 高考提示 -->
  <rect x="20" y="570" width="640" height="36" class="boxt"/>
  <text x="340" y="592" text-anchor="middle" class="tit">高考常考：抽样方法（选填）+ 数字特征计算（选填）+ 回归分析（解答）</text>
</svg>
