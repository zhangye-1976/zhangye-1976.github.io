<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660">
  <defs>
    <style>
      .box { fill:#E1F5EE; stroke:#00796b; stroke-width:1.5; rx:8; }
      .box2 { fill:#E8F5E9; stroke:#388E3C; stroke-width:1.5; rx:6; }
      .box3 { fill:#FFF9C4; stroke:#F9A825; stroke-width:1.5; rx:6; }
      .boxt { fill:#B2DFDB; stroke:#00796b; stroke-width:2; rx:8; }
      .tit { font:bold 15px sans-serif; fill:#00796b; }
      .nm { font:13px sans-serif; fill:#1a1a1a; }
      .sm { font:11px sans-serif; fill:#333; }
      .red { font:11px sans-serif; fill:#c0392b; }
    </style>
  </defs>

  <!-- 标题 -->
  <rect x="180" y="8" width="320" height="34" class="boxt"/>
  <text x="340" y="31" text-anchor="middle" class="tit">第2章 直线和圆的方程</text>

  <!-- 直线方程 -->
  <rect x="20" y="52" width="180" height="28" class="box"/>
  <text x="110" y="70" text-anchor="middle" class="nm">直线方程（5种形式）</text>
  <rect x="20" y="88" width="180" height="130" class="box"/>
  <text x="30" y="112" class="sm">点斜式：y−y₀=k(x−x₀)</text>
  <text x="30" y="130" class="sm">  （k存在时）</text>
  <text x="30" y="148" class="sm">斜截式：y=kx+b</text>
  <text x="30" y="166" class="sm">两点式：(y−y₁)/(y₂−y₁)=...</text>
  <text x="30" y="184" class="sm">截距式：x/a+y/b=1</text>
  <text x="30" y="202" class="sm">一般式：Ax+By+C=0</text>
  <text x="30" y="218" class="red">⚠ k不存在→x=x₀</text>

  <!-- 两直线关系 -->
  <rect x="220" y="52" width="200" height="28" class="box"/>
  <text x="320" y="70" text-anchor="middle" class="nm">两直线的位置关系</text>
  <rect x="220" y="88" width="200" height="150" class="box2"/>
  <text x="320" y="112" text-anchor="middle" class="sm">【平行】A₁/A₂=B₁/B₂≠C₁/C₂</text>
  <text x="320" y="132" text-anchor="middle" class="sm">【重合】A₁/A₂=B₁/B₂=C₁/C₂</text>
  <text x="320" y="152" text-anchor="middle" class="sm">【相交】A₁/A₂≠B₁/B₂</text>
  <text x="320" y="172" text-anchor="middle" class="sm">【垂直】A₁A₂+B₁B₂=0</text>
  <text x="320" y="190" text-anchor="middle" class="sm">交点：联立方程求解</text>
  <text x="320" y="208" text-anchor="middle" class="sm">到角：tanθ=|(k₂−k₁)/(1+k₁k₂)|</text>
  <text x="320" y="226" class="sm">⚠ 垂直：k₁k₂=−1（k均存在时）</text>

  <!-- 距离公式 -->
  <rect x="440" y="52" width="220" height="28" class="box"/>
  <text x="550" y="70" text-anchor="middle" class="nm">距离公式（必背！）</text>
  <rect x="440" y="88" width="220" height="150" class="box3"/>
  <text x="450" y="112" class="sm">【点线距】</text>
  <text x="450" y="130" class="sm"> d=|Ax₀+By₀+C|/√(A²+B²)</text>
  <text x="450" y="150" class="sm">【线线距】（平行两直线）</text>
  <text x="450" y="168" class="sm"> d=|C₁−C₂|/√(A²+B²)</text>
  <text x="450" y="188" class="sm">  （先化成A,B相同！）</text>
  <text x="450" y="206" class="sm">【点距】√[(x₁−x₂)²+(y₁−y₂)²]</text>
  <text x="450" y="224" class="red">⚠ 平行线距先统一A,B！</text>

  <!-- 圆的方程 -->
  <rect x="20" y="256" width="280" height="34" class="boxt"/>
  <text x="160" y="278" text-anchor="middle" class="tit">圆的方程（两种形式）</text>
  <rect x="20" y="298" width="280" height="120" class="box2"/>
  <text x="30" y="322" class="sm">【标准式】(x−a)²+(y−b)²=r²</text>
  <text x="30" y="342" class="sm">  圆心(a,b)，半径r</text>
  <text x="30" y="362" class="sm">【一般式】x²+y²+Dx+Ey+F=0</text>
  <text x="30" y="382" class="sm">  配方得标准式</text>
  <text x="30" y="400" class="sm">  条件：D²+E²−4F&gt;0</text>
  <text x="30" y="418" class="sm">配方：圆心(−D/2,−E/2)，r=√(D²+E²−4F)/2</text>

  <!-- 直线与圆的位置关系 -->
  <rect x="320" y="256" width="340" height="34" class="boxt"/>
  <text x="490" y="278" text-anchor="middle" class="tit">直线与圆的位置关系（两种判定）</text>
  <rect x="320" y="298" width="340" height="120" class="box3"/>
  <text x="330" y="322" class="sm">【几何法】d（圆心到直线距离）vs r</text>
  <text x="330" y="342" class="sm">  d&gt;r → 相离；d=r → 相切；d&lt;r → 相交</text>
  <text x="330" y="362" class="sm">【代数法】联立→一元二次方程→Δ</text>
  <text x="330" y="382" class="sm">  Δ&lt;0 → 相离；Δ=0 → 相切；Δ&gt;0 → 相交</text>
  <text x="330" y="400" class="sm">切线方程（过圆上一点）：(x₀−a)(x−a)+(y₀−b)(y−b)=r²</text>
  <text x="330" y="418" class="sm">弦长=2√(r²−d²)  （d为圆心到弦的距离）</text>

  <!-- 圆与圆 -->
  <rect x="20" y="438" width="300" height="28" class="box"/>
  <text x="170" y="456" text-anchor="middle" class="nm">圆与圆的位置关系（几何法）</text>
  <rect x="20" y="474" width="300" height="110" class="box"/>
  <text x="30" y="498" class="sm">设两圆圆心距d，半径R≥r</text>
  <text x="30" y="518" class="sm">外离：d&gt;R+r</text>
  <text x="30" y="536" class="sm">外切：d=R+r</text>
  <text x="30" y="554" class="sm">相交：R−r&lt;d&lt;R+r</text>
  <text x="30" y="572" class="sm">内切：d=|R−r|</text>
  <text x="30" y="590" class="sm">内含：d&lt;|R−r|</text>
  <text x="30" y="606" class="red">⚠ 公切线条数：外离4，外切3，相交2，内切1，内含0</text>

  <!-- 解题模板 -->
  <rect x="340" y="438" width="320" height="28" class="box"/>
  <text x="500" y="456" text-anchor="middle" class="nm">解析几何解题模板</text>
  <rect x="340" y="474" width="320" height="110" class="box2"/>
  <text x="350" y="498" class="sm">【待定系数法求圆方程】</text>
  <text x="350" y="518" class="sm">① 设方程（标准式或一般式）</text>
  <text x="350" y="536" class="sm">② 代入已知条件（3个独立条件）</text>
  <text x="350" y="554" class="sm">③ 解方程组</text>
  <text x="350" y="572" class="sm">④ 检验合理性</text>
  <text x="350" y="590" class="sm">【直线与圆相交→弦长】联立+韦达定理+弦长公式</text>
  <text x="350" y="608" class="sm">  |AB|=√(1+k²)·√[(x₁+x₂)²−4x₁x₂]</text>

  <!-- 易错总结 -->
  <rect x="20" y="596" width="640" height="60" class="box"/>
  <text x="340" y="618" text-anchor="middle" class="nm">本章易错点总结</text>
  <text x="30" y="640" class="sm">① 斜率不存在情况（直线垂直x轴）→ 设直线时先讨论k是否存在</text>
  <text x="30" y="658" class="sm">② 截距式要求a≠0且b≠0（不过原点，不与坐标轴平行）</text>
  <text x="30" y="674" class="sm">③ 圆的一般式成立条件：D²+E²−4F&gt;0（否则不是圆）</text>
</svg>