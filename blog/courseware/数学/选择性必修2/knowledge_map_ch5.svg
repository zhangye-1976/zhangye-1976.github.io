<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 720">
  <defs>
    <style>
      .box { fill:#E1F5EE; stroke:#00796b; stroke-width:1.5; rx:8; }
      .box2 { fill:#E8F5E9; stroke:#388E3C; stroke-width:1.5; rx:6; }
      .box3 { fill:#FFF9C4; stroke:#F9A825; stroke-width:1.5; rx:6; }
      .boxt { fill:#B2DFDB; stroke:#00796b; stroke-width:2; rx:8; }
      .tit { font:bold 15px sans-serif; fill:#00796b; }
      .nm { font:13px sans-serif; fill:#1a1a1a; }
      .sm { font:11px sans-serif; fill:#333; }
      .red { font:11px sans-serif; fill:#c0392b; }
    </style>
  </defs>

  <!-- 标题 -->
  <rect x="160" y="8" width="360" height="34" class="boxt"/>
  <text x="340" y="31" text-anchor="middle" class="tit">第5章 一元函数的导数及其应用</text>

  <!-- 导数概念 -->
  <rect x="20" y="52" width="180" height="28" class="box"/>
  <text x="110" y="70" text-anchor="middle" class="nm">导数的概念</text>
  <rect x="20" y="88" width="180" height="100" class="box"/>
  <text x="30" y="112" class="sm">定义：f'(x₀)=lim...</text>
  <text x="30" y="130" class="sm">（Δx→0时Δy/Δx的极限）</text>
  <text x="30" y="148" class="sm">几何意义：切线斜率</text>
  <text x="30" y="166" class="sm">物理意义：瞬时速度</text>
  <text x="30" y="184" class="sm">切线方程：</text>
  <text x="30" y="200" class="sm"> y−f(x₀)=f'(x₀)(x−x₀)</text>

  <!-- 导数公式 -->
  <rect x="220" y="52" width="200" height="28" class="box"/>
  <text x="320" y="70" text-anchor="middle" class="nm">导数公式（必背！）</text>
  <rect x="220" y="88" width="200" height="160" class="box2"/>
  <text x="230" y="112" class="sm">C' = 0</text>
  <text x="230" y="130" class="sm">(xⁿ)' = nxⁿ⁻¹</text>
  <text x="230" y="148" class="sm">(sin x)' = cos x</text>
  <text x="230" y="166" class="sm">(cos x)' = −sin x</text>
  <text x="230" y="184" class="sm">(eˣ)' = eˣ</text>
  <text x="230" y="202" class="sm">(aˣ)' = aˣ·ln a</text>
  <text x="230" y="220" class="sm">(ln x)' = 1/x</text>
  <text x="230" y="238" class="sm">(logₐx)' = 1/(x·ln a)</text>
  <text x="230" y="256" class="sm">四则：(uv)'=u'v+uv'</text>

  <!-- 复合函数求导 -->
  <rect x="440" y="52" width="220" height="28" class="box"/>
  <text x="550" y="70" text-anchor="middle" class="nm">复合函数求导（链式）</text>
  <rect x="440" y="88" width="220" height="100" class="box3"/>
  <text x="450" y="112" class="sm">y = f(g(x))</text>
  <text x="450" y="130" class="sm">y' = f'(g(x)) · g'(x)</text>
  <text x="450" y="148" class="sm">口诀：外导乘内导</text>
  <text x="450" y="166" class="sm">例：(sin 2x)'=cos2x·2=2cos2x</text>
  <text x="450" y="184" class="sm">例：(e³ˣ)'=e³ˣ·3=3e³ˣ</text>
  <text x="450" y="202" class="sm">⚠ 别漏了内导！</text>

  <!-- 导数与单调性 -->
  <rect x="20" y="210" width="300" height="34" class="boxt"/>
  <text x="170" y="232" text-anchor="middle" class="tit">导数与函数单调性（核心应用）</text>
  <rect x="20" y="252" width="300" height="120" class="box2"/>
  <text x="30" y="276" class="sm">f'(x) &gt; 0 → f(x) 单调递增</text>
  <text x="30" y="294" class="sm">f'(x) &lt; 0 → f(x) 单调递减</text>
  <text x="30" y="312" class="sm">解题步骤：</text>
  <text x="30" y="330" class="sm">① 求定义域</text>
  <text x="30" y="348" class="sm">② 求f'(x)（通分/因式分解）</text>
  <text x="30" y="366" class="sm">③ 解f'(x)&gt;0得增区间</text>
  <text x="30" y="384" class="sm">④ 解f'(x)&lt;0得减区间</text>

  <!-- 导数与极值/最值 -->
  <rect x="340" y="210" width="320" height="34" class="boxt"/>
  <text x="500" y="232" text-anchor="middle" class="tit">极值与最值（高考高频！）</text>
  <rect x="340" y="252" width="320" height="140" class="box3"/>
  <text x="350" y="276" class="sm">【极值】局部概念</text>
  <text x="350" y="294" class="sm"> 左增右减→极大值</text>
  <text x="350" y="312" class="sm"> 左减右增→极小值</text>
  <text x="350" y="330" class="sm">【最值】全局概念</text>
  <text x="350" y="348" class="sm"> 比较所有极值和端点值</text>
  <text x="350" y="366" class="sm">解题：求f'(x)=0的根→列表→比较</text>
  <text x="350" y="384" class="sm">实际应用：利润最大/成本最低</text>
  <text x="350" y="402" class="sm">⚠ 极值是局部，最值是全局！</text>

  <!-- 导数综合题 -->
  <rect x="20" y="404" width="640" height="34" class="boxt"/>
  <text x="340" y="426" text-anchor="middle" class="tit">导数解答题解题模板（高考压轴题 12分！）</text>
  <rect x="20" y="446" width="640" height="240" class="box"/>
  <text x="30" y="470" class="sm">第(1)问：求切线/单调区间/极值</text>
  <text x="30" y="488" class="sm">  步骤：求f'(x)→解f'(x)=0→列表或解不等式</text>
  <text x="30" y="506" class="sm">  切线：k=f'(x₀)，方程y−f(x₀)=k(x−x₀)</text>
  <text x="30" y="524" class="sm">第(2)问：证明不等式/求参数范围</text>
  <text x="30" y="542" class="sm">  不等式证明：构造辅助函数g(x)=f(x)−h(x)</text>
  <text x="30" y="560" class="sm">  求g(x)最小值&gt;0（或最大值&lt;0）</text>
  <text x="30" y="578" class="sm">  参数范围：参变分离→求函数值域</text>
  <text x="30" y="596" class="sm">  或分类讨论（导数零点分布）</text>
  <text x="30" y="614" class="sm">第(3)问（若有）：零点/极值点/恒成立</text>
  <text x="30" y="632" class="sm">  恒成立：a&gt;f(x)恒成立→a&gt;f(x)max</text>
  <text x="30" y="650" class="sm">  极值点：f'(x)=0且变号</text>
  <text x="30" y="668" class="sm">⚠ 求导后务必化简（通分/因式分解）！</text>
  <text x="30" y="686" class="red">⚠ 分类讨论要完整！导数压轴题重在思路清晰、步骤规范。</text>
</svg>