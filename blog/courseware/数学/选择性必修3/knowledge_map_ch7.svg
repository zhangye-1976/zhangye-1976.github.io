<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660">
  <defs>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#004d40"/>
      <stop offset="100%" style="stop-color:#00796b"/>
    </linearGradient>
  </defs>
  <rect width="680" height="660" fill="#E1F5EE" rx="8"/>
  <rect x="0" y="0" width="680" height="52" fill="url(#header)" rx="8"/>
  <rect x="0" y="44" width="680" height="8" fill="url(#header)"/>
  <text x="340" y="34" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="20" font-weight="bold">第7章 随机变量及其分布 — 思维导图</text>

  <!-- 条件概率 & 全概率 -->
  <rect x="30" y="70" width="300" height="145" fill="white" stroke="#00796b" stroke-width="1.5" rx="6"/>
  <rect x="30" y="70" width="300" height="32" fill="#00796b" rx="6"/>
  <rect x="30" y="94" width="300" height="8" fill="#00796b"/>
  <text x="180" y="92" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="14" font-weight="bold">条件概率与全概率公式</text>
  <text x="48" y="126" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">P(B|A) = P(AB)/P(A)</text>
  <text x="48" y="150" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">乘法公式：P(AB)=P(A)·P(B|A)</text>
  <text x="48" y="174" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">全概率（由因求果）：</text>
  <text x="48" y="194" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">P(B)=ΣP(Aᵢ)·P(B|Aᵢ)</text>
  <text x="48" y="218" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">⚠ 需完备事件组！</text>

  <!-- 贝叶斯 -->
  <rect x="350" y="70" width="300" height="145" fill="white" stroke="#00796b" stroke-width="1.5" rx="6"/>
  <rect x="350" y="70" width="300" height="32" fill="#00796b" rx="6"/>
  <rect x="350" y="94" width="300" height="8" fill="#00796b"/>
  <text x="500" y="92" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="14" font-weight="bold">贝叶斯公式（由果推因）</text>
  <text x="368" y="126" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">P(Aᵢ|B) = P(Aᵢ)P(B|Aᵢ)/ΣP(Aⱼ)P(B|Aⱼ)</text>
  <text x="368" y="150" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">已知结果求原因概率</text>
  <text x="368" y="174" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">本质：条件概率+全概率</text>
  <text x="368" y="194" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">医学检测经典应用</text>
  <text x="368" y="218" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">⚠ 先验→后验概率</text>

  <!-- 分布列基础 -->
  <rect x="30" y="235" width="300" height="120" fill="white" stroke="#00796b" stroke-width="1.5" rx="6"/>
  <rect x="30" y="235" width="300" height="32" fill="#00796b" rx="6"/>
  <rect x="30" y="259" width="300" height="8" fill="#00796b"/>
  <text x="180" y="257" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="14" font-weight="bold">分布列基础</text>
  <text x="48" y="289" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">性质：pᵢ≥0, Σpᵢ=1</text>
  <text x="48" y="313" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">期望 E(X)=Σxᵢpᵢ</text>
  <text x="48" y="333" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">方差 D(X)=Σ(xᵢ-E)²pᵢ</text>
  <text x="48" y="353" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">D(X)=E(X²)-[E(X)]² (实用)</text>

  <!-- 期望方差性质 -->
  <rect x="350" y="235" width="300" height="120" fill="white" stroke="#00796b" stroke-width="1.5" rx="6"/>
  <rect x="350" y="235" width="300" height="32" fill="#00796b" rx="6"/>
  <rect x="350" y="259" width="300" height="8" fill="#00796b"/>
  <text x="500" y="257" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="14" font-weight="bold">期望与方差的性质</text>
  <text x="368" y="289" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">E(aX+b) = aE(X)+b</text>
  <text x="368" y="313" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">D(aX+b) = a²D(X)</text>
  <text x="368" y="337" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">⚠ 方差与b无关！平移不变</text>
  <text x="368" y="357" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">⚠ 乘a则方差乘a²</text>

  <!-- 三大分布 -->
  <!-- 二项 -->
  <rect x="30" y="375" width="195" height="130" fill="white" stroke="#4caf50" stroke-width="2" rx="6"/>
  <rect x="30" y="375" width="195" height="30" fill="#4caf50" rx="6"/>
  <rect x="30" y="397" width="195" height="8" fill="#4caf50"/>
  <text x="127" y="395" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="13" font-weight="bold">二项分布 B(n,p)</text>
  <text x="45" y="426" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="11">P(X=k)=C(n,k)pᵏ(1-p)^(n-k)</text>
  <text x="45" y="448" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">E(X)=np</text>
  <text x="45" y="468" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">D(X)=np(1-p)</text>
  <text x="45" y="488" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">特征：独立重复试验</text>
  <text x="45" y="500" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="10">⚠ 有放回/概率不变</text>

  <!-- 超几何 -->
  <rect x="240" y="375" width="195" height="130" fill="white" stroke="#2196f3" stroke-width="2" rx="6"/>
  <rect x="240" y="375" width="195" height="30" fill="#2196f3" rx="6"/>
  <rect x="240" y="397" width="195" height="8" fill="#2196f3"/>
  <text x="337" y="395" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="13" font-weight="bold">超几何分布</text>
  <text x="255" y="426" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="11">P(X=k)=C(M,k)·C(N-M,n-k)/C(N,n)</text>
  <text x="255" y="448" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">E(X)=n·M/N</text>
  <text x="255" y="468" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">特征：不放回抽样</text>
  <text x="255" y="488" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">有限总体,分类产品</text>
  <text x="255" y="500" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="10">⚠ 不放回！N不能太小</text>

  <!-- 正态 -->
  <rect x="450" y="375" width="200" height="130" fill="white" stroke="#9c27b0" stroke-width="2" rx="6"/>
  <rect x="450" y="375" width="200" height="30" fill="#9c27b0" rx="6"/>
  <rect x="450" y="397" width="200" height="8" fill="#9c27b0"/>
  <text x="550" y="395" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="13" font-weight="bold">正态分布 N(μ,σ²)</text>
  <text x="465" y="426" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="11">钟形曲线, x=μ对称</text>
  <text x="465" y="448" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">标准化 Z=(X-μ)/σ~N(0,1)</text>
  <text x="465" y="468" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">3σ:68.27%/95.45%/99.73%</text>
  <text x="465" y="488" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">μ决定位置, σ决定胖瘦</text>
  <text x="465" y="500" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="10">⚠ 连续型,点概率=0</text>

  <!-- 对比表 -->
  <rect x="30" y="525" width="620" height="120" fill="white" stroke="#00796b" stroke-width="1.5" rx="6"/>
  <text x="340" y="548" text-anchor="middle" fill="#00796b" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="13" font-weight="bold">二项分布 vs 超几何分布 对比</text>

  <line x1="30" y1="558" x2="650" y2="558" stroke="#ccc" stroke-width="0.5"/>

  <text x="60" y="580" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">抽样方式</text>
  <text x="190" y="580" fill="#333" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">有放回</text>
  <text x="400" y="580" fill="#333" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">不放回</text>

  <text x="60" y="600" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">适用条件</text>
  <text x="190" y="600" fill="#333" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">独立重复 / 总体&gt;&gt;样本</text>
  <text x="400" y="600" fill="#333" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">有限总体 / 不放回</text>

  <text x="60" y="620" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">概率特点</text>
  <text x="190" y="620" fill="#333" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">每次p不变</text>
  <text x="400" y="620" fill="#333" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">p随抽取变化</text>

  <text x="60" y="640" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">近似关系</text>
  <text x="190" y="640" fill="#333" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">N→∞时超几何近似于二项</text>
  <text x="400" y="640" fill="#333" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">n/N≤0.1可用二项近似</text>

</svg>