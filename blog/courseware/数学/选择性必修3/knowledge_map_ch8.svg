<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600">
  <defs>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#004d40"/>
      <stop offset="100%" style="stop-color:#00796b"/>
    </linearGradient>
  </defs>
  <rect width="680" height="600" fill="#E1F5EE" rx="8"/>
  <rect x="0" y="0" width="680" height="52" fill="url(#header)" rx="8"/>
  <rect x="0" y="44" width="680" height="8" fill="url(#header)"/>
  <text x="340" y="34" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="20" font-weight="bold">第8章 成对数据的统计分析 — 思维导图</text>

  <!-- 相关分析 -->
  <rect x="30" y="70" width="300" height="180" fill="white" stroke="#00796b" stroke-width="1.5" rx="6"/>
  <rect x="30" y="70" width="300" height="32" fill="#00796b" rx="6"/>
  <rect x="30" y="94" width="300" height="8" fill="#00796b"/>
  <text x="180" y="92" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="14" font-weight="bold">统计相关性</text>

  <text x="48" y="126" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">散点图：直观判断趋势</text>

  <text x="48" y="152" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12" font-weight="bold">样本相关系数 r</text>
  <text x="48" y="172" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">r = Σ(x- x̄)(y-ȳ)/√[Σ(x- x̄)²·Σ(y-ȳ)²]</text>

  <text x="48" y="198" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12" font-weight="bold">判断标准</text>
  <text x="48" y="218" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">r&gt;0 正相关 | r&lt;0 负相关</text>
  <text x="48" y="238" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">|r|→1 强相关 | |r|→0 弱相关</text>
  <text x="48" y="258" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">⚠ r=0仅无线性相关</text>

  <!-- 回归分析 -->
  <rect x="350" y="70" width="300" height="180" fill="white" stroke="#00796b" stroke-width="1.5" rx="6"/>
  <rect x="350" y="70" width="300" height="32" fill="#00796b" rx="6"/>
  <rect x="350" y="94" width="300" height="8" fill="#00796b"/>
  <text x="500" y="92" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="14" font-weight="bold">一元线性回归</text>

  <text x="368" y="126" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">回归方程: ŷ = b̂x + â</text>

  <text x="368" y="152" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">b̂=Σ(x-x̄)(y-ȳ)/Σ(x-x̄)²</text>
  <text x="368" y="172" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">â = ȳ - b̂·x̄</text>

  <text x="368" y="196" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">模型评估</text>
  <text x="368" y="216" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">残差 eᵢ = yᵢ - ŷᵢ</text>
  <text x="368" y="236" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">R²=1-Σ(y-ŷ)²/Σ(y-ȳ)²</text>
  <text x="368" y="256" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">⚠ R²越接近1拟合越好</text>

  <!-- 独立性检验 -->
  <rect x="30" y="270" width="620" height="155" fill="white" stroke="#00796b" stroke-width="1.5" rx="6"/>
  <rect x="30" y="270" width="620" height="32" fill="#00796b" rx="6"/>
  <rect x="30" y="294" width="620" height="8" fill="#00796b"/>
  <text x="340" y="292" text-anchor="middle" fill="white" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="14" font-weight="bold">独立性检验（卡方检验）</text>

  <text x="48" y="328" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12" font-weight="bold">2x2列联表</text>
  <text x="48" y="352" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">χ² = n(ad-bc)²/[(a+b)(c+d)(a+c)(b+d)]</text>

  <text x="48" y="378" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12" font-weight="bold">解题步骤</text>
  <text x="48" y="400" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">① H₀:两变量独立 → ② 算χ² → ③ 查表比大小 → ④ 若χ²&gt;临界值,拒绝H₀,认为有关联</text>

  <text x="48" y="426" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">⚠ 写法："有充分证据认为有关联"，不写"证明"</text>

  <!-- 回归解题模板 -->
  <rect x="30" y="445" width="620" height="140" fill="#FFF8E1" stroke="#ff8f00" stroke-width="1.5" rx="6"/>
  <text x="340" y="470" text-anchor="middle" fill="#e65100" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="14" font-weight="bold">回归分析解题 5 步模板</text>

  <text x="60" y="498" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">Step 1</text>
  <text x="130" y="498" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">计算 x̄, ȳ（可能已知）</text>
  <text x="60" y="520" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">Step 2</text>
  <text x="130" y="520" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">代入 b̂ 公式求斜率</text>
  <text x="60" y="542" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">Step 3</text>
  <text x="130" y="542" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">用 â=ȳ-b̂·x̄ 求截距</text>
  <text x="60" y="564" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">Step 4</text>
  <text x="130" y="564" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">写出 ŷ = b̂x + â</text>
  <text x="60" y="586" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12">Step 5</text>
  <text x="130" y="586" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">预测 / 残差分析</text>

  <text x="340" y="510" fill="#333" font-family="SimHei,Microsoft YaHei,sans-serif" font-size="12" font-weight="bold">卡方解题步骤</text>
  <text x="340" y="534" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">①假设独立 → ②算χ² → ③比临界值</text>
  <text x="340" y="556" fill="#555" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">④χ²&gt;3.841→有关联 → ⑤写结论</text>
  <text x="340" y="580" fill="#e65100" font-family="SimSun,Microsoft YaHei,sans-serif" font-size="11">⚠ 临界值 α=0.05 时 ≈ 3.841</text>

</svg>