<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E1F5EE"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
  </defs>

  <rect width="680" height="480" rx="12" fill="url(#bg)"/>

  <rect x="20" y="15" width="640" height="42" rx="8" fill="#00796B"/>
  <text x="340" y="43" text-anchor="middle" fill="#fff" font-size="19" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">第9章 静电场及其应用 —— 电场力的性质</text>

  <!-- 库仑定律 -->
  <rect x="25" y="70" width="210" height="140" rx="6" fill="#fff" stroke="#00796B" stroke-width="1.2"/>
  <text x="130" y="92" text-anchor="middle" fill="#00796B" font-size="14" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">库仑定律</text>
  <line x1="40" y1="100" x2="220" y2="100" stroke="#B2DFDB" stroke-width="1"/>
  <text x="40" y="120" fill="#333" font-size="11" font-family="Microsoft YaHei, SimHei, sans-serif">F = k·q₁q₂/r²</text>
  <text x="40" y="138" fill="#555" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">k=9.0×10⁹ N·m²/C²</text>
  <text x="40" y="156" fill="#555" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">适用：真空中 · 点电荷</text>
  <text x="40" y="174" fill="#555" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">同性相斥 · 异性相吸</text>
  <text x="40" y="195" fill="#E53935" font-size="9" font-family="Microsoft YaHei, SimHei, sans-serif">⚠ 三点电荷平衡：两同夹一异</text>

  <!-- 电场强度 -->
  <rect x="250" y="70" width="210" height="140" rx="6" fill="#fff" stroke="#00796B" stroke-width="1.2"/>
  <text x="355" y="92" text-anchor="middle" fill="#00796B" font-size="14" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">电场强度 E</text>
  <line x1="265" y1="100" x2="445" y2="100" stroke="#B2DFDB" stroke-width="1"/>
  <text x="265" y="120" fill="#333" font-size="11" font-family="Microsoft YaHei, SimHei, sans-serif">E = F/q（定义式）</text>
  <text x="265" y="140" fill="#333" font-size="11" font-family="Microsoft YaHei, SimHei, sans-serif">E = kQ/r²（点电荷决定式）</text>
  <text x="265" y="160" fill="#555" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">E = U/d（匀强电场）</text>
  <text x="265" y="180" fill="#E53935" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">⬆ 矢量！平行四边形叠加</text>
  <text x="265" y="195" fill="#555" font-size="9" font-family="Microsoft YaHei, SimHei, sans-serif">单位：N/C = V/m</text>

  <!-- 电场线 -->
  <rect x="475" y="70" width="185" height="140" rx="6" fill="#fff" stroke="#00796B" stroke-width="1.2"/>
  <text x="567" y="92" text-anchor="middle" fill="#00796B" font-size="14" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">电场线</text>
  <line x1="490" y1="100" x2="645" y2="100" stroke="#B2DFDB" stroke-width="1"/>
  <text x="490" y="120" fill="#555" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">正→负（或无穷远）</text>
  <text x="490" y="138" fill="#555" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">切线=E方向，疏密=E大小</text>
  <text x="490" y="156" fill="#555" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">永不相交</text>
  <text x="490" y="178" fill="#E53935" font-size="9" font-family="Microsoft YaHei, SimHei, sans-serif">⚠ 电场线≠粒子轨迹</text>

  <!-- 静电平衡与屏蔽 -->
  <rect x="25" y="225" width="635" height="95" rx="6" fill="#fff" stroke="#00796B" stroke-width="1.2"/>
  <text x="340" y="248" text-anchor="middle" fill="#00796B" font-size="14" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">静电平衡与静电屏蔽</text>
  <line x1="40" y1="256" x2="640" y2="256" stroke="#B2DFDB" stroke-width="1"/>
  <text x="40" y="280" fill="#333" font-size="11" font-family="Microsoft YaHei, SimHei, sans-serif">静电平衡条件：导体内部 E=0 · 表面E⊥表面 · 电荷分布在导体外表面</text>
  <text x="40" y="300" fill="#555" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">静电屏蔽：空腔导体屏蔽外电场；接地空腔屏蔽内外电场 ｜ 尖端放电（避雷针）｜ 曲率大→电荷密度大→易放电</text>

  <!-- 关键对比表 -->
  <rect x="25" y="335" width="635" height="130" rx="6" fill="#FFF8E1" stroke="#FF8F00" stroke-width="1.2"/>
  <text x="340" y="358" text-anchor="middle" fill="#E65100" font-size="13" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">⭐ 三种常见电场叠加结论（必记）</text>

  <rect x="40" y="370" width="195" height="80" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1"/>
  <text x="137" y="390" text-anchor="middle" fill="#E65100" font-size="11" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">等量同种电荷</text>
  <text x="55" y="410" fill="#333" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">中垂线中点 E=0</text>
  <text x="55" y="428" fill="#333" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">中垂线先增后减</text>
  <text x="55" y="444" fill="#555" font-size="9" font-family="Microsoft YaHei, SimHei, sans-serif">连线上中点 E=0</text>

  <rect x="245" y="370" width="195" height="80" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1"/>
  <text x="342" y="390" text-anchor="middle" fill="#E65100" font-size="11" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">等量异种电荷</text>
  <text x="260" y="410" fill="#333" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">中垂线中点 E 最大</text>
  <text x="260" y="428" fill="#333" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">向两侧递减</text>
  <text x="260" y="444" fill="#555" font-size="9" font-family="Microsoft YaHei, SimHei, sans-serif">中垂线∥连线方向</text>

  <rect x="450" y="370" width="195" height="80" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1"/>
  <text x="547" y="390" text-anchor="middle" fill="#E65100" font-size="11" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">匀强电场</text>
  <text x="465" y="410" fill="#333" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">平行等间距</text>
  <text x="465" y="428" fill="#333" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">各点 E 大小方向相同</text>
  <text x="465" y="444" fill="#555" font-size="9" font-family="Microsoft YaHei, SimHei, sans-serif">E=U/d</text>

  <text x="340" y="472" text-anchor="middle" fill="#999" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">物理必修第三册 · 第9章 静电场及其应用</text>
</svg>
