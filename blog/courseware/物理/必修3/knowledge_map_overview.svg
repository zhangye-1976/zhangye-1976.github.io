<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E1F5EE"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>

  <rect width="680" height="520" rx="12" fill="url(#bg)"/>

  <!-- 标题 -->
  <rect x="20" y="18" width="640" height="44" rx="8" fill="url(#titleGrad)"/>
  <text x="340" y="48" text-anchor="middle" fill="#fff" font-size="20" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">物理必修第三册 · 全书总览（5章）</text>

  <!-- 第9章 -->
  <rect x="30" y="80" width="300" height="125" rx="8" fill="#fff" stroke="#00796B" stroke-width="1.5"/>
  <rect x="30" y="80" width="300" height="28" rx="8" fill="#00796B"/>
  <rect x="30" y="97" width="300" height="11" fill="#00796B"/>
  <text x="180" y="99" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">第9章 静电场及其应用</text>
  <text x="50" y="130" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">库仑定律 F=kq₁q₂/r²</text>
  <text x="50" y="150" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">电场强度 E=F/q, E=kQ/r²</text>
  <text x="50" y="170" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">电场线 · 静电平衡 · 静电屏蔽</text>
  <text x="50" y="192" fill="#00796B" font-size="11" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">⭐ 力的角度（矢量叠加）</text>

  <!-- 第10章 -->
  <rect x="350" y="80" width="300" height="125" rx="8" fill="#fff" stroke="#00796B" stroke-width="1.5"/>
  <rect x="350" y="80" width="300" height="28" rx="8" fill="#00796B"/>
  <rect x="350" y="97" width="300" height="11" fill="#00796B"/>
  <text x="500" y="99" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">第10章 静电场中的能量</text>
  <text x="370" y="130" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">电势 φ=E_p/q, 电势差 U_AB=W/q</text>
  <text x="370" y="150" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">E=U/d（匀强）</text>
  <text x="370" y="170" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">电容 C=Q/U, 电容器动态分析</text>
  <text x="370" y="192" fill="#00796B" font-size="11" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">⭐ 能的角度（标量计算）</text>

  <!-- 第11章 -->
  <rect x="30" y="220" width="300" height="115" rx="8" fill="#fff" stroke="#00796B" stroke-width="1.5"/>
  <rect x="30" y="220" width="300" height="28" rx="8" fill="#00796B"/>
  <rect x="30" y="237" width="300" height="11" fill="#00796B"/>
  <text x="180" y="239" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">第11章 电路及其应用</text>
  <text x="50" y="265" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">电阻定律 R=ρl/S</text>
  <text x="50" y="285" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">串/并联电路 · 电表改装</text>
  <text x="50" y="305" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">伏安法测电阻（内外接判断）</text>
  <text x="50" y="323" fill="#00796B" font-size="11" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">实验基础</text>

  <!-- 第12章 -->
  <rect x="350" y="220" width="300" height="115" rx="8" fill="#fff" stroke="#E53935" stroke-width="2"/>
  <rect x="350" y="220" width="300" height="28" rx="8" fill="#E53935"/>
  <rect x="350" y="237" width="300" height="11" fill="#E53935"/>
  <text x="500" y="239" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">第12章 电能 能量守恒定律 ⭐</text>
  <text x="370" y="265" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">闭合电路欧姆定律 I=E/(R+r)</text>
  <text x="370" y="285" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">U=E-Ir · 纯电阻vs非纯电阻</text>
  <text x="370" y="305" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">P_出max=E²/(4r) (R=r时)</text>
  <text x="370" y="323" fill="#E53935" font-size="11" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">🔥 必修3最重要一章！</text>

  <!-- 第13章 -->
  <rect x="30" y="350" width="300" height="105" rx="8" fill="#fff" stroke="#00796B" stroke-width="1.5"/>
  <rect x="30" y="350" width="300" height="28" rx="8" fill="#607D8B"/>
  <rect x="30" y="367" width="300" height="11" fill="#607D8B"/>
  <text x="180" y="369" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">第13章 电磁感应与电磁波初步</text>
  <text x="50" y="400" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">磁场磁感线 · B=F/(IL)</text>
  <text x="50" y="420" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">磁通量 Φ=BScosθ</text>
  <text x="50" y="440" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">电磁感应定性 · 电磁波谱</text>
  <text x="50" y="452" fill="#607D8B" font-size="11" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">选必2的前奏</text>

  <!-- 学习路径 -->
  <rect x="350" y="350" width="300" height="105" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="500" y="375" text-anchor="middle" fill="#2E7D32" font-size="13" font-weight="700" font-family="Microsoft YaHei, SimHei, sans-serif">学习路径</text>
  <text x="370" y="398" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">第9章(力) → 第10章(能) →</text>
  <text x="370" y="418" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">第11章(电路) → 第12章(能量) →</text>
  <text x="370" y="438" fill="#333" font-size="12" font-family="Microsoft YaHei, SimHei, sans-serif">第13章(电磁纽带) → 选必2(进阶)</text>
  <text x="370" y="452" fill="#E53935" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">🔴 9-10章是电磁学基石，必须打牢！</text>

  <!-- 底部标注 -->
  <text x="340" y="485" text-anchor="middle" fill="#777" font-size="11" font-family="Microsoft YaHei, SimHei, sans-serif">全国乙卷 · 人教版2019版 · 必修3选择题约16% + 实验题约8% + 计算题约10%</text>
  <text x="340" y="505" text-anchor="middle" fill="#aaa" font-size="10" font-family="Microsoft YaHei, SimHei, sans-serif">物理必修第三册 · 全书总览</text>
</svg>
