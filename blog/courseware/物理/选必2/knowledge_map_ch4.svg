<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <rect width="680" height="400" fill="#E1F5EE" rx="12"/>
  <text x="340" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#00796b">第4章 电磁振荡与电磁波</text>

  <!-- LC振荡 -->
  <rect x="30" y="55" width="300" height="170" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <rect x="30" y="55" width="300" height="28" fill="#00796b" rx="8"/>
  <text x="180" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">LC振荡电路</text>
  <text x="45" y="105" font-size="12" font-weight="600" fill="#333">周期：T = 2π√LC</text>
  <text x="45" y="130" font-size="11" fill="#555">能量转化：电场能⇄磁场能</text>
  <text x="45" y="155" font-size="11" fill="#555">电容器充电→电场能最大→放电→磁场能最大</text>
  <text x="45" y="180" font-size="11" fill="#555">i与q的相位差 π/2（电流超前电荷量）</text>
  <text x="45" y="210" font-size="11" fill="#72243E">⚠ T只取决于L和C，与充电电压无关</text>

  <!-- 电磁波 -->
  <rect x="350" y="55" width="300" height="170" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <rect x="350" y="55" width="300" height="28" fill="#00796b" rx="8"/>
  <text x="500" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">电磁波</text>
  <text x="365" y="105" font-size="12" font-weight="600" fill="#333">麦克斯韦预言 · 赫兹实验验证</text>
  <text x="365" y="135" font-size="11" fill="#555">变化的电场产生磁场</text>
  <text x="365" y="155" font-size="11" fill="#555">变化的磁场产生电场</text>
  <text x="365" y="180" font-size="11" fill="#555">v=λf · c=3×10⁸m/s（真空中）</text>
  <text x="365" y="210" font-size="11" fill="#555">电磁波是横波（E⊥B⊥传播方向）</text>

  <!-- 电磁波谱 -->
  <rect x="30" y="245" width="620" height="135" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <rect x="30" y="245" width="620" height="28" fill="#00796b" rx="8"/>
  <text x="340" y="264" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">电磁波谱（频率↑ → 波长↓）</text>

  <text x="55" y="300" font-size="11" fill="#555">无线电波 → 微波 → 红外线 → 可见光 → 紫外线 → X射线 → γ射线</text>
  <text x="55" y="325" font-size="11" fill="#333">波长最长 ···························· 波长最短</text>
  <text x="55" y="350" font-size="11" fill="#555">通信/广播 · 雷达 · 热效应 · 人眼 · 荧光/杀菌 · 透视 · 放疗/核</text>
  <text x="55" y="375" font-size="11" fill="#72243E">⚠ 各种电磁波在真空中速度相同（c），频率/波长不同</text>
</svg>