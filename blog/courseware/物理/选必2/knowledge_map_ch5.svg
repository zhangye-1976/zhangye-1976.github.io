<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380">
  <rect width="680" height="380" fill="#E1F5EE" rx="12"/>
  <text x="340" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#00796b">第5章 传感器</text>

  <!-- 传感器原理 -->
  <rect x="30" y="55" width="300" height="140" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <rect x="30" y="55" width="300" height="28" fill="#00796b" rx="8"/>
  <text x="180" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">传感器原理</text>
  <text x="45" y="105" font-size="12" font-weight="600" fill="#333">核心：非电学量 → 电学量</text>
  <text x="45" y="130" font-size="11" fill="#555">敏感元件 + 转换元件 + 转换电路</text>
  <text x="45" y="155" font-size="11" fill="#555">敏感元件：直接感受被测量</text>
  <text x="45" y="175" font-size="11" fill="#555">转换电路：放大/滤波/数字化</text>

  <!-- 常见传感器 -->
  <rect x="350" y="55" width="300" height="140" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <rect x="350" y="55" width="300" height="28" fill="#00796b" rx="8"/>
  <text x="500" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">常见传感器</text>
  <text x="365" y="105" font-size="11" fill="#555">光敏电阻：光照↑ → 电阻↓（半导体制）</text>
  <text x="365" y="125" font-size="11" fill="#555">热敏电阻：温度↑ → 电阻↓（NTC）</text>
  <text x="365" y="145" font-size="11" fill="#555">霍尔元件：磁场→电压 U_H = k·IB/d</text>
  <text x="365" y="170" font-size="11" fill="#555">压敏/气敏/湿敏传感器</text>

  <!-- 应用 -->
  <rect x="30" y="215" width="620" height="145" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <text x="340" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#00796b">高中阶段重点应用</text>

  <text x="55" y="275" font-size="12" font-weight="600" fill="#333">① 光控开关：光敏电阻 + 继电器/三极管控制电路</text>
  <text x="55" y="300" font-size="11" fill="#555">② 温控电路：热敏电阻 + 比较器/继电器（如电饭煲保温）</text>
  <text x="55" y="325" font-size="11" fill="#555">③ 霍尔测速：霍尔元件 + 计数器（测车轮转速）</text>
  <text x="55" y="350" font-size="11" fill="#72243E">⚠ 本章高考权重低（选择题偶尔出现），掌握原理即可</text>
</svg>