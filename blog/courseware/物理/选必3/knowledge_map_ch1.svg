<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 450">
  <rect width="680" height="450" fill="#E1F5EE" rx="12"/>
  <text x="340" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#00796b">第1章 分子动理论</text>

  <!-- 分子大小与阿伏加德罗常数 -->
  <rect x="30" y="55" width="300" height="150" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <rect x="30" y="55" width="300" height="28" fill="#00796b" rx="8"/>
  <text x="180" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">物质由大量分子组成</text>
  <text x="45" y="105" font-size="12" font-weight="600" fill="#333">阿伏加德罗常数 N_A=6.02×10²³mol⁻¹</text>
  <text x="45" y="128" font-size="11" fill="#555">分子直径数量级：10⁻¹⁰m</text>
  <text x="45" y="148" font-size="11" fill="#555">分子质量 m₀=M/N_A · 分子体积 V₀=V_mol/N_A</text>
  <text x="45" y="175" font-size="11" font-weight="600" fill="#333">油膜法：d = V/S（测分子直径）</text>
  <text x="45" y="198" font-size="11" fill="#72243E">⚠ 气体 V₀ ≠ V_mol/N_A（分子间距大）</text>

  <!-- 布朗运动 -->
  <rect x="350" y="55" width="300" height="150" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <rect x="350" y="55" width="300" height="28" fill="#00796b" rx="8"/>
  <text x="500" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">分子热运动</text>
  <text x="365" y="108" font-size="12" font-weight="600" fill="#72243E">布朗运动 ≠ 分子运动</text>
  <text x="365" y="132" font-size="11" fill="#555">本质：悬浮微粒被液体分子撞击</text>
  <text x="365" y="152" font-size="11" fill="#555">微粒越小→越明显，温度越高→越明显</text>
  <text x="365" y="175" font-size="11" fill="#333">扩散：分子热运动导致的物质迁移</text>
  <text x="365" y="195" font-size="11" fill="#555">温度越高→扩散越快</text>

  <!-- 分子力与内能 -->
  <rect x="30" y="225" width="620" height="210" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <text x="340" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#00796b">分子间作用力与内能</text>

  <text x="55" y="280" font-size="12" font-weight="600" fill="#333">分子力曲线：</text>
  <text x="55" y="305" font-size="11" fill="#555">r=r₀时：引力=斥力（平衡）· r&lt;r₀：斥力主导 · r&gt;r₀：引力主导 · r&gt;10r₀：忽略</text>

  <text x="55" y="340" font-size="12" font-weight="600" fill="#333">内能 = 分子动能 + 分子势能</text>
  <text x="55" y="365" font-size="11" fill="#555">分子动能→由温度决定 · 分子势能→由体积（分子间距）决定</text>
  <text x="55" y="395" font-size="11" fill="#333">温度是分子平均动能的标志（不是总内能的标志）</text>
  <text x="55" y="420" font-size="11" fill="#72243E">⚠ 理想气体：无分子势能 → 内能只取决于温度！（关键判断依据）</text>
</svg>