<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 430">
  <rect width="680" height="430" fill="#E1F5EE" rx="12"/>
  <text x="340" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#00796b">第3章 热力学定律</text>

  <!-- 热一律 -->
  <rect x="30" y="55" width="300" height="200" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <rect x="30" y="55" width="300" height="28" fill="#00796b" rx="8"/>
  <text x="180" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">热力学第一定律 ⭐⭐⭐⭐</text>
  <text x="45" y="110" font-size="14" font-weight="600" fill="#72243E">ΔU = W + Q</text>
  <text x="45" y="140" font-size="11" font-weight="600" fill="#333">符号规定：</text>
  <text x="45" y="160" font-size="11" fill="#555">W&gt;0：外界对系统做功（压缩）</text>
  <text x="45" y="180" font-size="11" fill="#555">Q&gt;0：系统吸热 · ΔU&gt;0：内能增加</text>
  <text x="45" y="205" font-size="11" font-weight="600" fill="#333">解题三步法：</text>
  <text x="45" y="225" font-size="11" fill="#555">① ΔU→看温度变化 ② W→看体积变化</text>
  <text x="45" y="245" font-size="11" fill="#555">③ 由ΔU=W+Q求Q</text>

  <!-- 热二律 -->
  <rect x="350" y="55" width="300" height="200" fill="#fff" stroke="#00796b" stroke-width="2" rx="8"/>
  <rect x="350" y="55" width="300" height="28" fill="#00796b" rx="8"/>
  <text x="500" y="74" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">热力学第二定律 ⭐⭐⭐</text>
  <text x="365" y="108" font-size="12" font-weight="600" fill="#333">克劳修斯表述：</text>
  <text x="365" y="130" font-size="11" fill="#555">热量不能自发从低温→高温</text>
  <text x="365" y="155" font-size="12" font-weight="600" fill="#333">开尔文表述：</text>
  <text x="365" y="177" font-size="11" fill="#555">不可能从单一热源吸热全部做功</text>
  <text x="365" y="205" font-size="11" font-weight="600" fill="#72243E">实质：热现象宏观过程有方向性</text>
  <text x="365" y="235" font-size="11" fill="#555">熵增原理：孤立系统熵永不减小</text>

  <!-- 永动机 -->
  <rect x="30" y="275" width="620" height="140" fill="#FBEAF0" stroke="#72243E" stroke-width="1.5" rx="8"/>
  <text x="340" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="#72243E">🔴 两类永动机都不可能！</text>
  <text x="55" y="330" font-size="12" font-weight="600" fill="#333">第一类永动机：不消耗能量持续做功 → 违反热力学第一定律（能量守恒） ❌</text>
  <text x="55" y="355" font-size="12" font-weight="600" fill="#333">第二类永动机：从单一热源吸热全部做功 → 违反热力学第二定律（方向性） ❌</text>
  <text x="55" y="385" font-size="11" fill="#555">热机效率 η = W/Q₁ &lt; 1（永远不可能达到100%），卡诺循环效率最高</text>
</svg>