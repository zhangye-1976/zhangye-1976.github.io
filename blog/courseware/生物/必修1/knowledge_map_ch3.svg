<svg viewBox="0 0 680 720" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第3章 细胞的基本结构</title>
  <desc>细胞膜、细胞器、细胞核、生物膜系统</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="180" y="8" width="320" height="40" rx="10" fill="#00796b"/>
  <text x="340" y="33" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="15" font-weight="500" font-family="system-ui, sans-serif">第3章 细胞的基本结构</text>

  <line x1="340" y1="48" x2="340" y2="68" stroke="#00796b" stroke-width="0.5" marker-end="url(#arrow)"/>

  <rect x="40" y="72" width="190" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="135" y="99" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第1节 细胞膜</text>

  <rect x="250" y="72" width="190" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="345" y="99" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第2节 细胞器 ★</text>

  <rect x="460" y="72" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="550" y="99" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第3节 细胞核</text>

  <rect x="40" y="148" width="600" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="168" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">流动镶嵌模型：磷脂双分子层（基本骨架）+ 蛋白质（镶嵌/贯穿/覆盖）</text>
  <text x="340" y="188" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">★ 糖蛋白（糖被）在细胞膜外侧 → 识别 | 流动性/选择透过性是功能基础</text>

  <rect x="40" y="228" width="600" height="320" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="250" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">八大细胞器对比</text>

  <rect x="55" y="268" width="185" height="55" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="147" y="286" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">线粒体——有氧呼吸主要场所</text>
  <text x="147" y="306" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">双层膜 | 嵴（增大面积）| 含DNA</text>

  <rect x="255" y="268" width="185" height="55" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="347" y="286" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">叶绿体——光合作用场所</text>
  <text x="347" y="306" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">双层膜 | 基粒(类囊体堆叠) | 含DNA</text>

  <rect x="455" y="268" width="170" height="55" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="540" y="286" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">内质网——蛋白质加工/脂质合成</text>
  <text x="540" y="306" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">单层膜 | 粗面(有核糖体)/滑面</text>

  <rect x="55" y="340" width="185" height="55" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="147" y="358" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">高尔基体——加工/分类/包装+分泌</text>
  <text x="147" y="378" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">单层膜 | 植物：与细胞壁形成有关</text>

  <rect x="255" y="340" width="185" height="55" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="347" y="358" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">核糖体——蛋白质合成场所</text>
  <text x="347" y="378" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">★ 无膜！原核+真核共有！</text>

  <rect x="455" y="340" width="170" height="55" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="540" y="358" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">溶酶体——"消化车间"</text>
  <text x="540" y="378" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">单层膜 | 含多种水解酶</text>

  <rect x="55" y="412" width="185" height="55" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="147" y="430" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">液泡——调节细胞内环境</text>
  <text x="147" y="450" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">单层膜 | 含细胞液(糖类/色素)</text>

  <rect x="255" y="412" width="185" height="55" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="347" y="430" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">中心体——动物+低等植物有丝分裂</text>
  <text x="347" y="450" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">★ 无膜！两个中心粒互相垂直</text>

  <rect x="455" y="412" width="170" height="55" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="540" y="430" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">细胞骨架——维持形态/运动</text>
  <text x="540" y="450" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">蛋白质纤维（微管+微丝）</text>

  <text x="340" y="492" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">★ 分泌蛋白路径：核糖体→内质网→高尔基体→细胞膜（线粒体供能）</text>
  <text x="340" y="512" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">★ 动植物共有：线粒体、内质网、高尔基体、核糖体、溶酶体</text>
  <text x="340" y="532" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">★ 植物特有：叶绿体、液泡 | 动物+低等植物有：中心体 | 原核只有核糖体</text>

  <rect x="40" y="564" width="600" height="72" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="586" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">细胞核：核膜（双层膜+核孔）| 核仁（rRNA合成+核糖体形成）</text>
  <text x="340" y="606" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041" font-family="system-ui, sans-serif">染色质(分裂间期)→染色体(分裂期) | 同一物质的不同形态 | DNA主要载体</text>
  <text x="340" y="626" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">★ 核孔是大分子进出通道（有选择性）| 代谢旺盛→核孔多、核仁大</text>

  <rect x="120" y="656" width="440" height="44" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="340" y="682" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#4B1528" font-family="system-ui, sans-serif">高频：细胞器结构与功能匹配 | 分泌蛋白路径 | 动植物细胞区别</text>
</svg>
