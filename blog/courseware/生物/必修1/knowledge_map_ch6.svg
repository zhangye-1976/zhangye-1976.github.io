<svg viewBox="0 0 680 620" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第6章 细胞的生命历程</title>
  <desc>细胞增殖、分化、衰老与死亡</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="180" y="8" width="320" height="40" rx="10" fill="#00796b"/>
  <text x="340" y="33" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="15" font-weight="500" font-family="system-ui, sans-serif">第6章 细胞的生命历程 ★★</text>

  <rect x="40" y="72" width="180" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="130" y="99" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第1节 细胞的增殖 ★★</text>

  <rect x="250" y="72" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="99" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第2节 细胞的分化</text>

  <rect x="460" y="72" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="550" y="99" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第3节 衰老和死亡</text>

  <rect x="40" y="148" width="600" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="173" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">细胞周期 = 分裂间期(90-95%) + 分裂期(5-10%)</text>

  <rect x="40" y="210" width="600" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="230" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">分裂间期：DNA复制、蛋白质合成（DNA加倍，染色体数不变）</text>
  <text x="340" y="252" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041" font-family="system-ui, sans-serif">口诀："D复蛋合做准备"——分裂间期是细胞周期中时间最长的阶段</text>
  <text x="340" y="272" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">★ 只有连续分裂的细胞才有细胞周期！</text>

  <rect x="40" y="300" width="600" height="170" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="320" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">有丝分裂各时期（前期 → 中期 → 后期 → 末期）</text>

  <rect x="55" y="336" width="130" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="120" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">前期</text>
  <text x="120" y="374" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">膜仁消失两体现</text>
  <text x="120" y="390" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">染色质→染色体</text>

  <rect x="198" y="336" width="130" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="263" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">中期</text>
  <text x="263" y="374" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">形定数清赤道齐</text>
  <text x="263" y="390" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">观察最佳时期</text>

  <rect x="341" y="336" width="130" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="406" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">后期</text>
  <text x="406" y="374" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">粒裂数增均两极</text>
  <text x="406" y="390" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">★ 染色体数加倍！</text>

  <rect x="484" y="336" width="140" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="554" y="356" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">末期</text>
  <text x="554" y="374" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">两消两现板成壁</text>
  <text x="554" y="390" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">细胞板→细胞壁</text>

  <text x="340" y="422" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56" font-family="system-ui, sans-serif">动物区别：中心体→星射线（纺锤体）| 末期细胞膜缢裂（不形成细胞板）</text>
  <text x="340" y="442" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56" font-family="system-ui, sans-serif">观察实验：解离→漂洗→染色→制片 | 分生区细胞：正方形、排列紧密</text>
  <text x="340" y="460" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">★ DNA加倍在间期！染色体加倍在后期（着丝粒分裂）！不要混淆！</text>

  <rect x="40" y="490" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="180" y="512" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">细胞分化：基因的选择性表达</text>
  <text x="180" y="532" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">遗传物质不变！全能性：受精卵 &gt; 干细胞 &gt; 体细胞</text>

  <rect x="360" y="490" width="280" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="500" y="512" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">凋亡：基因决定的程序性死亡 ≠ 坏死</text>
  <text x="500" y="532" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">细胞衰老：一大一小一多两低 | 自由基学说+端粒学说</text>

  <rect x="100" y="565" width="480" height="36" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="340" y="588" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#4B1528" font-family="system-ui, sans-serif">DNA和染色体数量变化曲线是必考图像分析题！</text>
</svg>