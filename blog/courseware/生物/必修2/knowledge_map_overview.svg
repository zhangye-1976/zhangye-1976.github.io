<svg viewBox="0 0 680 580" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>遗传与进化 全书总览</title>
  <desc>六大章节知识框架</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="180" y="8" width="320" height="40" rx="10" fill="#00796b"/>
  <text x="340" y="33" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="15" font-weight="500" font-family="system-ui, sans-serif">必修2 遗传与进化 全书总览</text>

  <line x1="340" y1="48" x2="340" y2="68" stroke="#00796b" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Layer 1: Classical Genetics -->
  <rect x="40" y="72" width="180" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="130" y="94" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第1章 遗传因子的发现 ★</text>
  <text x="130" y="114" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">分离定律/自由组合定律</text>

  <rect x="260" y="72" width="180" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="350" y="94" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第2章 基因和染色体关系 ★</text>
  <text x="350" y="114" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">减数分裂/伴性遗传</text>

  <rect x="480" y="72" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="560" y="94" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第5章 变异</text>
  <text x="560" y="114" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">突变/重组/染色体变异</text>

  <!-- Arrows down -->
  <line x1="130" y1="128" x2="130" y2="168" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="128" x2="350" y2="168" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="128" x2="560" y2="168" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: Molecular Genetics -->
  <rect x="40" y="172" width="290" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="185" y="199" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第3章 基因的本质：DNA→结构→复制</text>

  <rect x="370" y="172" width="270" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="505" y="199" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第4章 基因的表达 ★：转录→翻译</text>

  <!-- Center connection area -->
  <rect x="40" y="248" width="600" height="72" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="270" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">整本书的三条主线</text>
  <text x="340" y="295" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041" font-family="system-ui, sans-serif">经典遗传学(Ch1-2) → 分子遗传学(Ch3-4) → 变异进化(Ch5-6)</text>

  <!-- Layer 3: Evolution -->
  <rect x="160" y="352" width="360" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="374" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第6章 生物的进化</text>
  <text x="340" y="394" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">自然选择 → 基因频率 → 物种形成 → 协同进化</text>

  <!-- Top 3 hot spots -->
  <rect x="60" y="440" width="560" height="72" rx="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="340" y="462" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4B1528" font-family="system-ui, sans-serif">Top 3 高频大题考点</text>
  <text x="340" y="482" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">1. 遗传概率计算（分离+自由组合+伴性综合） | 2. 减数分裂+遗传定律+系谱图综合</text>
  <text x="340" y="500" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">3. 中心法则（转录/翻译细节+碱基计算） | 基因频率计算 | 变异类型判断</text>

  <rect x="180" y="532" width="320" height="36" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="555" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#042C53" font-family="system-ui, sans-serif">这本书是高考生物最难、分值最大的一册</text>
</svg>
