<svg viewBox="0 0 680 580" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>选必1 第1章 人体的内环境与稳态</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="160" y="8" width="360" height="38" rx="10" fill="#00796b"/>
  <text x="340" y="31" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="15" font-weight="500" font-family="system-ui, sans-serif">第1章 人体的内环境与稳态</text>

  <!-- 内环境组成 -->
  <rect x="40" y="60" width="600" height="100" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="80" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">一、内环境的组成</text>
  <rect x="60" y="94" width="90" height="34" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="105" y="114" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">血浆</text>
  <rect x="195" y="94" width="90" height="34" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="240" y="114" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">组织液</text>
  <rect x="330" y="94" width="90" height="34" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="375" y="114" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">淋巴</text>
  <rect x="480" y="94" width="140" height="34" rx="6" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
  <text x="550" y="114" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">三者统称"细胞外液"</text>
  <text x="340" y="149" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">血浆与组织液双向渗透 | 组织液单向→淋巴→血浆（单向回流）</text>

  <!-- 理化性质 -->
  <rect x="40" y="175" width="600" height="90" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="196" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">二、内环境理化性质</text>
  <rect x="60" y="208" width="170" height="34" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="145" y="229" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#04342C" font-family="system-ui, sans-serif">pH: 7.35~7.45 (HCO₃⁻缓冲)</text>
  <rect x="250" y="208" width="170" height="34" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="335" y="229" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#04342C" font-family="system-ui, sans-serif">温度: ~37℃ (酶最适温度)</text>
  <rect x="440" y="208" width="180" height="34" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="530" y="229" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#04342C" font-family="system-ui, sans-serif">渗透压: ~770kPa (Na⁺+Cl⁻)</text>
  <text x="340" y="254" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">内环境是细胞与外界进行物质交换的媒介</text>

  <!-- 稳态调节机制 -->
  <rect x="40" y="280" width="600" height="95" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="301" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">三、稳态的调节机制 ★</text>
  <text x="340" y="322" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041" font-family="system-ui, sans-serif">神经调节 → 体液调节 → 免疫调节 = 神经-体液-免疫调节网络</text>
  <text x="340" y="343" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#085041" font-family="system-ui, sans-serif">反馈调节是稳态维持的基础机制：负反馈（主导）、正反馈</text>
  <text x="340" y="364" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">稳态 ≠ 固定不变 → 动态平衡（一定范围内波动）</text>

  <!-- 与后三章的关系 -->
  <rect x="40" y="390" width="600" height="80" rx="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="340" y="412" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#4B1528" font-family="system-ui, sans-serif">本章→后续章节 衔接关系（全书核心框架）</text>
  <text x="340" y="433" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">内环境稳态 → 第2章神经调节 → 第3章体液调节 → 第4章免疫调节</text>
  <text x="340" y="454" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">本章为全书"地基"，理解内环境是搞定后三章的前提</text>

  <!-- 易错提醒 -->
  <rect x="40" y="485" width="600" height="80" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="507" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#042C53" font-family="system-ui, sans-serif">易错提醒</text>
  <text x="340" y="527" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#042C53" font-family="system-ui, sans-serif">1. 内环境≠细胞内液：血浆、组织液、淋巴是细胞外液</text>
  <text x="340" y="547" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#042C53" font-family="system-ui, sans-serif">2. 稳态是动态平衡，不是恒定不变 | 3. 内环境pH靠缓冲对维持</text>
</svg>
