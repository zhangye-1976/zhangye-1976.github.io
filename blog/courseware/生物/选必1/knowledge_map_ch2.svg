<svg viewBox="0 0 800 700" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0F6E56"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <rect x="200" y="10" width="400" height="38" rx="10" fill="#00796b"/>
  <text x="400" y="34" text-anchor="middle" fill="white" font-size="15" font-weight="bold">第2章 神经调节 核心框架</text>

  <!-- 反射弧 -->
  <rect x="40" y="65" width="720" height="130" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="60" y="88" fill="#04342C" font-size="14" font-weight="bold">反射弧（五部分，缺一不可）</text>
  <rect x="80" y="98" width="100" height="32" rx="6" fill="white" stroke="#0F6E56" stroke-width="1"/>
  <text x="130" y="118" text-anchor="middle" fill="#04342C" font-size="12">感受器</text>
  <line x1="180" y1="114" x2="210" y2="114" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="210" y="98" width="100" height="32" rx="6" fill="white" stroke="#0F6E56" stroke-width="1"/>
  <text x="260" y="118" text-anchor="middle" fill="#04342C" font-size="12">传入神经</text>
  <line x1="310" y1="114" x2="340" y2="114" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="340" y="98" width="100" height="32" rx="6" fill="white" stroke="#0F6E56" stroke-width="1"/>
  <text x="390" y="118" text-anchor="middle" fill="#04342C" font-size="12">神经中枢</text>
  <line x1="440" y1="114" x2="470" y2="114" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="470" y="98" width="100" height="32" rx="6" fill="white" stroke="#0F6E56" stroke-width="1"/>
  <text x="520" y="118" text-anchor="middle" fill="#04342C" font-size="12">传出神经</text>
  <line x1="570" y1="114" x2="600" y2="114" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="600" y="98" width="100" height="32" rx="6" fill="white" stroke="#0F6E56" stroke-width="1"/>
  <text x="650" y="118" text-anchor="middle" fill="#04342C" font-size="12">效应器</text>

  <text x="60" y="148" fill="#72243E" font-size="11">🔴 易错：没有感觉=感受器/传入神经/神经中枢受损；有感觉无反应=传出神经/效应器受损</text>
  <text x="60" y="165" fill="#085041" font-size="11">• 非条件反射（先天，低级中枢如脊髓）；条件反射（后天，高级中枢如大脑皮层）</text>
  <text x="60" y="182" fill="#085041" font-size="11">• 低级中枢受高级中枢控制（如排尿反射：脊髓→大脑皮层可控制）</text>

  <!-- 神经纤维传导 -->
  <rect x="40" y="210" width="340" height="155" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="60" y="233" fill="#04342C" font-size="13" font-weight="bold">神经纤维上的兴奋传导</text>
  <text x="60" y="252" fill="#085041" font-size="11">静息电位：外正内负（-70mV），K⁺外流</text>
  <text x="60" y="269" fill="#085041" font-size="11">动作电位：外负内正（+50mV），Na⁺内流</text>
  <text x="60" y="286" fill="#085041" font-size="11">局部电流：兴奋部位→未兴奋部位</text>
  <rect x="60" y="295" width="280" height="1" fill="#0F6E56"/>
  <text x="60" y="314" fill="#04342C" font-size="12" font-weight="bold">传导方向：</text>
  <text x="60" y="331" fill="#085041" font-size="11">• 离体实验：双向传导</text>
  <text x="60" y="348" fill="#085041" font-size="11">• 体内反射弧：单向传导（因为突触）</text>
  <text x="60" y="365" fill="#72243E" font-size="11">🔴 易错：体内单向是因为突触，不是神经纤维本身</text>

  <!-- 突触传递 -->
  <rect x="410" y="210" width="350" height="155" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="430" y="233" fill="#04342C" font-size="13" font-weight="bold">突触传递（单向！）</text>
  <text x="430" y="252" fill="#085041" font-size="11">结构：突触前膜→突触间隙→突触后膜</text>
  <text x="430" y="269" fill="#085041" font-size="11">过程：</text>
  <text x="440" y="286" fill="#085041" font-size="11">1. 兴奋到达→Ca²⁺内流</text>
  <text x="440" y="303" fill="#085041" font-size="11">2. 突触小泡与前膜融合→释放递质（胞吐）</text>
  <text x="440" y="320" fill="#085041" font-size="11">3. 递质与后膜受体结合→后膜电位变化</text>
  <text x="440" y="337" fill="#085041" font-size="11">4. 递质被分解或回收（否则持续作用）</text>
  <text x="430" y="355" fill="#72243E" font-size="11">🔴 易错：递质不进入后神经元；只与受体结合</text>

  <!-- 大脑皮层言语区 -->
  <rect x="40" y="380" width="350" height="130" rx="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="1"/>
  <text x="60" y="403" fill="#4B1528" font-size="13" font-weight="bold">大脑皮层言语区（W V S H）</text>
  <text x="60" y="422" fill="#72243E" font-size="11">W区（ writing）：书写中枢→损伤=失写症（不会写）</text>
  <text x="60" y="439" fill="#72243E" font-size="11">V区（vision）：阅读中枢→损伤=失读症（看不懂）</text>
  <text x="60" y="456" fill="#72243E" font-size="11">S区（speak）：说话中枢→损伤=运动性失语（不会说）★</text>
  <text x="60" y="473" fill="#72243E" font-size="11">H区（hear）：听觉中枢→损伤=听觉性失语（听不懂）</text>
  <text x="60" y="490" fill="#72243E" font-size="11">🔴 S区损伤最常见：能听懂、能看懂、能写字，但不会说话</text>

  <!-- 记忆 -->
  <rect x="420" y="380" width="340" height="130" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="440" y="403" fill="#04342C" font-size="13" font-weight="bold">记忆过程</text>
  <text x="440" y="422" fill="#085041" font-size="11">短期记忆：神经活动多次强化</text>
  <text x="440" y="439" fill="#085041" font-size="11">长期记忆：形成新的突触连接</text>
  <text x="440" y="456" fill="#085041" font-size="11">学习与记忆是脑的高级功能，涉及</text>
  <text x="440" y="473" fill="#085041" font-size="11">海马区、新皮层等多个脑区。</text>

  <!-- 高考提醒 -->
  <rect x="40" y="525" width="720" height="80" rx="10" fill="#FFF7E6" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="60" y="547" fill="#92400E" font-size="13" font-weight="bold">🎯 高考高频考点</text>
  <text x="60" y="565" fill="#92400E" font-size="11">1. 反射弧分析题：给实验/病例，判断哪部分受损（切口、药物阻断实验是经典题型）</text>
  <text x="60" y="582" fill="#92400E" font-size="11">2. 电位测量实验：电表接在神经纤维不同位置，给予刺激，分析指针偏转</text>
  <text x="60" y="599" fill="#92400E" font-size="11">3. 突触传递分析：递质种类（兴奋/抑制）、药物影响（如强心苷、肉毒杆菌毒素）</text>
</svg>