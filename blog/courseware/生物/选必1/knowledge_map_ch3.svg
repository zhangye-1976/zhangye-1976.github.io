<svg viewBox="0 0 800 750" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0F6E56"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <rect x="200" y="10" width="400" height="38" rx="10" fill="#00796b"/>
  <text x="400" y="34" text-anchor="middle" fill="white" font-size="15" font-weight="bold">第3章 体液调节 核心框架</text>

  <!-- 激素调节特点 -->
  <rect x="40" y="60" width="720" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="60" y="82" fill="#04342C" font-size="13" font-weight="bold">激素调节特点</text>
  <text x="60" y="100" fill="#085041" font-size="11">① 微量高效  ② 通过体液运输（无导管）  ③ 作用于靶器官/靶细胞（有特异性受体）</text>
  <text x="60" y="117" fill="#72243E" font-size="11">🔴 易错：激素不提供能量、不组成细胞结构，只起调节作用；一经作用就被灭活</text>

  <!-- 血糖调节 -->
  <rect x="40" y="130" width="720" height="145" rx="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.5"/>
  <text x="60" y="152" fill="#4B1528" font-size="14" font-weight="bold">血糖调节（高考必考）</text>
  <text x="60" y="172" fill="#72243E" font-size="11">血糖来源：食物消化吸收 + 肝糖原分解 + 非糖物质转化</text>
  <text x="60" y="189" fill="#72243E" font-size="11">血糖去路：氧化分解 + 合成糖原 + 转化为非糖物质</text>
  <rect x="60" y="198" width="660" height="1" fill="#D4537E"/>
  <text x="60" y="218" fill="#4B1528" font-size="12" font-weight="bold">激素调节：</text>
  <text x="70" y="235" fill="#72243E" font-size="11">• 胰岛素（胰岛B细胞分泌）→ 唯一降低血糖：促进组织细胞摄取/利用/储存葡萄糖</text>
  <text x="70" y="252" fill="#72243E" font-size="11">• 胰高血糖素（胰岛A细胞分泌）→ 升高血糖：促进肝糖原分解、非糖物质转化</text>
  <text x="70" y="269" fill="#72243E" font-size="11">• 肾上腺素（肾上腺髓质）→ 升高血糖：促进肝糖原分解</text>
  <text x="60" y="287" fill="#72243E" font-size="11">🔴 易错：糖尿病原因=胰岛素分泌不足 OR 胰岛素受体不敏感（胰岛素抵抗）</text>

  <!-- 甲状腺激素分级调节 -->
  <rect x="40" y="290" width="720" height="155" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="60" y="312" fill="#04342C" font-size="14" font-weight="bold">甲状腺激素分泌的分级调节</text>
  <rect x="100" y="322" width="120" height="30" rx="6" fill="white" stroke="#0F6E56" stroke-width="1"/>
  <text x="160" y="342" text-anchor="middle" fill="#04342C" font-size="11">下丘脑</text>
  <text x="167" y="357" text-anchor="middle" fill="#085041" font-size="9">TRH</text>
  <line x1="220" y1="337" x2="260" y2="337" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="260" y="322" width="120" height="30" rx="6" fill="white" stroke="#0F6E56" stroke-width="1"/>
  <text x="320" y="342" text-anchor="middle" fill="#04342C" font-size="11">垂体</text>
  <text x="327" y="357" text-anchor="middle" fill="#085041" font-size="9">TSH</text>
  <line x1="380" y1="337" x2="420" y2="337" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="420" y="322" width="120" height="30" rx="6" fill="white" stroke="#0F6E56" stroke-width="1"/>
  <text x="480" y="342" text-anchor="middle" fill="#04342C" font-size="11">甲状腺</text>
  <text x="487" y="357" text-anchor="middle" fill="#085041" font-size="9">甲状腺激素</text>
  <line x1="480" y1="352" x2="480" y2="390" stroke="#D4537E" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="480" y1="390" x2="320" y2="390" stroke="#D4537E" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="320" y1="390" x2="160" y2="390" stroke="#D4537E" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="160" y1="390" x2="160" y2="352" stroke="#D4537E" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="490" y="375" fill="#D4537E" font-size="9">负反馈</text>
  <text x="490" y="390" fill="#D4537E" font-size="9">抑制下丘脑</text>
  <text x="490" y="405" fill="#D4537E" font-size="9">和垂体</text>
  <text x="60" y="425" fill="#085041" font-size="11">分级调节：下丘脑→垂体→靶腺体（甲状腺/肾上腺/性腺）</text>
  <text x="60" y="442" fill="#085041" font-size="11">负反馈：靶腺体激素增多→抑制下丘脑和垂体（防止激素过多）</text>

  <!-- 体温调节 -->
  <rect x="40" y="455" width="340" height="130" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="60" y="478" fill="#04342C" font-size="13" font-weight="bold">体温调节</text>
  <text x="60" y="497" fill="#085041" font-size="11">产热：骨骼肌（主要）、肝脏</text>
  <text x="60" y="514" fill="#085041" font-size="11">散热：皮肤毛细血管舒张、汗腺分泌</text>
  <text x="60" y="531" fill="#085041" font-size="11">寒冷→下丘脑→</text>
  <text x="70" y="546" fill="#085041" font-size="10">骨骼肌战栗（产热↑）</text>
  <text x="70" y="561" fill="#085041" font-size="10">甲状腺激素↑、肾上腺素↑（产热↑）</text>
  <text x="70" y="576" fill="#085041" font-size="10">皮肤毛细血管收缩（散热↓）</text>

  <!-- 水盐调节 -->
  <rect x="410" y="455" width="350" height="130" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="430" y="478" fill="#04342C" font-size="13" font-weight="bold">水盐调节（渗透压调节）</text>
  <text x="430" y="497" fill="#085041" font-size="11">渗透压升高→</text>
  <text x="440" y="514" fill="#085041" font-size="11">下丘脑渗透压感受器→</text>
  <text x="440" y="531" fill="#085041" font-size="11">下丘脑合成ADH（抗利尿激素）→</text>
  <text x="440" y="548" fill="#085041" font-size="11">垂体释放→</text>
  <text x="440" y="565" fill="#085041" font-size="11">肾小管和集合管重吸收水↑→尿量减少</text>

  <!-- 神经-体液关系 -->
  <rect x="40" y="600" width="720" height="60" rx="10" fill="#FFF7E6" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="60" y="622" fill="#92400E" font-size="13" font-weight="bold">神经调节 vs 体液调节</text>
  <text x="60" y="640" fill="#92400E" font-size="11">神经调节：迅速、准确、短暂（递质、神经冲动）；体液调节：较缓慢、广泛、较长（激素）</text>
  <text x="60" y="657" fill="#92400E" font-size="11">关系：大多数内分泌腺受中枢神经系统调控（如寒冷→神经→甲状腺激素↑）</text>
</svg>