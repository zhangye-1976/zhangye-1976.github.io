<svg viewBox="0 0 680 640" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>选必1 第5章 植物生命活动的调节</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="160" y="8" width="360" height="38" rx="10" fill="#00796b"/>
  <text x="340" y="31" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="15" font-weight="500" font-family="system-ui, sans-serif">第5章 植物生命活动的调节</text>

  <!-- 生长素的发现 -->
  <rect x="40" y="60" width="600" height="90" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="80" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">一、生长素的发现历程</text>
  <rect x="55" y="94" width="95" height="30" rx="5" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="102" y="112" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#04342C" font-family="system-ui, sans-serif">达尔文(1880)</text>
  <text x="55" y="140" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#085041" font-family="system-ui, sans-serif">胚芽鞘向光性</text>
  <rect x="175" y="94" width="95" height="30" rx="5" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="222" y="112" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#04342C" font-family="system-ui, sans-serif">鲍森·詹森</text>
  <text x="175" y="140" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#085041" font-family="system-ui, sans-serif">尖端影响可透琼脂</text>
  <rect x="295" y="94" width="95" height="30" rx="5" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="342" y="112" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#04342C" font-family="system-ui, sans-serif">拜尔(1914)</text>
  <text x="295" y="140" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#085041" font-family="system-ui, sans-serif">弯曲因分布不均</text>
  <rect x="415" y="94" width="95" height="30" rx="5" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="462" y="112" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#04342C" font-family="system-ui, sans-serif">温特(1926)</text>
  <text x="415" y="140" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#085041" font-family="system-ui, sans-serif">命名"生长素"</text>
  <rect x="535" y="94" width="95" height="30" rx="5" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="582" y="112" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#04342C" font-family="system-ui, sans-serif">郭葛(1946)</text>
  <text x="535" y="140" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#085041" font-family="system-ui, sans-serif">提取出IAA</text>

  <!-- 生长素的产生运输 -->
  <rect x="40" y="165" width="600" height="80" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="185" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">二、生长素的产生、运输与分布</text>
  <text x="340" y="206" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">产生部位：胚芽鞘尖端、幼叶、发育中的种子 | 化学本质：吲哚乙酸(IAA)</text>
  <text x="340" y="226" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">极性运输：形态学上端→下端（主动运输，需ATP）</text>
  <text x="340" y="242" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">非极性运输：成熟组织中通过韧皮部 | 单侧光→生长素横向运输→背光侧多→弯向光源</text>

  <!-- 生长素作用两重性 -->
  <rect x="40" y="258" width="600" height="95" rx="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="340" y="278" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#4B1528" font-family="system-ui, sans-serif">三、生长素的作用特点：两重性 ★★★（高考必考）</text>
  <text x="340" y="299" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">低浓度→促进生长 | 高浓度→抑制生长 | 甚至杀死植物</text>
  <text x="340" y="319" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">不同器官敏感度：根＞芽＞茎（根最敏感，最低浓度就抑制）</text>
  <text x="340" y="339" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">顶端优势：顶芽产生的生长素向下运输→侧芽积累高浓度→抑制侧芽生长</text>
  <text x="340" y="355" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#72243E" font-family="system-ui, sans-serif">同一浓度对不同器官效果不同，是最常考的曲线分析题</text>

  <!-- 其他植物激素对比表 -->
  <rect x="40" y="368" width="600" height="155" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="388" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">四、其他植物激素（共5类）</text>

  <rect x="55" y="400" width="130" height="22" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="120" y="414" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">赤霉素(GA)</text>
  <text x="120" y="432" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#085041" font-family="system-ui, sans-serif">促进细胞伸长、种子萌发</text>

  <rect x="205" y="400" width="130" height="22" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="270" y="414" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">细胞分裂素</text>
  <text x="270" y="432" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#085041" font-family="system-ui, sans-serif">促进细胞分裂、延缓衰老</text>

  <rect x="355" y="400" width="130" height="22" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="420" y="414" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">脱落酸(ABA)</text>
  <text x="420" y="432" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#085041" font-family="system-ui, sans-serif">抑制生长、促进脱落/休眠</text>

  <rect x="505" y="400" width="120" height="22" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="565" y="414" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">乙烯</text>
  <text x="565" y="432" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#085041" font-family="system-ui, sans-serif">促进果实成熟</text>

  <rect x="130" y="450" width="420" height="28" rx="6" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
  <text x="340" y="468" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">激素间协同/拮抗 | IAA+GA=协同 | IAA+ABA=拮抗 | 乙烯≠生长素</text>

  <text x="340" y="510" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">植物生长调节剂：人工合成的植物激素类似物（易合成、效果稳定）</text>

  <!-- 易错提醒 -->
  <rect x="40" y="530" width="600" height="95" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="552" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#042C53" font-family="system-ui, sans-serif">易错提醒</text>
  <text x="340" y="572" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#042C53" font-family="system-ui, sans-serif">1. 极性运输是从形态学上端→下端，不是地理上端！</text>
  <text x="340" y="592" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#042C53" font-family="system-ui, sans-serif">2. 生长素两重性=低促高抑，关注根/芽/茎最适浓度差异</text>
  <text x="340" y="612" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#042C53" font-family="system-ui, sans-serif">3. 植物激素是有机物≠植物生长调节剂（人工合成）</text>
</svg>
