<svg viewBox="0 0 680 920" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第3章 生态系统及其稳定性</title>
  <desc>生态系统结构、能量流动、物质循环、信息传递、稳定性</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <rect x="180" y="8" width="320" height="40" rx="10" fill="#00796b"/>
  <text x="340" y="33" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="15" font-weight="500" font-family="system-ui, sans-serif">第3章 生态系统及其稳定性 ★★★</text>

  <!-- 生态系统结构 -->
  <rect x="40" y="68" width="600" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="91" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">一、生态系统的结构</text>
  <text x="340" y="109" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">非生物环境 + 生产者 + 消费者 + 分解者 → 食物链/食物网</text>

  <!-- 组成成分对比表 -->
  <rect x="40" y="128" width="600" height="96" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="150" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#042C53" font-family="system-ui, sans-serif">四大组成成分</text>
  <text x="90" y="172" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">生产者：自养，主要成分</text>
  <text x="90" y="190" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">消费者：加快物质循环</text>
  <text x="90" y="208" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">分解者：分解遗体，关键成分</text>
  <text x="400" y="172" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">❌ 所有植物都是生产者？寄生植物不是</text>
  <text x="400" y="190" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">❌ 所有动物都是消费者？蚯蚓不是</text>
  <text x="400" y="208" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">❌ 所有微生物都是分解者？硝化细菌不是</text>

  <!-- 能量流动 -->
  <rect x="40" y="244" width="600" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="340" y="267" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4B1B0C" font-family="system-ui, sans-serif">二、能量流动 ★★★★（高考必考）</text>
  <text x="340" y="285" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#712B13" font-family="system-ui, sans-serif">输入→传递→转化→散失 | 单向流动、逐级递减</text>

  <!-- 能量流动过程 -->
  <rect x="40" y="304" width="600" height="120" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
  <text x="340" y="326" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#4B1528" font-family="system-ui, sans-serif">能量流动过程图解</text>
  <text x="100" y="348" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">太阳能</text>
  <path d="M140 344 L180 344" stroke="#72243E" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="185" y="332" width="80" height="28" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="225" y="348" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">生产者（第1营养级）</text>
  <path d="M270 344 L310 344" stroke="#72243E" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="315" y="332" width="80" height="28" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="355" y="348" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">初级消费者</text>
  <path d="M400 344 L440 344" stroke="#72243E" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="445" y="332" width="80" height="28" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="485" y="348" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">次级消费者</text>
  <text x="545" y="348" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">...</text>
  <text x="120" y="378" font-size="11" fill="#712B13" font-family="system-ui, sans-serif">去向：①呼吸作用散失 ②流入下一营养级 ③流向分解者 ④未被利用</text>
  <text x="120" y="398" font-size="11" fill="#712B13" font-family="system-ui, sans-serif">同化量 = 摄入量 - 粪便量（粪便能量属于上一营养级）</text>
  <text x="120" y="418" font-size="11" fill="#D4537E" font-family="system-ui, sans-serif">🔴 传递效率10%~20% → 第4营养级以上能量极少</text>

  <!-- 能量流动计算模型 -->
  <rect x="40" y="440" width="600" height="120" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="462" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#633806" font-family="system-ui, sans-serif">能量流动计算题解题模型 ★★★★</text>
  <text x="340" y="485" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B" font-family="system-ui, sans-serif">"最多"需要生产者 → 按最小效率10%计算</text>
  <text x="340" y="505" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B" font-family="system-ui, sans-serif">"最少"需要生产者 → 按最大效率20%计算</text>
  <text x="340" y="525" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#412402" font-family="system-ui, sans-serif">口诀："最多×最短×20%；最少×最长×10%"</text>
  <text x="120" y="545" font-size="11" fill="#412402" font-family="system-ui, sans-serif">例题：狐每增加1kg，至少需要草多少kg？（按20%计算）→ 1÷20%÷20% = 25kg</text>

  <!-- 物质循环（碳循环） -->
  <rect x="40" y="580" width="600" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="603" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">三、物质循环（碳循环）★★★</text>
  <text x="340" y="621" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">全球性、循环性 | CO₂是无机环境与生物群落间的核心载体</text>

  <!-- 碳循环图解 -->
  <rect x="40" y="640" width="600" height="140" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="662" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#042C53" font-family="system-ui, sans-serif">碳循环过程图解</text>
  <text x="340" y="685" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C" font-family="system-ui, sans-serif">大气中的CO₂</text>
  <text x="150" y="710" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">光合作用</text>
  <text x="530" y="710" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">呼吸作用</text>
  <text x="150" y="730" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">化能合成作用</text>
  <text x="530" y="730" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">分解作用</text>
  <text x="530" y="750" font-size="11" fill="#04342C" font-family="system-ui, sans-serif">化石燃料燃烧</text>
  <text x="340" y="770" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">生产者（含碳有机物）→ 消费者（含碳有机物）→ 分解者</text>
  <text x="340" y="788" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#D4537E" font-family="system-ui, sans-serif">🔴 温室效应：化石燃料燃烧 + 森林砍伐 → CO₂浓度升高</text>

  <!-- 信息传递 + 稳定性 -->
  <rect x="40" y="800" width="600" height="100" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="340" y="822" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#27500A" font-family="system-ui, sans-serif">四、信息传递 + 五、生态系统稳定性</text>
  <text x="340" y="845" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11" font-family="system-ui, sans-serif">信息传递：物理/化学/行为信息 → 调节种间关系、维持生态系统稳定</text>
  <text x="340" y="865" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11" font-family="system-ui, sans-serif">抵抗力稳定性：成分越复杂，抵抗力越高</text>
  <text x="340" y="885" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11" font-family="system-ui, sans-serif">恢复力稳定性：成分越简单，恢复力越高（一般负相关，但苔原都低）</text>
</svg>
