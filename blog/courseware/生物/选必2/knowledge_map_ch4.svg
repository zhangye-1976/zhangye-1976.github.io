<svg viewBox="0 0 680 640" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>第4章 人与环境</title>
  <desc>生物多样性、丧失原因、保护措施、生态工程原理</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="180" y="8" width="320" height="40" rx="10" fill="#00796b"/>
  <text x="340" y="33" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="15" font-weight="500" font-family="system-ui, sans-serif">第4章 人与环境 ★★★</text>

  <rect x="40" y="68" width="600" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="91" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">一、全球性生态环境问题</text>
  <text x="340" y="109" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">温室效应 · 臭氧层破坏 · 酸雨 · 土地荒漠化 · 水污染 · 生物多样性丧失</text>

  <rect x="40" y="128" width="290" height="90" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
  <text x="185" y="150" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#4B1528" font-family="system-ui, sans-serif">温室效应</text>
  <text x="60" y="172" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">原因：化石燃料燃烧 + 森林砍伐</text>
  <text x="60" y="190" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">危害：冰川融化、海平面上升</text>
  <text x="60" y="208" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">措施：碳中和、可再生能源</text>
  <text x="60" y="226" font-size="11" fill="#D4537E" font-family="system-ui, sans-serif">🔴 碳中和 = 排放 − 吸收 = 0</text>

  <rect x="350" y="128" width="290" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="495" y="150" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">臭氧层破坏</text>
  <text x="370" y="172" font-size="11" fill="#085041" font-family="system-ui, sans-serif">原因：氟利昂等物质大量排放</text>
  <text x="370" y="190" font-size="11" fill="#085041" font-family="system-ui, sans-serif">危害：紫外线增强，皮肤癌发病率↑</text>
  <text x="370" y="208" font-size="11" fill="#085041" font-family="system-ui, sans-serif">措施：禁止氟利昂生产使用</text>
  <text x="370" y="226" font-size="11" fill="#D4537E" font-family="system-ui, sans-serif">🔴 臭氧层能吸收紫外线</text>

  <rect x="40" y="236" width="600" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="340" y="259" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4B1B0C" font-family="system-ui, sans-serif">二、生物多样性及其保护 ★★★</text>
  <text x="340" y="277" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#712B13" font-family="system-ui, sans-serif">三个层次 · 三大价值 · 丧失原因 · 保护措施</text>

  <rect x="40" y="296" width="600" height="110" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="318" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#042C53" font-family="system-ui, sans-serif">生物多样性的三个层次</text>
  <text x="90" y="340" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">基因多样性：同种生物不同个体基因不同</text>
  <text x="90" y="358" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">物种多样性：生物种类的丰富程度</text>
  <text x="90" y="376" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">生态系统多样性：各种类型的生态系统</text>
  <text x="400" y="340" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">🔴 间接价值 > 直接价值</text>
  <text x="400" y="358" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">直接价值：食用、药用、工业原料</text>
  <text x="400" y="376" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">间接价值：生态功能（保持水土等）</text>
  <text x="400" y="394" font-size="11" fill="#0C447C" font-family="system-ui, sans-serif">潜在价值：目前尚不清楚的价值</text>

  <rect x="40" y="424" width="290" height="90" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="185" y="446" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#27500A" font-family="system-ui, sans-serif">丧失原因</text>
  <text x="60" y="468" font-size="11" fill="#3B6D11" font-family="system-ui, sans-serif">① 生存环境破坏（最主要）</text>
  <text x="60" y="486" font-size="11" fill="#3B6D11" font-family="system-ui, sans-serif">② 掠夺式利用（过度捕捞）</text>
  <text x="60" y="504" font-size="11" fill="#3B6D11" font-family="system-ui, sans-serif">③ 环境污染</text>
  <text x="60" y="522" font-size="11" fill="#3B6D11" font-family="system-ui, sans-serif">④ 外来物种入侵</text>

  <rect x="350" y="424" width="290" height="90" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="495" y="446" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#633806" font-family="system-ui, sans-serif">保护措施</text>
  <text x="370" y="468" font-size="11" fill="#854F0B" font-family="system-ui, sans-serif">就地保护（最有效）：自然保护区</text>
  <text x="370" y="486" font-size="11" fill="#854F0B" font-family="system-ui, sans-serif">易地保护：动物园、植物园</text>
  <text x="370" y="504" font-size="11" fill="#854F0B" font-family="system-ui, sans-serif">生物技术保护：精子库、种子库</text>
  <text x="370" y="522" font-size="11" fill="#854F0B" font-family="system-ui, sans-serif">🔴 保护 ≠ 禁止开发利用</text>

  <rect x="40" y="534" width="600" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="556" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">三、生态工程 ★★★（4大基本原理）</text>
  <text x="90" y="578" font-size="11" fill="#085041" font-family="system-ui, sans-serif">自生：自我组织、自我维持能力</text>
  <text x="90" y="596" font-size="11" fill="#085041" font-family="system-ui, sans-serif">循环：促进物质迁移转化，废物资源化</text>
  <text x="370" y="578" font-size="11" fill="#085041" font-family="system-ui, sans-serif">协调：生物与环境、生物与生物协调</text>
  <text x="370" y="596" font-size="11" fill="#085041" font-family="system-ui, sans-serif">整体：考虑社会—经济—自然复合系统</text>

  <rect x="180" y="630" width="320" height="0" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5" opacity="0"/>
</svg>
