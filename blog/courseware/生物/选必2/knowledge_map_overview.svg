<svg viewBox="0 0 680 700" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>选必2 生物与环境 全书总览</title>
  <desc>四章知识框架</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="200" y="8" width="280" height="40" rx="10" fill="#00796b"/>
  <text x="340" y="33" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-size="15" font-weight="500" font-family="system-ui, sans-serif">选必2 生物与环境 · 全书总览</text>

  <line x1="340" y1="48" x2="340" y2="68" stroke="#00796b" stroke-width="0.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="40" y="72" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="110" y="95" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第1章 种群及其动态</text>
    <text x="110" y="112" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">J/S型增长 · K值应用</text>
  </g>

  <g>
    <rect x="270" y="72" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="340" y="95" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第2章 群落及其演替</text>
    <text x="340" y="112" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">种间关系 · 演替类型</text>
  </g>

  <g>
    <rect x="500" y="72" width="140" height="44" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5" stroke-dasharray="4,3"/>
    <text x="570" y="95" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4B1528" font-family="system-ui, sans-serif">第3章 生态系统 ★★★★</text>
    <text x="570" y="112" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#72243E" font-family="system-ui, sans-serif">能量流动 · 物质循环</text>
  </g>

  <g>
    <rect x="270" y="148" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="340" y="171" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">第4章 人与环境</text>
    <text x="340" y="188" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041" font-family="system-ui, sans-serif">生物多样性 · 生态工程</text>
  </g>

  <line x1="110" y1="116" x2="110" y2="148" stroke="#00796b" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="116" x2="340" y2="148" stroke="#00796b" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="116" x2="570" y2="148" stroke="#00796b" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="148" x2="340" y2="192" stroke="#00796b" stroke-width="0.5" marker-end="url(#arrow)" stroke-dasharray="3,3"/>

  <rect x="40" y="230" width="600" height="100" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="252" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#042C53" font-family="system-ui, sans-serif">第3章 核心展开（高考解答题必考）</text>
  <text x="340" y="275" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C" font-family="system-ui, sans-serif">能量流动：输入→传递→转化→散失，传递效率10%~20%</text>
  <text x="340" y="295" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C" font-family="system-ui, sans-serif">物质循环（碳循环）：全球性、循环性，CO₂是核心载体</text>
  <text x="340" y="315" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C" font-family="system-ui, sans-serif">食物链/食物网：能量流动渠道，营养级计算</text>

  <rect x="40" y="355" width="600" height="80" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="340" y="377" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A" font-family="system-ui, sans-serif">种群增长曲线（高考计算题高频）</text>
  <text x="340" y="400" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11" font-family="system-ui, sans-serif">J型：理想条件，λ不变，增长速率逐年增大</text>
  <text x="340" y="420" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11" font-family="system-ui, sans-serif">S型：K/2时增长速率最大，渔业捕捞最佳时期</text>

  <rect x="40" y="460" width="600" height="72" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="340" y="482" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4B1B0C" font-family="system-ui, sans-serif">Top 5 高频考点</text>
  <text x="340" y="502" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13" font-family="system-ui, sans-serif">1. 能量流动计算（10%~20%传递效率） 2. 种群增长曲线（J/S型，K/2应用）</text>
  <text x="340" y="520" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13" font-family="system-ui, sans-serif">3. 碳循环过程图解 4. 种间关系判别 5. 生物多样性保护措施</text>

  <rect x="40" y="565" width="600" height="60" rx="10" fill="#FBEAF0" stroke="#D4537E" stroke-width="0.5"/>
  <text x="340" y="587" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4B1528" font-family="system-ui, sans-serif">与必修1的衔接</text>
  <text x="340" y="607" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">光合作用（必修1）→ 生产者固定太阳能 → 生态系统能量流动的起点</text>
  <text x="340" y="625" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#72243E" font-family="system-ui, sans-serif">细胞呼吸（必修1）→ 各营养级呼吸散失能量 → 能量流动的关键环节</text>

  <rect x="180" y="650" width="320" height="36" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="673" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#04342C" font-family="system-ui, sans-serif">碳中和 · 生态环境保护是近年高考热点</text>
</svg>
