<svg viewBox="0 0 900 780" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="#00796b"/>
    </marker>
  </defs>
  <!-- 标题 -->
  <rect x="250" y="10" width="400" height="44" rx="10" fill="#00796b"/>
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="16" font-weight="600" font-family="system-ui, sans-serif">第3章 基因工程 思维导图</text>

  <!-- 三大工具 -->
  <rect x="40" y="70" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="140" y="95" text-anchor="middle" fill="#04342C" font-size="13" font-weight="500" font-family="system-ui, sans-serif">一、重组DNA工具 ★</text>

  <!-- 工具1：限制酶 -->
  <rect x="60" y="140" width="160" height="80" rx="8" fill="#f5f5f5" stroke="#0F6E56" stroke-width="1"/>
  <text x="140" y="162" text-anchor="middle" fill="#04342C" font-size="12" font-weight="500" font-family="system-ui, sans-serif">1. 限制性内切酶</text>
  <text x="140" y="180" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">识别特定序列</text>
  <text x="140" y="196" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">切割磷酸二酯键</text>
  <text x="140" y="212" text-anchor="middle" fill="#72243E" font-size="10" font-family="system-ui, sans-serif">产生黏性/平末端</text>

  <!-- 工具2：DNA连接酶 -->
  <rect x="240" y="140" width="160" height="80" rx="8" fill="#f5f5f5" stroke="#0F6E56" stroke-width="1"/>
  <text x="320" y="162" text-anchor="middle" fill="#04342C" font-size="12" font-weight="500" font-family="system-ui, sans-serif">2. DNA连接酶</text>
  <text x="320" y="180" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">连接磷酸二酯键</text>
  <text x="320" y="196" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">E.coli：黏性末端</text>
  <text x="320" y="212" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">T₄：黏性+平末端</text>

  <!-- 工具3：载体 -->
  <rect x="420" y="140" width="160" height="80" rx="8" fill="#f5f5f5" stroke="#0F6E56" stroke-width="1"/>
  <text x="500" y="162" text-anchor="middle" fill="#04342C" font-size="12" font-weight="500" font-family="system-ui, sans-serif">3. 基因进入受体</text>
  <text x="500" y="180" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">常用：质粒、噬菌体</text>
  <text x="500" y="196" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">条件：复制原点+</text>
  <text x="500" y="212" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">限制酶位点+标记基因</text>

  <!-- 四步操作程序（核心！） -->
  <rect x="40" y="260" width="740" height="50" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.5"/>
  <text x="410" y="285" text-anchor="middle" fill="#4B1528" font-size="14" font-weight="500" font-family="system-ui, sans-serif">二、基因工程四步操作程序 ★★★★★（核心！）</text>
  <text x="410" y="305" text-anchor="middle" fill="#72243E" font-size="11" font-family="system-ui, sans-serif">每年高考大题必考，必须熟记每一步！</text>

  <!-- 四步详细 -->
  <!-- 第1步 -->
  <rect x="60" y="340" width="180" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="150" y="365" text-anchor="middle" fill="#04342C" font-size="12" font-weight="500" font-family="system-ui, sans-serif">① 目的基因获取</text>
  <text x="150" y="385" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">方法1：从基因文库</text>
  <text x="150" y="401" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">方法2：PCR扩增</text>
  <text x="150" y="417" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">方法3：人工合成</text>
  <text x="150" y="433" text-anchor="middle" fill="#72243E" font-size="10" font-family="system-ui, sans-serif">PCR：变性→退火→延伸</text>

  <!-- 第2步（核心） -->
  <rect x="260" y="340" width="180" height="90" rx="8" fill="#FBEAF0" stroke="#D4537E" stroke-width="1.5"/>
  <text x="350" y="365" text-anchor="middle" fill="#4B1528" font-size="12" font-weight="500" font-family="system-ui, sans-serif">② 表达载体构建 ★</text>
  <text x="350" y="385" text-anchor="middle" fill="#72243E" font-size="11" font-family="system-ui, sans-serif">核心步骤！</text>
  <text x="350" y="401" text-anchor="middle" fill="#4B1528" font-size="11" font-family="system-ui, sans-serif">组成：启动子+目的</text>
  <text x="350" y="417" text-anchor="middle" fill="#4B1528" font-size="11" font-family="system-ui, sans-serif">基因+终止子+标记</text>
  <text x="350" y="433" text-anchor="middle" fill="#4B1528" font-size="11" font-family="system-ui, sans-serif">基因+复制原点</text>

  <!-- 第3步 -->
  <rect x="460" y="340" width="180" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="550" y="365" text-anchor="middle" fill="#04342C" font-size="12" font-weight="500" font-family="system-ui, sans-serif">③ 导入受体细胞</text>
  <text x="550" y="385" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">植物：农杆菌转化法</text>
  <text x="550" y="401" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">动物：显微注射法</text>
  <text x="550" y="417" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">微生物：Ca²⁺处理</text>
  <text x="550" y="433" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">（感受态细胞）</text>

  <!-- 第4步 -->
  <rect x="660" y="340" width="180" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="750" y="365" text-anchor="middle" fill="#04342C" font-size="12" font-weight="500" font-family="system-ui, sans-serif">④ 检测与鉴定</text>
  <text x="750" y="385" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">DNA水平：分子杂交</text>
  <text x="750" y="401" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">mRNA水平：分子杂交</text>
  <text x="750" y="417" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">蛋白质：抗原-抗体</text>
  <text x="750" y="433" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">个体水平：功能测定</text>

  <!-- 连线四步 -->
  <line x1="240" y1="385" x2="260" y2="385" stroke="#00796b" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="440" y1="385" x2="460" y2="385" stroke="#00796b" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="640" y1="385" x2="660" y2="385" stroke="#00796b" stroke-width="1" marker-end="url(#arr)"/>

  <!-- PCR技术 -->
  <rect x="100" y="470" width="300" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="250" y="495" text-anchor="middle" fill="#04342C" font-size="13" font-weight="500" font-family="system-ui, sans-serif">三、PCR技术（高考高频）</text>
  <text x="250" y="515" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">变性(90-95℃)→退火(55-60℃)→延伸(70-75℃)，30-40循环</text>

  <!-- 应用 -->
  <rect x="440" y="470" width="300" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text x="590" y="495" text-anchor="middle" fill="#04342C" font-size="13" font-weight="500" font-family="system-ui, sans-serif">四、基因工程应用</text>
  <text x="590" y="515" text-anchor="middle" fill="#085041" font-size="11" font-family="system-ui, sans-serif">农牧业+医药卫生+食品工业；蛋白质工程是延伸</text>

  <!-- 易错提醒 -->
  <rect x="100" y="560" width="640" height="70" rx="8" fill="#FFF8E1" stroke="#FFC107" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="420" y="582" text-anchor="middle" fill="#F57C00" font-size="12" font-weight="500" font-family="system-ui, sans-serif">🔴 易错提醒（必看！）</text>
  <text x="420" y="600" text-anchor="middle" fill="#F57C00" font-size="11" font-family="system-ui, sans-serif">• 限制酶/DNA连接酶：切割/连接的是磷酸二酯键（不是氢键！）</text>
  <text x="420" y="616" text-anchor="middle" fill="#F57C00" font-size="11" font-family="system-ui, sans-serif">• 启动子在基因上游（5'端），终止子在下游（3'端）</text>
  <text x="420" y="632" text-anchor="middle" fill="#F57C00" font-size="11" font-family="system-ui, sans-serif">• PCR用Taq酶（耐高温），不是普通DNA聚合酶！</text>

  <!-- 底部 -->
  <rect x="200" y="650" width="500" height="40" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="450" y="675" text-anchor="middle" fill="#042C53" font-size="12" font-weight="500" font-family="system-ui, sans-serif">基因工程是现代农业、医药、生物产业的核心技术</text>
</svg>
